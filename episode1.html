<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Probably Speaking — Episode 1</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Courier New',monospace}

:root{
  --bg:#000;--tx:rgba(238,225,196,.92);--tr:rgba(210,198,172,.80);
  --eq:#D4A843;--hd:rgba(212,168,67,.68);--am:#D4A843;
  --cb:rgba(0,0,0,.9);--cf:rgba(0,0,0,0);
  --bh:rgba(212,168,67,.92);--bd:rgba(212,168,67,.45);
  --sd:rgba(212,168,67,.3);--sa:rgba(212,168,67,.85);
  --pg:rgba(212,168,67,.5);
  --ib:rgba(6,4,2,.96);--id:rgba(212,168,67,.22);
  --it:rgba(212,168,67,.62);--im:rgba(212,168,67,.34);--il:rgba(212,168,67,.1);
  --vg:rgba(0,0,0,.65);--gr:.5;
}
body.light{
  --bg:#F5EDD6;--tx:rgba(30,16,2,.96);--tr:rgba(60,35,8,.85);
  --eq:#6B4210;--hd:rgba(80,50,8,.82);--am:#6B4210;
  --cb:rgba(240,230,210,.96);--cf:rgba(240,230,210,0);
  --bh:rgba(100,65,10,.9);--bd:rgba(100,65,10,.45);
  --sd:rgba(100,65,10,.32);--sa:rgba(100,65,10,.85);
  --pg:rgba(139,94,26,.55);
  --ib:rgba(248,242,225,.98);--id:rgba(139,94,26,.25);
  --it:rgba(80,50,15,.72);--im:rgba(100,65,10,.38);--il:rgba(100,65,10,.1);
  --vg:rgba(240,230,210,.15);--gr:.06;
}
body{background:var(--bg);transition:background .4s}

/* STAGE */
#stage{position:fixed;inset:0;background:var(--bg);transition:background .4s}
#grain{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;opacity:var(--gr);transition:opacity .4s}
#vig{position:absolute;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 36%,var(--vg) 100%)}
#rl{position:absolute;top:0;left:0;right:0;bottom:0;z-index:4;opacity:0;pointer-events:none;background:var(--bg);padding:4% 6%}
#rl img{width:100%;height:100%;object-fit:contain;object-position:center;background:var(--bg)}

/* TEXT */
#tl{position:absolute;top:0;left:0;right:0;bottom:96px;z-index:5;display:flex;align-items:center;justify-content:center;padding:5% 13%}
#tx{font-size:clamp(15px,2.1vw,30px);text-align:center;line-height:1.8;letter-spacing:.05em;opacity:0;max-width:840px}
.tx{color:var(--tx)}.tr{color:var(--tr)}
.te{color:var(--eq);font-size:clamp(20px,3vw,44px);letter-spacing:.1em}
.th{color:var(--hd);font-size:clamp(14px,1.3vw,18px);letter-spacing:.24em;text-transform:uppercase}
.ta{color:var(--am)}
body.light #tx{font-weight:500}
@keyframes arrive{0%{opacity:0;filter:blur(3px)}35%{opacity:.85;filter:blur(.5px)}55%{opacity:1;filter:none}100%{opacity:1;filter:none}}
@keyframes depart{0%{opacity:1}100%{opacity:0}}
.arriving{animation:arrive .65s ease-out forwards}
.departing{animation:depart .2s ease-out forwards}

/* COIN */
#cl{position:absolute;top:0;left:0;right:0;bottom:96px;z-index:5;display:none;flex-direction:column;align-items:center;justify-content:center;gap:3vh}
#cc{display:block}
#ct{font-size:clamp(13px,1.6vw,22px);color:var(--tx);text-align:center;line-height:2;opacity:0;transition:opacity .3s;min-height:3em;max-width:680px}

/* PROGRESS */
#pb{position:fixed;top:0;left:0;right:0;height:3px;z-index:30;cursor:pointer}
#pf{position:absolute;top:0;left:0;height:100%;width:0%;background:var(--pg);transition:background .4s;pointer-events:none}

/* PAUSED */
#pi{position:fixed;top:12px;right:16px;font-size:clamp(12px,.85vw,14px);color:var(--bh);letter-spacing:.2em;z-index:29;opacity:0;transition:opacity .25s;pointer-events:none}
#pi.on{opacity:1}

/* BACK LINK */
#bl{position:fixed;top:12px;left:14px;z-index:41;font-size:clamp(14px,1.1vw,18px);color:rgba(212,168,67,.62);letter-spacing:.1em;text-decoration:none;transition:color .18s;pointer-events:auto}
#bl:hover{color:rgba(212,168,67,.95)}
body.rec #bl{display:none}

/* CONTROLS */
#ctrl{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;flex-direction:column;align-items:center;background:linear-gradient(var(--cf),var(--cb));pointer-events:none;transition:background .4s,opacity .32s,transform .32s;opacity:0;transform:translateY(100%)}
#ctrl.vis{opacity:1;transform:translateY(0)}
body.not-started #ctrl{opacity:1!important;transform:translateY(0)!important}
body.rec #ctrl{display:none}

#sr{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:2.2vw;padding:8px 0 4px;pointer-events:auto}
.spd{background:none;border:none;cursor:pointer;font-family:'Courier New',monospace;font-size:clamp(13px,1vw,16px);letter-spacing:.1em;color:var(--sd);transition:color .15s;padding:3px 6px}
.spd:hover{color:var(--sa)}.spd.active{color:var(--sa)}

#br{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:4vw;padding:5px 0 15px;pointer-events:auto;width:100%}
#br button{background:none;border:none;padding:0;cursor:pointer;color:var(--bh);font-family:inherit;font-size:clamp(24px,2.4vw,36px);line-height:1;transition:color .18s,transform .14s,opacity .18s;width:clamp(42px,4vw,58px);height:clamp(42px,4vw,58px);display:flex;align-items:center;justify-content:center;opacity:.65}
#br button:hover{opacity:1;transform:scale(1.16)}
body:not(.light) #br button:hover{filter:drop-shadow(0 0 10px rgba(212,168,67,.52))}
body.light #br button:hover{filter:drop-shadow(0 0 8px rgba(100,65,10,.38))}
#br button:active{transform:scale(.93)}
#pb2{font-size:clamp(28px,2.8vw,40px)!important;width:clamp(48px,4.5vw,64px)!important;height:clamp(48px,4.5vw,64px)!important;opacity:.8!important}
#pb2:hover{opacity:1!important}
body.not-started #br button:not(#sk):not(#mu){opacity:.18!important;pointer-events:none}
body.not-started #sr{opacity:.18;pointer-events:none}

/* INDEX PANEL */
#io{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;cursor:pointer}
body.light #io{background:rgba(44,26,8,.3)}
#io.open{display:flex}
#ip{background:var(--ib);border:1px solid var(--id);padding:24px 28px;min-width:260px;max-width:420px;width:88%;max-height:68vh;overflow-y:auto;cursor:default;scrollbar-width:thin;scrollbar-color:var(--id) transparent;transition:background .4s,border-color .4s}
#ip::-webkit-scrollbar{width:3px}
#ip::-webkit-scrollbar-thumb{background:var(--id)}
#ih{font-size:clamp(11px,.72vw,13px);color:var(--im);letter-spacing:.22em;text-transform:uppercase;margin-bottom:14px}
.ir{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--il);cursor:pointer}
.ir:last-child{border-bottom:none}
.ir:hover .il2{color:var(--bh)}.ir:hover .it2{color:var(--it)}
.it2{font-size:clamp(11px,.75vw,13px);color:var(--im);letter-spacing:.06em;flex-shrink:0;width:38px}
.il2{font-size:clamp(13px,.92vw,15px);color:var(--it);letter-spacing:.05em}
.ir.now .il2{color:var(--bh)}.ir.now .it2{color:var(--it)}

/* START */
#st{position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:5% 14%;transition:background .4s;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
.sh{font-size:clamp(13px,1.3vw,18px);color:var(--hd);letter-spacing:.24em;text-transform:uppercase;text-align:center;margin-bottom:3.5vh}
.ss{font-size:clamp(16px,2.1vw,30px);color:var(--tx);letter-spacing:.05em;text-align:center;margin-bottom:3.8vh}
.sg{font-size:clamp(16px,2.1vw,30px);color:var(--tr);letter-spacing:.05em;text-align:center;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.52}50%{opacity:1}}

/* RECORDING */
body.rec #ctrl{display:none}
body.rec #pb{display:none}
body.rec #pi{display:none}
body.rec #bl{display:none}

</style>
</head>

  {t:'b',d:500},
  {t:'x',s:'An experiment is any action or process',d:3000},

var AC,mg,padI=0;

function initAudio(){
  if(AC)return;
  try{
    var Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return;
    AC=new Ctx();
    var co=AC.createDynamicsCompressor();
    co.threshold.value=-20;co.ratio.value=4;co.connect(AC.destination);
    mg=AC.createGain();mg.gain.value=.24;mg.connect(co);
    // Unlock: play silent oscillator for 0.001s
    var o=AC.createOscillator();
    var g=AC.createGain();g.gain.value=0;
    o.connect(g);g.connect(AC.destination);
    o.start(0);o.stop(AC.currentTime+.001);
    // Resume then start music
    var p=AC.resume();
    if(p&&p.then){p.then(function(){sPad();sMel();sTick();});}
    else{sPad();sMel();sTick();}
  }catch(e){console.warn('audio:',e);AC=null;mg=null;}
}
// Re-attempt audio on any touch if not yet started
document.addEventListener('touchstart',function(){

  if(!AC)return;

  fr.forEach(function(n){var o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=n.f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.008,t+.1);g.gain.exponentialRampToValueAtTime(.0001,t+n.d);o.connect(g);g.connect(mg);o.start(t);o.stop(t+n.d+.1);t+=n.d+.08;});

  var list=document.getElementById('ip');

    row.innerHTML='<span class="it2">'+fmtT(ms)+'</span><span class="il2">'+label+'</span>';

// PLAYER
function play(i){
  try{
  if(i>=F.length){document.getElementById('pf').style.width='100%';ptD=0;return;}
  cur=i;startPT(F.slice(0,i).reduce(function(s,f){return s+f.d;},0),F[i].d);
  var f=F[i];
  if(f.t==='b'){tx.className='';tx.textContent='';tx.style.opacity='0';timer=setTimeout(function(){if(!paused)play(i+1);},W(f.d));return;}
  if(f.t==='room'){showRoom(f.d,function(){play(i+1);});return;}
  if(f.t==='rc'){closeRoom(f.d,function(){play(i+1);});return;}
  if(f.t==='coin'){runCoin(function(){play(i+1);});return;}
  showText(f);
  timer=setTimeout(function(){if(!paused)hideText(function(){play(i+1);});},W(f.d));

}

  document.getElementById('st').style.display='none';
  document.body.classList.remove('not-started');
  running=true;
  try{initAudio();}catch(e){console.warn('Audio init failed:',e);}
  buildChapters();play(0);
}
function togglePause(){
  if(!running)return;paused=!paused;
  var pb=document.getElementById('pb2'),pi=document.getElementById('pi');
  if(paused){clearTimeout(timer);if(mg)mg.gain.setTargetAtTime(0,AC.currentTime,.4);pb.innerHTML='&#9654;';pi.classList.add('on');ptD=0;}
  else{if(mg)mg.gain.setTargetAtTime(.24,AC.currentTime,.4);pb.innerHTML='&#9646;&#9646;';pi.classList.remove('on');hideText(function(){play(cur+1);});}
}
function jumpTo(i){clearTimeout(timer);paused=false;document.getElementById('pb2').innerHTML='&#9646;&#9646;';document.getElementById('pi').classList.remove('on');tx.className='';tx.textContent='';tx.style.opacity='0';cl.style.display='none';play(i);}
function prevChap(){if(!running)return;var p=CHAPS.filter(function(i){return i<cur;});jumpTo(p.length?p[p.length-1]:0);}
function nextChap(){if(!running)return;var n=CHAPS.filter(function(i){return i>cur;});if(n.length)jumpTo(n[0]);}
function resetEp(){
  clearTimeout(timer);running=false;paused=false;
  tx.className='';tx.textContent='';tx.style.opacity='0';
  cl.style.display='none';rl.style.opacity='0';rl.style.transition='none';
  ptD=0;document.getElementById('pf').style.width='0%';
  document.getElementById('pb2').innerHTML='&#9646;&#9646;';
  document.getElementById('pi').classList.remove('on');
  document.getElementById('io').classList.remove('open');
  var s=document.getElementById('st');s.style.display='';
  document.body.classList.add('not-started');cur=0;
}
function beginRec(){document.body.classList.add('rec');begin();}

// CONTROLS AUTO-HIDE
var hideT=null;
function showCtrl(){
  document.getElementById('ctrl').classList.add('vis');
  clearTimeout(hideT);
  hideT=setTimeout(function(){document.getElementById('ctrl').classList.remove('vis');},3500);
}
document.addEventListener('mousemove',function(e){if(innerHeight-e.clientY<110)showCtrl();});
document.getElementById('ctrl').addEventListener('mouseenter',function(){clearTimeout(hideT);document.getElementById('ctrl').classList.add('vis');});
document.getElementById('ctrl').addEventListener('mouseleave',function(){hideT=setTimeout(function(){document.getElementById('ctrl').classList.remove('vis');},1500);});

// START SCREEN — touch + click, no double fire
(function(){
  var fired=false;
  function go(){if(fired)return;fired=true;begin();}
  document.getElementById('st').addEventListener('touchend',go);
  document.getElementById('st').addEventListener('click',go);
})();

// KEYBOARD
document.addEventListener('keydown',function(e){
  if(e.shiftKey&&e.key==='R'){e.preventDefault();if(!running)beginRec();else document.body.classList.toggle('rec');return;}
  if(e.key===' '||e.key==='k'){e.preventDefault();if(document.getElementById('io').classList.contains('open'))closeIdx();else togglePause();showCtrl();return;}
  if(e.key==='Escape'&&document.getElementById('io').classList.contains('open')){closeIdx();return;}
  if(e.key==='ArrowLeft'){e.preventDefault();prevChap();showCtrl();return;}
  if(e.key==='ArrowRight'){e.preventDefault();nextChap();showCtrl();return;}
});

</script>
</body>
</html>
