<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ragvir's Library</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>

* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#1a1208;
  font-family:'IM Fell English', serif;
}

/* ── MINIMUM SCREEN GUARD ── */
#too-small {
  display:none;
  position:fixed;
  inset:0;
  background:#1a1208;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:16px;
  z-index:999;
}
#too-small p {
  font-family:'Cinzel', serif;
  font-size:16px;
  color:rgba(220,190,130,0.8);
  letter-spacing:0.12em;
  text-align:center;
  padding:0 40px;
  line-height:1.8;
}
@media (max-width: 389px) {
  #too-small { display:flex; }
}

/* ── SCENE GRID (floats above canvas) ── */
#scene {
  position:fixed;
  inset:0;
  z-index:1;
  display:grid;
  width:100vw;
  height:100vh;
  grid-template-columns: 1fr clamp(80px, 9vw, 130px);
  grid-template-rows: 1fr clamp(140px, 22vh, 220px);
  pointer-events:none;
}

/* Library background — cosylibrary.png + Three.js frame overlay */
#bg {
  grid-column:1;
  grid-row:1;
  position:relative;
  border-right:2px solid rgba(180,140,60,0.35);
  box-shadow:4px 0 18px rgba(0,0,0,0.45);
  background: url('./aldricimages/cosylibrary.png') center/cover no-repeat;
  overflow:hidden;
  pointer-events:auto;
}

#bg::after {
  content:'';
  position:absolute;
  inset:0;
  background: radial-gradient(ellipse at center, transparent 35%, rgba(8,5,2,0.65) 100%);
  pointer-events:none;
  z-index:10;
}

/* Three.js canvas fills #bg */
#three-canvas {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}

/* ── DOCK ── */
#dock {
  grid-column:2;
  grid-row:1 / 3;
  display:flex;
  flex-direction:column;
  padding:1.2vh 0.8vw;
  overflow-y:auto;
  overflow-x:hidden;
  backdrop-filter:blur(14px);
  background:rgba(30,18,8,0.45);
  border-left:1px solid rgba(255,220,150,0.12);
  scrollbar-width:thin;
  scrollbar-color:rgba(180,140,80,0.3) transparent;
  pointer-events:auto;
}

#dock-title {
  font-family:'Cinzel', serif;
  font-size:clamp(8px, 0.8vw, 11px);
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:rgba(220,190,130,0.65);
  text-align:center;
  padding-bottom:0.8vh;
  margin-bottom:0.8vh;
  border-bottom:1px solid rgba(220,190,130,0.12);
  flex-shrink:0;
}

.card-slot {
  margin-bottom:0.6vh;
  cursor:pointer;
  position:relative;
  border-radius:0.6vw;
  transition:transform 0.15s;
  flex-shrink:0;
}

.card-slot:hover {
  transform:translateX(-4px);
}

.card-slot img {
  width:100%;
  border-radius:0.6vw;
  display:block;
  box-shadow:2px 2px 10px rgba(0,0,0,0.5);
}

.card-slot:hover .tooltip {
  opacity:1;
  pointer-events:auto;
}

.tooltip {
  position:absolute;
  right:calc(100% + 8px);
  top:50%;
  transform:translateY(-50%);
  width:clamp(140px, 14vw, 200px);
  background:rgba(14,9,3,0.96);
  border:1px solid rgba(180,140,60,0.35);
  border-radius:8px;
  padding:0.8vh 0.8vw;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.18s;
  z-index:100;
}

.tooltip-title {
  font-family:'IM Fell English', serif;
  font-size:clamp(12px, 1.2vw, 16px);
  color:rgba(230,210,165,0.95);
  margin-bottom:4px;
}

.tooltip-desc {
  font-family:'IM Fell English', serif;
  font-style:italic;
  font-size:clamp(10px, 0.9vw, 13px);
  line-height:1.5;
  color:rgba(200,175,130,0.7);
}

/* ── DIALOGUE ── */
#dialogue {
  grid-column:1;
  grid-row:2;
  display:flex;
  flex-direction:row;
  align-items:stretch;
  background:rgba(14,9,3,0.85);
  backdrop-filter:blur(10px);
  overflow:hidden;
  border-top:2px solid rgba(180,140,60,0.35);
  box-shadow:0 -4px 18px rgba(0,0,0,0.45);
  pointer-events:auto;
}

#portrait {
  width:calc(18vh * 0.78);
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  justify-content:flex-start;
  border-right:1px solid rgba(220,190,130,0.15);
  height:100%;
  position:relative;
  overflow:hidden;
}

#portrait img {
  width:100%;
  flex:1;
  min-height:0;
  object-fit:cover;
  object-position:top center;
  display:block;
}

#portrait-name {
  font-family:'Cinzel', serif;
  font-size:clamp(9px, 0.8vw, 12px);
  letter-spacing:0.15em;
  color:rgba(220,190,130,0.92);
  text-align:center;
  width:100%;
  padding:8px 4px;
  background:rgba(8,5,2,0.5);
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

#speech { 
  flex:1;
  min-width:0;
  padding:clamp(10px, 1.5vh, 20px) clamp(12px, 1.8vw, 24px);
  display:flex;
  align-items:flex-start;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:thin;
  scrollbar-color:rgba(180,140,80,0.3) transparent;
  cursor:pointer;
  position:relative;
}
#speech::after {
  content:'▶';
  position:absolute;
  bottom:12px;
  right:16px;
  font-size:12px;
  color:rgba(220,190,130,0.4);
  pointer-events:none;
  transition:color 0.3s;
}
#speech:hover::after {
  color:rgba(220,190,130,0.85);
}

#speech p {
  font-family:'IM Fell English', serif;
  font-style:normal;
  font-size:clamp(15px, 1.7vw, 22px);
  line-height:1.7;
  color:rgba(235,215,175,0.92);
  word-wrap:break-word;
  overflow-wrap:break-word;
  width:100%;
}
.stage-dir {
  display:block;
  font-style:italic;
  font-size:0.85em;
  color:rgba(200,175,130,0.55);
  margin:6px 0;
}

/* ════ TITLE SCREEN ════ */
#title-screen {
  position:fixed; inset:0; z-index:500;
  background:#0e0904;
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  padding:20vh 0 12vh;
  transition:opacity 1s;
}
#title-screen.hidden { opacity:0; pointer-events:none; }
#title-group {
  display:flex; flex-direction:column;
  align-items:center; gap:clamp(12px,2vh,24px);
}
#game-title {
  font-family:'Cinzel',serif;
  font-size:clamp(22px,4vw,52px);
  letter-spacing:0.3em; text-transform:uppercase;
  color:rgba(220,190,130,0.92); text-align:center;
}
#game-subtitle {
  font-family:'IM Fell English',serif; font-style:italic;
  font-size:clamp(18px,2.2vw,32px);
  color:rgba(180,150,100,0.75); text-align:center;
}
#start-btn {
  font-family:'Cinzel',serif;
  font-size:clamp(14px,1.6vw,20px); letter-spacing:0.35em; text-transform:uppercase;
  color:rgba(230,200,140,0.9); background:transparent;
  border:1px solid rgba(180,140,60,0.5); padding:16px 48px; border-radius:4px;
  cursor:pointer; transition:all 0.3s;
}
#start-btn:hover {
  background:rgba(180,140,60,0.15); border-color:rgba(180,140,60,0.9);
  color:rgba(255,230,170,1); box-shadow:0 0 30px rgba(180,140,60,0.2);
}

/* ════ INTRO SCREEN ════ */
#intro {
  position:fixed; inset:0; z-index:400;
  background:#0e0904;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.8s;
}
#intro.visible { opacity:1; pointer-events:auto; }

#intro-inner {
  display:flex; flex-direction:row;
  width:90%; max-width:860px;
  height:clamp(260px,44vh,420px);
  gap:clamp(20px,4vw,56px);
  padding:0 20px;
}

/* Portrait column */
#ragvir-portrait {
  width:clamp(150px,20vw,260px);
  height:100%;
  flex-shrink:0;
  display:flex; flex-direction:column;
  opacity:0; transition:opacity 1.2s;
}
#ragvir-portrait.visible { opacity:1; }
#ragvir-portrait img {
  width:100%; flex:1; min-height:0;
  object-fit:contain; object-position:top center;
  display:block; border-radius:4px;
  box-shadow:0 4px 24px rgba(0,0,0,0.7);
}
#ragvir-name {
  font-family:'Cinzel',serif;
  font-size:clamp(9px,0.85vw,11px); letter-spacing:0.2em;
  color:rgba(200,165,100,0.7); text-align:center; text-transform:uppercase;
  margin-bottom:8px; flex-shrink:0;
}

/* Text column */
#intro-text-area {
  flex:1; min-width:0; height:100%;
  display:flex; flex-direction:column;
}
#intro-title {
  font-family:'Cinzel',serif;
  font-size:clamp(10px,1vw,13px); letter-spacing:0.3em; text-transform:uppercase;
  color:rgba(180,140,60,0.5); margin-bottom:clamp(10px,2vh,24px); flex-shrink:0;
}
#intro-text {
  font-family:'IM Fell English',serif;
  font-size:clamp(15px,1.8vw,22px); line-height:1.8;
  color:rgba(230,210,170,0.92);
  flex:1; min-height:0;
  overflow-y:auto; overflow-x:hidden;
  scrollbar-width:thin; scrollbar-color:rgba(180,140,60,0.3) transparent;
  opacity:0; transition:opacity 1.2s ease;
}
#intro-text.visible { opacity:1; }
#intro-footer {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:clamp(14px,2.5vh,28px); flex-shrink:0;
}
#scene-dots { display:flex; gap:8px; }
.dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(180,140,60,0.25); transition:background 0.3s;
}
.dot.active { background:rgba(180,140,60,0.85); }
#intro-btn {
  font-family:'Cinzel',serif;
  font-size:clamp(10px,1vw,13px); letter-spacing:0.2em; text-transform:uppercase;
  color:rgba(220,190,130,0.85); background:transparent;
  border:1px solid rgba(180,140,60,0.4); padding:8px 22px; border-radius:3px;
  cursor:pointer; opacity:0; transition:opacity 0.6s, background 0.2s, color 0.2s;
}
#intro-btn.visible { opacity:1; }
#intro-btn:hover {
  background:rgba(180,140,60,0.2); color:rgba(240,215,160,1);
  border-color:rgba(180,140,60,0.7);
}

/* ════ NARRATION OVERLAY ════ */
#narration {
  position:absolute;
  inset:0;
  z-index:10;
  background:rgba(10,6,2,0.88);
  backdrop-filter:blur(8px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:clamp(20px,4vh,48px) clamp(24px,6vw,100px);
  transform:translateY(-100%);
  transition:transform 0.9s cubic-bezier(0.4,0,0.2,1);
}
#narration.visible { transform:translateY(0); }

#narration-text {
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(15px,1.7vw,22px);
  line-height:1.9;
  color:rgba(235,215,175,0.88);
  text-align:center;
  max-width:60ch;
  opacity:0;
  transition:opacity 0.9s ease;
}
#narration-text.visible { opacity:1; }

#narration-btn {
  font-family:'Cinzel',serif;
  font-size:clamp(10px,1vw,13px);
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:rgba(220,190,130,0.85);
  background:transparent;
  border:1px solid rgba(180,140,60,0.4);
  padding:8px 22px;
  border-radius:3px;
  cursor:pointer;
  margin-top:clamp(16px,3vh,32px);
  opacity:0;
  transition:opacity 0.6s, background 0.2s, color 0.2s;
}
#narration-btn.visible { opacity:1; }
#narration-btn:hover {
  background:rgba(180,140,60,0.2);
  color:rgba(240,215,160,1);
  border-color:rgba(180,140,60,0.7);
}
/* ── WINDOW OVERLAY ── */
#window-overlay {
  position:fixed;
  inset:0;
  z-index:200;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.6s;
}
#window-overlay.visible {
  opacity:1;
  pointer-events:auto;
}
#window-overlay-img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
#window-toggle {
  position:absolute;
  top:20px;
  right:130px;
  font-family:'Cinzel',serif;
  font-size:13px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:rgba(220,190,130,0.85);
  background:rgba(10,6,2,0.7);
  border:1px solid rgba(180,140,60,0.4);
  padding:8px 18px;
  border-radius:3px;
  cursor:pointer;
}
#window-toggle:hover {
  background:rgba(180,140,60,0.2);
  color:rgba(240,215,160,1);
}

#window-close {
  position:absolute;
  top:20px;
  right:24px;
  font-family:'Cinzel',serif;
  font-size:13px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:rgba(220,190,130,0.85);
  background:rgba(10,6,2,0.7);
  border:1px solid rgba(180,140,60,0.4);
  padding:8px 18px;
  border-radius:3px;
  cursor:pointer;
}
#window-close:hover {
  background:rgba(180,140,60,0.2);
  color:rgba(240,215,160,1);
}
#isolde-hotspot {
  position:absolute;
  left:48.6%;
  top:42.7%;
  width:12%;
  height:35%;
  cursor:pointer;
  z-index:210;
  border-radius:4px;
}
#isolde-hotspot.debug {
  outline:3px solid rgba(50,200,50,0.8);
  background:rgba(50,200,50,0.1);
}

/* ── CARD PANEL ── */
#card-panel {
  position:fixed;
  top:0; right:0;
  width:clamp(480px, 52vw, 700px);
  height:100vh;
  z-index:50;
  display:flex;
  flex-direction:column;
  transform:translateX(100%);
  transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);
  background:transparent;
  pointer-events:none;
}
#card-panel.open {
  transform:translateX(0);
  pointer-events:auto;
}
#card-parchment {
  flex:1;
  margin:clamp(16px,3vh,40px) clamp(16px,2vw,36px);
  border-radius:8px;
  overflow:hidden;
  box-shadow:-8px 0 40px rgba(0,0,0,0.5), 0 8px 32px rgba(0,0,0,0.4);
  display:flex;
  flex-direction:column;
  position:relative;
}
#card-parchment-bg {
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}
#card-parchment-content {
  position:relative;
  z-index:2;
  padding:clamp(16px,3vh,32px) clamp(16px,2.5vw,36px);
  display:flex;
  flex-direction:column;
  height:100%;
}
#card-panel-title {
  font-family:'Cinzel',serif;
  font-size:clamp(13px,1.3vw,17px);
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:rgba(60,35,10,0.9);
  margin-bottom:4px;
}
#card-panel-subtitle {
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(12px,1.1vw,15px);
  color:rgba(80,50,20,0.65);
  margin-bottom:clamp(10px,2vh,20px);
}
#card-panel-body {
  flex:1;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:rgba(60,35,10,0.2) transparent;
}
#card-panel-footer {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:clamp(8px,1.5vh,16px);
  gap:8px;
  flex-shrink:0;
}
.parchment-btn {
  font-family:'Cinzel',serif;
  font-size:clamp(10px,0.9vw,12px);
  letter-spacing:0.15em;
  text-transform:uppercase;
  background:rgba(60,35,10,0.08);
  border:1px solid rgba(60,35,10,0.25);
  padding:6px 14px;
  border-radius:3px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  color:rgba(60,35,10,0.75);
}
.parchment-btn:hover { background:rgba(60,35,10,0.16); }
.parchment-btn.primary {
  background:rgba(60,35,10,0.14);
  border-color:rgba(60,35,10,0.45);
  color:rgba(60,35,10,0.92);
}
.parchment-btn.primary:hover { background:rgba(60,35,10,0.24); }
.parchment-btn.copied {
  color:rgba(30,80,30,0.8);
  border-color:rgba(30,80,30,0.4);
  background:rgba(30,80,30,0.08);
}
#card-panel-close {
  position:absolute;
  top:12px; right:12px;
  font-family:'Cinzel',serif;
  font-size:11px; letter-spacing:0.15em; text-transform:uppercase;
  color:rgba(60,35,10,0.6);
  background:transparent;
  border:none;
  cursor:pointer;
  z-index:10;
  padding:4px 8px;
}
#card-panel-close:hover { color:rgba(60,35,10,0.9); }

/* Textbook card styles */
.tb-chapter { font-family:'Cinzel',serif; font-size:clamp(12px,1.1vw,14px); letter-spacing:0.15em; color:rgba(60,15,10,0.75); margin:0 0 14px; }
.tb-section { font-family:'Cinzel',serif; font-size:clamp(10px,0.9vw,12px); letter-spacing:0.12em; color:rgba(60,15,10,0.65); margin:16px 0 6px; }
.tb-text { font-family:'IM Fell English',serif; font-size:clamp(14px,1.3vw,17px); line-height:1.85; color:rgba(40,10,5,0.85); margin-bottom:8px; }
.tb-eq { margin:12px 0 12px 12px; padding:8px 12px; border-left:2px solid rgba(60,15,10,0.2); background:rgba(60,15,10,0.04); border-radius:0 3px 3px 0; }
.tb-damaged { font-family:'IM Fell English',serif; font-style:italic; font-size:clamp(12px,1.1vw,14px); color:rgba(60,15,10,0.4); margin-top:16px; border-top:1px solid rgba(60,15,10,0.15); padding-top:10px; }


.parchment-table {
  border-collapse:collapse;
  width:100%;
  font-family:'IM Fell English',serif;
  table-layout:fixed;
}
.parchment-table .ds-header {
  font-family:'Cinzel',serif;
  font-size:clamp(9px,0.85vw,11px);
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:rgba(60,35,10,0.75);
  text-align:center;
  padding:0 0 5px;
  border-bottom:1px solid rgba(60,35,10,0.35);
}
.parchment-table th {
  font-family:'Cinzel',serif;
  font-size:clamp(8px,0.75vw,10px);
  letter-spacing:0.1em;
  color:rgba(60,35,10,0.55);
  text-align:center;
  padding:4px 2px 3px;
  border-bottom:1px solid rgba(60,35,10,0.15);
}
.parchment-table td {
  text-align:center;
  padding:3px 2px;
  color:rgba(40,20,5,0.85);
  font-size:clamp(11px,1.1vw,14px);
}
.parchment-table tr:nth-child(odd) td { background:rgba(60,35,10,0.03); }
.parchment-table .sep { background:transparent !important; width:10px; }


#cursor-tip {
  position:fixed;
  pointer-events:none;
  z-index:9999;
  font-family:'Cinzel',serif;
  font-size:12px;
  letter-spacing:0.15em;
  color:rgba(220,190,130,0.95);
  background:rgba(10,6,2,0.85);
  border:1px solid rgba(180,140,60,0.35);
  padding:6px 14px;
  border-radius:3px;
  white-space:nowrap;
  opacity:0;
  transition:opacity 0.15s;
}
#cursor-tip.visible { opacity:1; }

#window-hotspot {
  position:absolute;
  left:32%;
  top:4%;
  width:36%;
  height:55%;
  cursor:pointer;
  z-index:5;
  border-radius:4px;
}
#window-hotspot.debug {
  outline:3px solid rgba(255,50,50,0.8);
  background:rgba(255,50,50,0.08);
}
#window-hotspot.debug::after {

// ── DRAGGABLE HOTSPOTS ───────────────────────────────────────────────────────
function makeDraggable(el, parentSelector) {
  let dragging = false, startX, startY, origLeft, origTop;

  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true;
    const parent = el.closest(parentSelector) || document.body;
    const pr = parent.getBoundingClientRect();
    const er = el.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    origLeft = ((er.left - pr.left) / pr.width) * 100;
    origTop  = ((er.top  - pr.top)  / pr.height) * 100;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const parent = el.closest(parentSelector) || document.body;
    const pr = parent.getBoundingClientRect();
    const dx = ((e.clientX - startX) / pr.width)  * 100;
    const dy = ((e.clientY - startY) / pr.height) * 100;
    el.style.left = (origLeft + dx) + '%';
    el.style.top  = (origTop  + dy) + '%';
  });

  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    const parent = el.closest(parentSelector) || document.body;
    const pr = parent.getBoundingClientRect();
    const er = el.getBoundingClientRect();
    const l = (((er.left - pr.left) / pr.width)  * 100).toFixed(1);
    const t = (((er.top  - pr.top)  / pr.height) * 100).toFixed(1);
    const w = ((er.width  / pr.width)  * 100).toFixed(1);
    const h = ((er.height / pr.height) * 100).toFixed(1);
    console.log(`${el.id}: left:${l}% top:${t}% width:${w}% height:${h}%`);
  });
}

function openCard(card) {

    document.querySelectorAll('.tb-eq[data-katex]').forEach(el => {
      katex.render(el.dataset.katex, el, {throwOnError:false, displayMode:true});
    });
    document.querySelectorAll('.tb-inline[data-katex]').forEach(el => {
      katex.render(el.dataset.katex, el, {throwOnError:false, displayMode:false});

// ── INTRO ────────────────────────────────────────────────────────────────────
const INTRO_SCENES = [
  "You found it. Good. I wasn't sure anyone would.\n\nThis is — or was — the Aldric Library's east reading room. The Great Storm took most of it. What you see now is what survived.",
  "I've spent twenty years putting this collection together. Every shelf, every document, every method — chosen because it helped someone understand something they couldn't see before.\n\nSome of it is damaged. Some of it is gone. Some of it I'm not entirely sure you should trust.",

let currentScene = 0;
let sceneTimers = [];

function clearSceneTimers() {
  sceneTimers.forEach(id => clearTimeout(id));
  sceneTimers = [];
}

function startIntro() {
  const title = document.getElementById('title-screen');
  title.style.opacity = '0';
  setTimeout(() => {
    title.style.display = 'none';
    const intro = document.getElementById('intro');
    intro.classList.add('visible');

      setTimeout(() => showScene(0), 1400);
    }, 600);
  }, 1000);
}

function showScene(idx) {
  clearSceneTimers();
  currentScene = idx;
  const textEl = document.getElementById('intro-text');
  const btn    = document.getElementById('intro-btn');

  btn.textContent = idx < INTRO_SCENES.length - 1 ? 'Continue' : 'Enter the Library';

  btn.style.transition = 'none';
  btn.style.opacity = '0';
  btn.classList.remove('visible');
  requestAnimationFrame(() => { btn.style.transition = ''; btn.style.opacity = ''; });

  sceneTimers.push(setTimeout(() => {
    textEl.innerHTML = INTRO_SCENES[idx]
      .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
    document.querySelectorAll('.dot').forEach((d,i) =>
      d.classList.toggle('active', i === idx));
    sceneTimers.push(setTimeout(() => {
      textEl.classList.add('visible');
      sceneTimers.push(setTimeout(() => btn.classList.add('visible'), 1400));
    }, 80));
  }, 1200));
}

function nextScene() {
  if (currentScene < INTRO_SCENES.length - 1) {
    showScene(currentScene + 1);

      }, 600);
    }, 1200);
  }
}

// ── NARRATION ────────────────────────────────────────────────────────────────
const NARRATION_SCENES = [
  "The east door opens slowly. Cold air moves through the reading room. A young woman steps inside, still wearing her coat, a folder pressed against her chest. She looks at the shelves the way people do when they are hoping the answer is somewhere visible.",
  "She has been here before — not this library, but this feeling. The numbers added up. The supervisor nodded. And yet something in the work felt like a locked room she couldn't see into."
];

let narrationIndex = 0;
let narrationTimers = [];

function clearNarrationTimers() {
  narrationTimers.forEach(id => clearTimeout(id));
  narrationTimers = [];
}

function startNarration() {
  const overlay = document.getElementById('narration');
  overlay.classList.add('visible');
  narrationTimers.push(setTimeout(() => showNarrationScene(0), 700));
}

function showNarrationScene(idx) {
  clearNarrationTimers();
  narrationIndex = idx;
  const textEl = document.getElementById('narration-text');
  const btn    = document.getElementById('narration-btn');

  btn.textContent = idx < NARRATION_SCENES.length - 1 ? 'Continue' : 'Continue';
  textEl.classList.remove('visible');
  btn.style.transition = 'none';
  btn.style.opacity = '0';
  btn.classList.remove('visible');
  requestAnimationFrame(() => { btn.style.transition = ''; btn.style.opacity = ''; });

  narrationTimers.push(setTimeout(() => {
    textEl.textContent = NARRATION_SCENES[idx];
    narrationTimers.push(setTimeout(() => {
      textEl.classList.add('visible');
      narrationTimers.push(setTimeout(() => btn.classList.add('visible'), 1200));
    }, 80));
  }, 400));
}

function nextNarrationScene() {
  if (narrationIndex < NARRATION_SCENES.length - 1) {
    showNarrationScene(narrationIndex + 1);
  } else {
    clearNarrationTimers();
    const overlay  = document.getElementById('narration');
    const textEl   = document.getElementById('narration-text');
    const btn      = document.getElementById('narration-btn');

    btn.style.transition = 'none';
    btn.style.opacity = '0';
    textEl.classList.remove('visible');

    narrationTimers.push(setTimeout(() => {
      overlay.classList.remove('visible');
      setTimeout(() => {
        document.getElementById('speech').style.opacity = '1';
      }, 700);
    }, 300));
  }
}

// ── CURSOR TOOLTIP ───────────────────────────────────────────────────────────
const tip = document.getElementById('cursor-tip');

function showTip(text, e) {
  tip.textContent = text;
  tip.classList.add('visible');
  moveTip(e);
}
function moveTip(e) {
  tip.style.left = (e.clientX - tip.offsetWidth / 2) + 'px';
  tip.style.top  = (e.clientY - tip.offsetHeight - 12) + 'px';
}
function hideTip() {
  tip.classList.remove('visible');
}

function bindTip(el, text) {
  el.addEventListener('mouseenter', e => showTip(text, e));
  el.addEventListener('mousemove',  e => moveTip(e));
  el.addEventListener('mouseleave', hideTip);
}

bindTip(document.getElementById('window-hotspot'), 'Look outside');
bindTip(document.getElementById('isolde-hotspot'), 'Let her in');
</script>
<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {

  // ── SETUP ──────────────────────────────────────────────────────────────────
  const bg     = document.getElementById('bg');
  const canvas = document.getElementById('three-canvas');

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene  = new THREE.Scene();

  // Orthographic camera sized to match bg element
  let W = bg.offsetWidth  || window.innerWidth;
  let H = bg.offsetHeight || window.innerHeight;

  function makeCamera(w, h) {
    return new THREE.OrthographicCamera(-w/2, w/2, h/2, -h/2, 0.1, 100);
  }
  let camera = makeCamera(W, H);
  camera.position.z = 10;
  renderer.setSize(W, H);

  // ── TEXTURE LOADER ─────────────────────────────────────────────────────────
  const loader = new THREE.TextureLoader();
  loader.crossOrigin = '';

  function loadTex(path, cb) {
    loader.load(path, tex => {
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      if (cb) cb(tex);
    });
  }

  // ── LAYER FACTORY ──────────────────────────────────────────────────────────
  function makeLayer(texPath, z, scaleX, scaleY, blending, offsetX, offsetY) {
    const geo = new THREE.PlaneGeometry(W * scaleX, H * scaleY);
    const mat = new THREE.MeshBasicMaterial({
      transparent: true,
      depthWrite: false,
      blending: blending === 'additive' ? THREE.AdditiveBlending : THREE.NormalBlending,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(offsetX || 0, offsetY || 0, z);
    scene.add(mesh);
    loadTex(texPath, tex => { mat.map = tex; mat.needsUpdate = true; });
    return { mesh, mat, baseX: offsetX || 0, baseY: offsetY || 0, scaleX, scaleY };
  }

  // ── LAYERS — just the frame overlay ───────────────────────────────────────
  const layers = [
    // Frame — baked position from tuning session
    { ...makeLayer('./aldricimages/librarylayer7.png', 1, 1.15, 1.15, 'normal', 0, -H*0.02), px: 0.065, py: 0.022 },
  ];

  // ── TUNING PANEL ───────────────────────────────────────────────────────────
  const panel = document.createElement('div');
  panel.id = 'tune-panel';
  panel.style.cssText = `
    position:fixed; top:10px; left:10px; z-index:9999;
    background:rgba(10,6,2,0.92); border:1px solid rgba(180,140,60,0.4);
    padding:12px 16px; font-family:'Cinzel',serif; font-size:12px;
    color:rgba(220,190,130,0.9); border-radius:4px; width:260px;
    display:none; user-select:none;
  `;

  const frameL = layers[0];
  panel.innerHTML = `
    <div id="tune-handle" style="display:flex;justify-content:space-between;align-items:center;
      margin-bottom:10px;cursor:grab;padding-bottom:8px;border-bottom:1px solid rgba(180,140,60,0.2)">
      <span style="letter-spacing:0.15em;font-size:11px">⠿ FRAME</span>
      <button onclick="document.getElementById('tune-panel').style.display='none'"
        style="background:none;border:none;color:rgba(220,190,130,0.7);cursor:pointer;font-size:14px">✕</button>
    </div>
    ${['X','Y','Scale'].map((label, i) => {
      const min = i < 2 ? -1 : 0.1;
      const max = i < 2 ? 1 : 3;
      const val = i === 0 ? (frameL.baseX/W).toFixed(2)
                : i === 1 ? (frameL.baseY/H).toFixed(2)
                : frameL.scaleX.toFixed(2);
      const axis = ['x','y','z'][i];
      return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <span style="width:36px;font-size:10px;opacity:0.7">${label}</span>
        <input type="range" min="${min}" max="${max}" step="0.01" value="${val}"
          style="flex:1;accent-color:#b48c3c"
          oninput="window._tune('${axis}',parseFloat(this.value));this.nextSibling.textContent=parseFloat(this.value).toFixed(2)">
        <span style="width:36px;font-size:10px;text-align:right">${val}</span>
      </div>`;
    }).join('')}
    <button onclick="window._copyTune()"
      style="width:100%;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.15em;
      background:rgba(180,140,60,0.15);border:1px solid rgba(180,140,60,0.4);
      color:rgba(220,190,130,0.9);padding:6px;cursor:pointer;border-radius:3px;margin-top:4px">
      COPY VALUES</button>
  `;
  document.body.appendChild(panel);

  // Drag
  let _drag = false, _ox = 0, _oy = 0;
  document.getElementById('tune-handle').addEventListener('mousedown', e => {
    _drag = true; _ox = e.clientX - panel.offsetLeft; _oy = e.clientY - panel.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => { if (_drag) { panel.style.left=(e.clientX-_ox)+'px'; panel.style.top=(e.clientY-_oy)+'px'; }});
  document.addEventListener('mouseup', () => _drag = false);

  document.addEventListener('keydown', e => {
    if (e.key==='t'||e.key==='T') panel.style.display = panel.style.display==='none'?'block':'none';
  });

  window._tune = (axis, val) => {
    if (axis==='x') { frameL.baseX=val*W; frameL.mesh.position.x=val*W; }
    else if (axis==='y') { frameL.baseY=val*H; frameL.mesh.position.y=val*H; }
    else { frameL.scaleX=val; frameL.mesh.scale.set(val,val,1); }
  };
  window._copyTune = () => {
    const s = `Frame: X=${(frameL.baseX/W).toFixed(3)} Y=${(frameL.baseY/H).toFixed(3)} Scale=${frameL.scaleX.toFixed(3)}`;
    navigator.clipboard.writeText(s).then(()=>alert('Copied: '+s));
  };
  // ── END TUNING PANEL ───────────────────────────────────────────────────────

  // ── RAIN ANIMATION ─────────────────────────────────────────────────────────
  const rainCanvas = document.createElement('canvas');
  rainCanvas.width  = 512;
  rainCanvas.height = 512;
  const rainCtx = rainCanvas.getContext('2d');
  const rainTex = new THREE.CanvasTexture(rainCanvas);
  rainTex.minFilter = THREE.LinearFilter;

  // Rain drop state
  const DROPS = 120;
  const drops = Array.from({ length: DROPS }, () => ({
    x: Math.random(),
    y: Math.random(),
    len: Math.random() * 0.06 + 0.03,
    speed: Math.random() * 0.004 + 0.003,
    opacity: Math.random() * 0.25 + 0.05,
  }));

  function drawRain(t) {
    rainCtx.clearRect(0, 0, 512, 512);
    drops.forEach(d => {
      d.y += d.speed;
      if (d.y > 1.1) { d.y = -0.1; d.x = Math.random(); }
      const x1 = d.x * 512;
      const y1 = d.y * 512;
      const x2 = x1 - 2;
      const y2 = y1 + d.len * 512;
      rainCtx.beginPath();
      rainCtx.moveTo(x1, y1);
      rainCtx.lineTo(x2, y2);
      rainCtx.strokeStyle = `rgba(180,200,220,${d.opacity})`;
      rainCtx.lineWidth = 0.8;
      rainCtx.stroke();
    });
    rainTex.needsUpdate = true;
  }

  // Add rain as an extra additive plane on top of L2
  const rainGeo = new THREE.PlaneGeometry(W * 0.52, H * 0.52);
  const rainMat = new THREE.MeshBasicMaterial({
    map: rainTex,
    transparent: true,
    blending: THREE.NormalBlending,
    depthWrite: false,
    opacity: 0.4,
  });
  const rainMesh = new THREE.Mesh(rainGeo, rainMat);
  rainMesh.position.set(0, H * 0.08, 1.5);
  scene.add(rainMesh);

  // ── CANDLE FLICKER on L6 ───────────────────────────────────────────────────
  // Subtle opacity flicker on the objects layer to simulate candle light
  let flickerBase = 0.92;

  // ── DUST PARTICLES ─────────────────────────────────────────────────────────
  const DUST = 65;
  const dustPositions = new Float32Array(DUST * 3);
  const dustSpeeds = [];
  for (let i = 0; i < DUST; i++) {
    dustPositions[i*3]   = (Math.random() - 0.5) * W;
    dustPositions[i*3+1] = (Math.random() - 0.5) * H;
    dustPositions[i*3+2] = 4.5;
    dustSpeeds.push({
      x: (Math.random() - 0.5) * 0.08,
      y:  Math.random() * 0.12 + 0.05,
      phase: Math.random() * Math.PI * 2,
    });
  }
  const dustGeo = new THREE.BufferGeometry();
  dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
  const dustMat = new THREE.PointsMaterial({
    color: 0xdcbe82, size: 2.2,
    transparent: true, opacity: 0.35,
    sizeAttenuation: false,
  });
  scene.add(new THREE.Points(dustGeo, dustMat));

  // ── MOUSE ──────────────────────────────────────────────────────────────────
  let mx = 0, my = 0, tx = 0, ty = 0;
  document.addEventListener('mousemove', e => {
    tx = (e.clientX / window.innerWidth  - 0.5) * 2;
    ty = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  // ── CARD TILT ──────────────────────────────────────────────────────────────
  function init3DCardTilt() {
    document.querySelectorAll('.card-slot').forEach(card => {
      if (card._tiltBound) return;
      card._tiltBound = true;
      card.addEventListener('mousemove', e => {
        const r  = card.getBoundingClientRect();
        const dx = (e.clientX - (r.left + r.width/2))  / (r.width/2);
        const dy = (e.clientY - (r.top  + r.height/2)) / (r.height/2);
        card.style.transform = `translateX(-4px) perspective(350px) rotateY(${dx*13}deg) rotateX(${-dy*9}deg) translateZ(10px) scale(1.05)`;
        card.style.transition = 'transform 0.08s ease';
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = '';
        card.style.transition = 'transform 0.25s ease';
      });
    });
  }
  new MutationObserver(init3DCardTilt)
    .observe(document.getElementById('card-list'), { attributes: true, childList: true, subtree: true });

  // ── RESIZE ─────────────────────────────────────────────────────────────────
  function onResize() {
    W = bg.offsetWidth;
    H = bg.offsetHeight;
    renderer.setSize(W, H);
    camera = makeCamera(W, H);
    camera.position.z = 10;
    // Rebuild geometry sizes on resize would require recreating meshes;
    // for now just update camera — acceptable for fixed-layout game
  }
  window.addEventListener('resize', onResize);

  // ── ANIMATION LOOP ─────────────────────────────────────────────────────────
  let last = 0;
  function animate(ts) {
    requestAnimationFrame(animate);
    const dt = Math.min(ts - last, 50);
    last = ts;
    const t = ts / 1000;

    // Smooth mouse
    mx += (tx - mx) * 0.045;
    my += (ty - my) * 0.045;

    // Parallax — each layer moves relative to its base position
    layers.forEach(layer => {
      layer.mesh.position.x = layer.baseX - mx * layer.px * W;
      layer.mesh.position.y = layer.baseY + my * layer.py * H;
    });
    // Rain mesh stays fixed (window is baked into wall layer now)
    rainMesh.position.x = 0;
    rainMesh.position.y = H * 0.08;

    // Rain animation
    drawRain(t);

    // Candle flicker — subtle opacity pulse on frame
    layers[0].mat.opacity = Math.max(0.85, Math.min(1, flickerBase + Math.sin(t * 7.3) * 0.03 + Math.sin(t * 13.1) * 0.015));

    // Dust
    const pos = dustGeo.attributes.position.array;
    for (let i = 0; i < DUST; i++) {
      pos[i*3]   += dustSpeeds[i].x * dt * 0.01 + Math.sin(t*0.3 + dustSpeeds[i].phase) * 0.04;
      pos[i*3+1] += dustSpeeds[i].y * dt * 0.01;
      if (pos[i*3+1] >  H/2 + 10) { pos[i*3+1] = -H/2 - 10; pos[i*3] = (Math.random()-0.5)*W; }
      if (pos[i*3]   >  W/2)       pos[i*3] = -W/2;
      if (pos[i*3]   < -W/2)       pos[i*3] =  W/2;
    }
    dustGeo.attributes.position.needsUpdate = true;
    dustMat.opacity = 0.28 + Math.sin(t * 0.5) * 0.08;

    renderer.render(scene, camera);
  }

  // Start once scene becomes visible
  const sceneEl = document.getElementById('scene');
  new MutationObserver(() => {
    if (sceneEl.style.visibility === 'visible') {
      onResize();
      requestAnimationFrame(animate);
    }
  }).observe(sceneEl, { attributes: true, attributeFilter: ['style'] });

})();
</script>
