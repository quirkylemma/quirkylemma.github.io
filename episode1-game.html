<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>The Institute — First Floor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400&family=EB+Garamond:ital,wght@0,400;1,400&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --chalk:#EEE8C4;--gold:#C8A020;
  --wall:#252D1C;--wall-hi:#303D22;--wall-lo:#181E10;
  --board-bg:#0A1108;
  --amber:#FF8800;--neon-red:#EE1E1E;
  --paper:#F4F0DC;--paper-2:#EDE8CC;
  --ink:#1C1810;--ink-mid:#3C3020;--ink-f:#8A7A58;
  --rule:rgba(28,24,16,.12);
  --bar-h:58px;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{min-height:100%;overflow-x:hidden;background:#B8B0A0;font-family:'EB Garamond',Georgia,serif;}
#grain{position:fixed;inset:0;pointer-events:none;z-index:998;opacity:.07;mix-blend-mode:overlay;}

/* VIEWPORT */
#viewport{max-width:740px;width:100%;margin:0 auto;position:relative;min-height:100vh;background:var(--wall);box-shadow:0 0 0 1px rgba(0,0,0,.18),4px 4px 24px rgba(0,0,0,.22);overflow:hidden;}
#page{position:relative;display:flex;flex-direction:column;z-index:1;min-height:100vh;}

/* ROOM */
#room{
  position:absolute;inset:0;bottom:var(--bar-h);z-index:0;overflow:hidden;
  background:
    radial-gradient(ellipse at 50% -10%,rgba(255,252,210,.07) 0%,transparent 55%),
    linear-gradient(180deg,transparent 55%,rgba(0,0,0,.55) 85%,rgba(0,0,0,.85) 100%),
    radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(0,0,0,.35) 100%),
    linear-gradient(170deg,var(--wall-hi) 0%,var(--wall) 45%,var(--wall-lo) 100%);
}
#room::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px,transparent 48px),repeating-linear-gradient(90deg,rgba(0,0,0,.04) 0,rgba(0,0,0,.04) 1px,transparent 1px,transparent 80px);}
#room::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:rgba(255,252,210,.22);box-shadow:0 0 18px 4px rgba(255,252,210,.12),0 0 60px 16px rgba(255,252,210,.05);}

/* AMBIENT */
#ambient{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:
    radial-gradient(ellipse at 8%  0%,rgba(255,248,200,.08) 0%,transparent 45%),
    radial-gradient(ellipse at 92% 0%,rgba(255,248,200,.08) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 8%,rgba(255,120,0,.10)  0%,transparent 50%),
    radial-gradient(ellipse at 50% 11%,rgba(220,20,20,.06) 0%,transparent 38%);
  animation:amb-breathe 6s ease-in-out infinite,amb-flicker 8s ease-in-out infinite;
  transition:background 1s ease;
}
@keyframes amb-breathe{0%,100%{opacity:.7;}45%{opacity:1;}46%{opacity:.6;}47%{opacity:.9;}}
@keyframes amb-flicker{0%,91%,100%{opacity:1;}92.5%{opacity:.08;}93%{opacity:1;}95.4%{opacity:.3;}95.8%{opacity:1;}97.3%{opacity:.06;}97.6%{opacity:.85;}97.9%{opacity:.06;}98.2%{opacity:1;}}
body.lamp-left  #ambient{animation:none!important;opacity:1!important;background:radial-gradient(ellipse at 8%  0%,rgba(255,252,215,.40) 0%,transparent 62%),radial-gradient(ellipse at 8%  6%,rgba(255,252,215,.18) 0%,transparent 48%),radial-gradient(ellipse at 50% 50%,rgba(0,0,0,.06) 0%,transparent 100%);}
body.lamp-right #ambient{animation:none!important;opacity:1!important;background:radial-gradient(ellipse at 92% 0%,rgba(255,252,215,.40) 0%,transparent 62%),radial-gradient(ellipse at 92% 6%,rgba(255,252,215,.18) 0%,transparent 48%),radial-gradient(ellipse at 50% 50%,rgba(0,0,0,.06) 0%,transparent 100%);}
body.lamp-left.lamp-right #ambient{background:radial-gradient(ellipse at 8%  0%,rgba(255,252,215,.40) 0%,transparent 58%),radial-gradient(ellipse at 92% 0%,rgba(255,252,215,.40) 0%,transparent 58%),radial-gradient(ellipse at 50% 10%,rgba(255,252,215,.14) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(0,0,0,.06) 0%,transparent 100%);}
body.lamp-left  .sign-group,body.lamp-left  .sign-amb,body.lamp-left  .sign-ruin,body.lamp-left  #ambient,
body.lamp-right .sign-group,body.lamp-right .sign-amb,body.lamp-right .sign-ruin,body.lamp-right #ambient{animation-play-state:paused!important;}
@keyframes sign-breathe{0%,100%{opacity:.8;}45%{opacity:1;}46%{opacity:.65;}47%{opacity:.95;}}
@keyframes sign-flicker{0%,91%,100%{opacity:1;}92.5%{opacity:.15;}93%{opacity:1;}95.4%{opacity:.3;}95.8%{opacity:1;}97.3%{opacity:.08;}97.6%{opacity:.9;}97.9%{opacity:.08;}98.2%{opacity:1;}}
@keyframes sign-ruin{0%,59%,100%{opacity:1;}60.6%{opacity:.08;}61.2%{opacity:1;}80.4%{opacity:.35;}80.8%{opacity:1;}}
.sign-group{animation:sign-breathe 6s ease-in-out infinite;}
.sign-amb  {animation:sign-breathe 6s ease-in-out infinite,sign-flicker 8s ease-in-out infinite;}
.sign-ruin {animation:sign-breathe 6s ease-in-out infinite,sign-ruin 11s ease-in-out infinite 1.4s;}

/* DESK LAMP WARM WASH */
body.desk-lamp-on #toolbar{background:radial-gradient(ellipse at 50% 50%,rgba(220,175,50,.28) 0%,rgba(190,150,35,.14) 45%,transparent 75%),linear-gradient(180deg,#2A1C08 0%,#221408 8%,#1C1006 40%,#181008 85%,#120C04 100%);transition:background .5s ease;}
body.desk-lamp-on #toolbar::before{background:linear-gradient(90deg,#2C1E08 0%,#3A2C0A 15%,#5A4418 35%,#8A7030 50%,#9A8038 55%,#8A7030 60%,#5A4418 75%,#3A2C0A 88%,#2C1E08 100%);}

/* WALL LAMPS */
#wall-lamp-left,#wall-lamp{position:absolute;top:0;width:clamp(18px,2.5vw,30px);z-index:2;display:flex;flex-direction:column;align-items:center;cursor:pointer;}
#wall-lamp-left{left:clamp(16px,3vw,40px);}
#wall-lamp{right:clamp(8px,2vw,24px);}
#wall-lamp-left::before,#wall-lamp::before{content:'';width:4px;height:clamp(16px,3vh,28px);background:linear-gradient(90deg,#282A20 0%,#3A3C30 40%,#2A2C22 100%);border-left:1px solid rgba(0,0,0,.4);border-right:1px solid rgba(255,255,255,.04);flex-shrink:0;display:block;}
.lamp-shade{width:100%;height:clamp(10px,1.8vh,18px);background:linear-gradient(180deg,#3A3828 0%,#2C2A20 60%,#1E1C16 100%);clip-path:polygon(10% 0%,90% 0%,100% 100%,0% 100%);box-shadow:0 2px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);}
.lamp-bulb{width:clamp(5px,.7vw,7px);height:clamp(5px,.7vw,7px);border-radius:50%;background:rgba(40,36,24,.8);margin-top:-1px;transition:background .6s ease,box-shadow .6s ease;}
body.lamp-left  #wall-lamp-left .lamp-bulb,
body.lamp-right #wall-lamp      .lamp-bulb{background:rgba(255,252,200,1);box-shadow:0 0 4px rgba(255,248,200,.9),0 0 14px rgba(255,248,200,.5),0 0 36px rgba(255,248,200,.2);animation:bulb-flicker 8s ease-in-out infinite;}
@keyframes bulb-flicker{0%,88%,100%{opacity:1;}90%{opacity:.65;}92%{opacity:1;}94%{opacity:.5;}96%{opacity:1;}}
.lamp-cone{position:absolute;top:100%;left:50%;transform:translateX(-50%);width:clamp(80px,14vw,160px);height:clamp(60px,12vh,120px);background:radial-gradient(ellipse at 50% 0%,rgba(255,248,200,.06) 0%,transparent 70%);pointer-events:none;}

/* BOARD CONTENT */
#board-content{flex:1;min-height:0;position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:clamp(16px,3vh,32px) clamp(16px,3vw,32px) clamp(8px,1.5vh,16px);pointer-events:none;}
#board-content > *{pointer-events:auto;}

/* WINDOW */
#window-wide{width:min(387px,60%);flex-shrink:0;margin-bottom:clamp(18px,3vh,32px);}
.winw-frame{background:#1A1C14;padding:5px 5px 0;box-shadow:0 6px 28px rgba(0,0,0,.75),inset 0 0 0 1px rgba(255,255,255,.055),inset 2px 2px 4px rgba(0,0,0,.4);}
.winw-glass{height:clamp(90px,16vh,150px);position:relative;overflow:hidden;background:#04050C;}
.winw-rain{position:absolute;inset:0;z-index:4;pointer-events:none;}
.winw-bar-v{position:absolute;top:0;bottom:0;width:5px;background:linear-gradient(90deg,#181A12 0%,#222418 50%,#181A12 100%);border-left:1px solid rgba(0,0,0,.4);border-right:1px solid rgba(255,255,255,.04);z-index:5;margin-left:-2.5px;}
.winw-bar-h{position:absolute;top:50%;left:0;right:0;height:5px;background:linear-gradient(180deg,#222418 0%,#1A1C12 100%);border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(0,0,0,.4);z-index:5;margin-top:-2.5px;}
.winw-glare{position:absolute;top:3%;left:2%;width:30%;height:46%;background:linear-gradient(135deg,rgba(255,255,255,.022) 0%,transparent 60%);z-index:6;pointer-events:none;}
.winw-sill{height:6px;background:linear-gradient(180deg,#222418 0%,#181A10 100%);border-top:1px solid rgba(0,0,0,.5);box-shadow:0 2px 8px rgba(0,0,0,.45);}

/* BLACKBOARD */
#blackboard-zone{position:relative;z-index:10;width:min(640px,92%);flex-shrink:0;}
#bb-frame{
  position:relative;overflow:hidden;
  background:linear-gradient(150deg,#2C1E0A 0%,#1E1206 30%,#281A08 70%,#2C1E0A 100%);
  box-shadow:
    0 6px 0 rgba(0,0,0,.55),0 8px 18px rgba(0,0,0,.65),0 14px 40px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.05),inset 0 0 0 1px rgba(0,0,0,.6),
    /* Depth on the board surface — corners darker, centre lighter */
    inset 0 0 80px rgba(0,0,0,.6),
    inset 0 0 30px rgba(0,0,0,.35),
    inset 60px 0 80px rgba(0,0,0,.25),
    inset -60px 0 80px rgba(0,0,0,.25);
}
#bb-frame::before{content:'';position:absolute;inset:-3px;pointer-events:none;z-index:10;box-shadow:inset 0 3px 6px rgba(0,0,0,.4),inset 3px 0 6px rgba(0,0,0,.25),inset -3px 0 6px rgba(0,0,0,.25);}
#bb{
  background-color:var(--board-bg);
  padding:clamp(14px,2.5vh,28px) clamp(18px,3vw,40px);
  height:clamp(180px,calc(66vh - var(--bar-h) - clamp(90px,16vh,150px) - clamp(18px,3vh,32px)),480px);
  position:relative;display:flex;align-items:flex-start;
  overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;
  -webkit-mask-image:linear-gradient(180deg,transparent 0px,black 18px,black calc(100% - 18px),transparent 100%);
  mask-image:linear-gradient(180deg,transparent 0px,black 18px,black calc(100% - 18px),transparent 100%);
}
#bb::-webkit-scrollbar{width:0;}
#chalk{font-family:monospace;font-size:clamp(15px,2.1vw,22px);line-height:1.95;color:var(--chalk);position:relative;z-index:1;width:100%;word-wrap:break-word;overflow-wrap:break-word;text-shadow:0 0 16px rgba(238,232,192,.15),0 0 4px rgba(238,232,192,.08);}
#chalk p{margin-bottom:.4em;}
#chalk p:last-child{margin-bottom:0;}
#bb-tray{height:clamp(6px,.9vw,9px);background:linear-gradient(180deg,#1C1408 0%,#120E04 100%);border-top:1px solid rgba(0,0,0,.6);display:flex;align-items:center;padding:0 clamp(10px,1.5vw,18px);gap:7px;}
.cp{height:3px;border-radius:2px;background:linear-gradient(90deg,rgba(238,232,192,.22),rgba(238,232,192,.46),rgba(238,232,192,.22));}

/* CHEVRONS */
#bb-more,#bb-less,#strip-more,#strip-less{position:absolute;right:-22px;display:flex;flex-direction:column;align-items:center;gap:3px;opacity:0;transition:opacity .4s ease;pointer-events:auto;cursor:pointer;z-index:15;}
#bb-more{top:50%;transform:translateY(20px);}
#bb-less{top:50%;transform:translateY(-36px);}
#strip-more{bottom:4px;}
#strip-less{top:4px;}
#bb-more.visible,#bb-less.visible,#strip-more.visible,#strip-less.visible{opacity:1;}
#bb-more span,#bb-less span,#strip-more span,#strip-less span{display:block;width:7px;height:7px;border-right:2px solid var(--gold);border-bottom:2px solid var(--gold);animation:chev .9s ease-in-out infinite;}
#bb-more span,#strip-more span{transform:rotate(45deg);}
#bb-less span,#strip-less span{transform:rotate(-135deg);animation-name:chev-up;}
#bb-more span:nth-child(2),#bb-less span:nth-child(2),#strip-more span:nth-child(2),#strip-less span:nth-child(2){animation-delay:.2s;opacity:.55;}
@keyframes chev{0%,100%{transform:rotate(45deg) translate(0,0);opacity:.9;}50%{transform:rotate(45deg) translate(2px,2px);opacity:.4;}}
@keyframes chev-up{0%,100%{transform:rotate(-135deg) translate(0,0);opacity:.9;}50%{transform:rotate(-135deg) translate(2px,2px);opacity:.4;}}

/* BOARD STRIP */
#board-strip{width:min(640px,92%);position:relative;z-index:10;margin-top:clamp(22px,3.5vh,38px);max-height:clamp(140px,28vh,260px);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:clamp(4px,.7vh,8px);}
#board-strip::-webkit-scrollbar{width:0;}
#loc{font-family:monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:rgba(238,232,192,.5);cursor:pointer;transition:color .2s;}
#loc:hover{color:rgba(238,232,192,.85);}
#choices{display:flex;flex-direction:column;align-items:flex-start;gap:clamp(6px,1vh,11px);}
.bc{font-family:'Cormorant SC',Georgia,serif;font-size:clamp(17px,2vw,24px);font-weight:300;color:rgba(200,160,32,.55);background:none;border:none;border-bottom:1px solid rgba(200,160,32,.16);padding-bottom:2px;cursor:pointer;letter-spacing:.02em;line-height:1;text-align:left;transition:color .3s var(--ease),border-color .3s var(--ease),padding-left .22s var(--ease);}
.bc:hover{color:var(--gold);border-bottom-color:rgba(200,160,32,.55);padding-left:9px;}

/* CORRIDOR / ROOM ITEMS */
.corridor-progress{font-family:monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(238,232,192,.38);margin-bottom:clamp(6px,1vh,10px);}
/* Flanking room circles */
/* Room drawer strip — sits on top of toolbar, centred */
.room-col{
  position:absolute;
  bottom:100%;
  left:0;transform:none;
  display:flex;flex-direction:row;
  gap:0;
  z-index:21;
  pointer-events:auto;
  /* Cabinet housing */
  background:linear-gradient(180deg,#2A2418 0%,#1E1C12 100%);
  border:1px solid #4A3C20;
  border-bottom:none;
  border-top:2px solid #6A5428;
  outline:1px solid #1A1408;
  outline-offset:2px;
  padding:3px 3px 0;
  box-shadow:
    0 -3px 12px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,220,80,.08),
    inset 0 0 0 1px rgba(0,0,0,.4);
}
.room-btn{
  width:clamp(36px,5.5vw,52px);
  height:clamp(40px,6vh,52px);
  border-radius:0;
  border-right:1px solid #2A2418;
  font-family:'Cormorant SC',Georgia,serif;
  font-size:clamp(11px,1.3vw,13px);font-weight:600;letter-spacing:.04em;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:7px;
  transition:background .18s;position:relative;border-top:none;border-left:none;border-bottom:none;
  background:linear-gradient(180deg,#252018 0%,#1A1810 100%);
  color:rgba(200,165,60,.45);
}
.room-btn:last-child{border-right:none;}
.room-btn:hover{background:linear-gradient(180deg,#302A1C 0%,#22200E 100%);}
/* Brass knob */
.room-btn::before{
  content:'';
  position:absolute;
  top:8px;left:50%;transform:translateX(-50%);
  width:9px;height:9px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#B89020,#6A4E0A);
  box-shadow:0 1px 2px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,220,80,.2);
  transition:background .18s,box-shadow .18s;
}

.room-btn.visited{color:rgba(210,168,52,.7);}
.room-btn.visited::before{background:radial-gradient(circle at 35% 30%,#D4A828,#8A6A10);box-shadow:0 1px 2px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,230,100,.3);}
.room-btn.assessed{color:#C8A020;}
.room-btn.assessed::before{background:radial-gradient(circle at 35% 30%,#F0C840,#B89020);box-shadow:0 1px 2px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,240,120,.4),0 0 5px rgba(200,160,32,.3);}

.room-btn.current{color:#F0D060;background:linear-gradient(180deg,#2E2818 0%,#201E0C 100%);}
.room-btn.current::before{background:radial-gradient(circle at 35% 30%,#FFE060,#C8A020);box-shadow:0 1px 3px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,248,160,.5),0 0 8px rgba(220,180,32,.45);}


.corridor-actions{display:flex;flex-direction:column;}
.corridor-action{background:transparent;border:none;padding:clamp(7px,.9vh,10px) 0;cursor:pointer;transition:padding-left .2s var(--ease);display:flex;align-items:center;gap:11px;width:100%;}
.corridor-action:hover{padding-left:6px;}
.ca-a{width:2px;height:16px;flex-shrink:0;}
.ca-a.teal{background:#1C3A38;opacity:.7;}.ca-a.gold{background:var(--gold);opacity:.6;}
.ca-b{display:flex;flex-direction:column;gap:1px;}
.ca-title{font-family:'Cormorant SC',Georgia,serif;font-size:clamp(15px,1.8vw,20px);font-weight:300;color:rgba(200,160,32,.55);line-height:1.2;border-bottom:1px solid rgba(200,160,32,.16);padding-bottom:2px;transition:color .3s var(--ease),border-color .3s var(--ease);}
.corridor-action:hover .ca-title{color:var(--gold);border-bottom-color:rgba(200,160,32,.55);}
.ca-sub{display:none;}
.room-objects{display:flex;flex-direction:column;}
.room-object,.room-exam{background:transparent;border:none;border-top:1px solid var(--rule);padding:clamp(9px,1.2vh,12px) 0;cursor:pointer;transition:padding-left .22s var(--ease);display:flex;align-items:center;gap:12px;width:100%;}
.room-object:last-child{border-bottom:1px solid var(--rule);}
.room-object:hover,.room-exam:hover{padding-left:6px;}
.room-exam{border-top:1px solid rgba(139,26,26,.2);margin-top:8px;}
.ro-a,.re-a{width:2px;height:18px;flex-shrink:0;}
.re-a{background:#8B1A1A;opacity:.6;}
.ro-b,.re-b{display:flex;flex-direction:column;gap:1px;}
.ro-title{font-family:'Cormorant SC',Georgia,serif;font-size:clamp(16px,1.8vw,20px);font-weight:300;color:var(--gold);line-height:1.2;}
.re-title{font-family:'Cormorant SC',Georgia,serif;font-size:clamp(16px,1.8vw,20px);font-weight:300;color:var(--gold);line-height:1.2;}
.ro-desc{display:none;}
/* Lamp pulse — unread excerpts */
@keyframes lamp-pulse{
  0%,100%{filter:drop-shadow(0 0 0px rgba(220,175,50,0));}
  50%{filter:drop-shadow(0 0 10px rgba(220,175,50,.85)) drop-shadow(0 0 20px rgba(220,175,50,.35));}
}
#desk-lamp-stand.has-unread{animation:lamp-pulse 2s ease-in-out infinite;}
/* Excerpt document styles */
.excerpt-page{background:linear-gradient(160deg,#FAFAF7 0%,#F5F2EC 100%);padding:28px 32px 24px;position:relative;transform:rotate(-.4deg);box-shadow:0 1px 3px rgba(0,0,0,.07),2px 4px 16px rgba(0,0,0,.1),4px 8px 28px rgba(0,0,0,.07);border:1px solid rgba(26,22,16,.08);}
.excerpt-shadow{height:8px;background:radial-gradient(ellipse,rgba(0,0,0,.14) 0%,rgba(0,0,0,0) 70%);border-radius:50%;margin:0 20px;}
.excerpt-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1.5px solid #1C3A38;padding-bottom:8px;margin-bottom:18px;}
.excerpt-label{font-family:monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8A8070;}
.excerpt-ref{font-size:12px;color:#8A8070;font-style:italic;}
.excerpt-body p{font-size:16px;line-height:1.9;color:#3D3828;margin-bottom:.85em;}
.excerpt-body p:last-child{margin-bottom:0;}
/* ── 3D DOCUMENT OBJECT ── */
.doc-obj-wrap{position:relative;margin:6px 2px 14px;}
.doc-obj-back{position:absolute;bottom:-5px;left:6px;right:-6px;top:5px;background:var(--paper-2);border:1px solid rgba(26,22,16,.07);}
.doc-obj{
  position:relative;z-index:1;
  background:linear-gradient(160deg,#FAFAF7 0%,#F5F2EC 100%);
  border:1px solid rgba(26,22,16,.08);
  padding:22px 26px 20px;
  transform:rotate(-.4deg);
  box-shadow:0 1px 3px rgba(0,0,0,.07),2px 4px 16px rgba(0,0,0,.1),4px 8px 28px rgba(0,0,0,.07);
}
.doc-obj-head{
  display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:1.5px solid #1C3A38;padding-bottom:8px;margin-bottom:18px;
}
.doc-obj-label{font-family:monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8A8070;}
.doc-obj-loc  {font-size:12px;color:#8A8070;font-style:italic;}
.doc-obj-foot {width:75%;height:8px;background:radial-gradient(ellipse,rgba(0,0,0,.12) 0%,transparent 70%);border-radius:50%;margin:3px auto 0;}
.doc-obj p{font-size:16px;line-height:1.9;color:#3D3828;margin-bottom:.85em;}
.doc-obj p:last-child{margin-bottom:0;}

/* ── MANILA ENVELOPE ── */
.manila-wrap{position:relative;margin:8px 4px 14px;}
.manila-back{position:absolute;bottom:-5px;left:5px;right:-5px;top:5px;background:linear-gradient(135deg,#B8920A 0%,#9A780C 100%);border:1px solid rgba(0,0,0,.2);}
.manila{
  position:relative;z-index:1;
  background:linear-gradient(160deg,#D4A830 0%,#C49020 60%,#B07C10 100%);
  border:1px solid rgba(0,0,0,.22);
  padding:38px 16px 14px;
  transform:rotate(-.3deg);
  box-shadow:0 2px 8px rgba(0,0,0,.18),2px 4px 18px rgba(0,0,0,.14);
  overflow:visible;
}
.manila::before{
  content:'';position:absolute;top:0;left:0;right:0;height:38px;
  background:linear-gradient(170deg,#C89018 0%,#B07808 100%);
  clip-path:polygon(0 0,100% 0,100% 55%,50% 100%,0 55%);
  border-bottom:1px solid rgba(0,0,0,.15);
}
.manila-clasp{
  position:absolute;top:32px;left:50%;transform:translateX(-50%);
  width:14px;height:8px;
  background:radial-gradient(ellipse at 50% 30%,#E8C84A,#B8920A);
  border-radius:50%;
  border:1px solid rgba(0,0,0,.3);
  box-shadow:0 1px 3px rgba(0,0,0,.4);
  z-index:2;
}
.manila-inner{
  background:linear-gradient(160deg,#FAF6E8 0%,#F0E8D0 100%);
  padding:14px 16px;
  border:1px solid rgba(0,0,0,.08);
  position:relative;
}
.manila-inner::after{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(to bottom,transparent,transparent 22px,rgba(26,22,16,.045) 22px,rgba(26,22,16,.045) 23px);
  background-position:0 18px;pointer-events:none;
}
.manila-foot{width:80%;height:6px;background:radial-gradient(ellipse,rgba(0,0,0,.16) 0%,transparent 70%);border-radius:50%;margin:3px auto 0;}
.drow-m{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(26,22,16,.07);position:relative;z-index:1;}
.drow-m:last-child{border-bottom:none;}

/* Table two-drawer layout */
/* Bureau drawer slider */
.table-drawers{display:flex;flex-direction:column;height:clamp(280px,52vh,500px);}
.drawer-tabs{display:flex;flex-shrink:0;border-bottom:1px solid var(--rule);background:var(--paper);}
.drawer-tab{
  flex:1;padding:9px 0;
  font-family:monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(28,24,16,.28);background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;transition:color .2s,border-color .2s;
  margin-bottom:-1px;
}
.drawer-tab.active{color:#7A5500;border-bottom-color:#7A5500;}
.drawer-tab:first-child.active{color:#1C3A38;border-bottom-color:#1C3A38;}
.drawer-viewport{flex:1;overflow:hidden;position:relative;}
.drawer-track{display:flex;height:100%;transition:transform .38s var(--ease);will-change:transform;}
.drawer-pane{flex-shrink:0;height:100%;overflow-y:auto;padding:10px 14px 16px;-webkit-overflow-scrolling:touch;}
.drawer-pane::-webkit-scrollbar{width:2px;}
.drawer-pane::-webkit-scrollbar-thumb{background:var(--rule);}
.re-sub{font-family:monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#8B1A1A;opacity:.7;}
.re-sub.done{color:var(--gold);opacity:1;}

/* TOOLBAR */
#toolbar{flex-shrink:0;height:var(--bar-h);position:sticky;bottom:0;background:linear-gradient(180deg,#2A1C08 0%,#221408 8%,#1C1006 40%,#181008 85%,#120C04 100%);border-top:3px solid #4A3412;box-shadow:inset 0 1px 0 rgba(255,255,255,.09),inset 0 2px 0 rgba(255,255,255,.04),0 -8px 32px rgba(0,0,0,.7),0 -2px 8px rgba(0,0,0,.5);display:flex;align-items:center;padding:0 clamp(8px,2vw,20px);z-index:20;overflow:visible;position:relative;}
#toolbar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#2C1E08 0%,#5A4018 15%,#7A5C28 35%,#6A4E20 50%,#7A5C28 65%,#5A4018 85%,#2C1E08 100%);}
.ti{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0 clamp(7px,1.1vw,14px);height:100%;background:none;border:none;cursor:pointer;border-radius:0;border-right:1px solid rgba(255,255,255,.04);transition:opacity .15s;flex-shrink:0;text-decoration:none;position:relative;}
.ti:first-child{border-left:1px solid rgba(255,255,255,.04);}
.ti:hover::after{content:'';position:absolute;top:4px;left:4px;right:4px;bottom:4px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);}
.ti svg{display:block;flex-shrink:0;opacity:.55;transition:opacity .15s;}
.ti:hover svg{opacity:.9;}
.ti-lbl{font-family:monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(238,232,192,.32);white-space:nowrap;transition:color .15s;}
.ti:hover .ti-lbl{color:rgba(238,232,192,.75);}
.ti.active .ti-lbl{color:var(--gold);}
.ti-sep{flex:1;border:none;border-left:1px solid rgba(255,255,255,.04);margin:0 clamp(4px,.6vw,8px);height:60%;align-self:center;}
#ti-vdesk{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  pointer-events:none;
}
.ti-vdesk-v{
  font-family:'Cormorant SC',Georgia,serif;
  font-size:clamp(11px,1.6vw,16px);font-weight:300;
  color:rgba(200,160,32,.7);
  line-height:1;letter-spacing:.04em;
}
.ti-vdesk-lbl{
  font-family:monospace;
  font-size:7px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(200,160,32,.45);
  text-align:center;line-height:1.4;
}

/* Room flyup — appears above ti-room on hover */
#ti-study-wrap{position:relative;}
#ti-study-flyup{
  position:absolute;
  bottom:calc(100% + 2px);
  left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,#221408 0%,#1A1006 100%);
  border:1px solid rgba(238,232,192,.12);
  border-bottom:2px solid #4A3412;
  min-width:130px;
  z-index:200;
  display:none;
  flex-direction:column;
  box-shadow:0 -8px 24px rgba(0,0,0,.6);
}
#ti-study-flyup.open{display:flex;}
.flyup-item{
  background:none;border:none;
  padding:10px 16px;
  font-family:monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(238,232,192,.45);
  cursor:pointer;text-align:left;
  border-bottom:1px solid rgba(255,255,255,.04);
  transition:color .14s,background .14s;
  white-space:nowrap;
}
.flyup-item:last-child{border-bottom:none;}
.flyup-item:hover{color:var(--gold);background:rgba(238,232,192,.04);}
.flyup-item.exam-item{color:rgba(200,80,80,.75);}
.flyup-item.exam-item:hover{color:rgba(184,80,80,.9);}
.flyup-item.exam-item.done{color:rgba(200,160,32,.55);}
.flyup-item.exam-item.done:hover{color:var(--gold);}

#ti-more{display:none;}
#overflow-panel{display:none;position:absolute;bottom:calc(var(--bar-h)+2px);right:8px;background:#181C12;border:1px solid rgba(238,232,192,.1);min-width:130px;z-index:300;box-shadow:0 8px 28px rgba(0,0,0,.6);}
#overflow-panel.open{display:block;}
.ov-item{display:flex;align-items:center;gap:9px;padding:10px 14px;background:none;border:none;cursor:pointer;width:100%;transition:background .14s;text-decoration:none;}
.ov-item:hover{background:rgba(238,232,192,.06);}

/* POPUP */
#popup-overlay{position:fixed;inset:0;background:rgba(4,6,3,.86);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);opacity:0;transition:opacity .28s ease;pointer-events:none;}
#popup-overlay.open{opacity:1;pointer-events:auto;}
#popup-panel{position:relative;max-height:88vh;display:flex;flex-direction:column;transform:translateY(12px);transition:transform .32s var(--ease);overflow:hidden;}
#popup-overlay.open #popup-panel{transform:translateY(0);}
#popup-panel.parchment{background:var(--paper);width:min(620px,94vw);border-top:2px solid #1C3A38;box-shadow:0 24px 72px rgba(0,0,0,.7),0 0 0 1px rgba(0,0,0,.3);color:var(--ink);}
#popup-panel.dark{background:#1C2018;width:min(580px,94vw);border:1px solid rgba(238,232,192,.08);border-top:2px solid rgba(238,232,192,.18);box-shadow:0 24px 72px rgba(0,0,0,.75);color:var(--chalk);}
#popup-panel.dark-wide{background:#1C2018;width:min(860px,95vw);border:1px solid rgba(238,232,192,.08);border-top:2px solid rgba(238,232,192,.18);box-shadow:0 24px 72px rgba(0,0,0,.75);color:var(--chalk);}
.pp-head{flex-shrink:0;padding:12px 20px 10px;display:flex;justify-content:space-between;align-items:center;}
.parchment .pp-head{border-bottom:1px solid var(--rule);}
.dark .pp-head,.dark-wide .pp-head{border-bottom:1px solid rgba(238,232,192,.07);}
.pp-title{font-family:monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;}
.parchment .pp-title{color:var(--ink-f);}
.dark .pp-title,.dark-wide .pp-title{color:rgba(238,232,192,.45);}
.pp-close{
  background:none;cursor:pointer;
  font-family:monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  padding:4px 9px;border:1px solid;white-space:nowrap;flex-shrink:0;
  transition:background .14s,color .14s,border-color .14s;
}
.parchment .pp-close{color:rgba(28,24,16,.38);border-color:rgba(28,24,16,.18);}
.parchment .pp-close:hover{color:rgba(28,24,16,.78);border-color:rgba(28,24,16,.45);background:rgba(28,24,16,.04);}
.dark .pp-close,.dark-wide .pp-close{color:rgba(238,232,192,.38);border-color:rgba(238,232,192,.18);}
.dark .pp-close:hover,.dark-wide .pp-close:hover{color:rgba(238,232,192,.82);border-color:rgba(238,232,192,.5);}
.pp-body{flex:1;min-height:0;overflow-y:auto;padding:16px 22px 20px;-webkit-overflow-scrolling:touch;}
.pp-body::-webkit-scrollbar{width:2px;}
.pp-body::-webkit-scrollbar-thumb{background:rgba(28,24,16,.15);}
.pp-foot{flex-shrink:0;padding:0 22px 16px;}
.parchment .pp-foot{background:var(--paper);}
.dark .pp-foot{background:#1C2018;}

/* BOOKCASE — shelf-edge tabs left, content right */
#pp-doc-inner{
  display:flex;flex-direction:row;flex:1;min-height:0;
}
/* Left column — three shelf-edge tabs stacked top-to-bottom */
#doc-slider{
  flex-shrink:0;
  width:clamp(80px,14vw,110px);
  border-right:1px solid var(--rule);
  background:linear-gradient(90deg,var(--paper-2) 0%,var(--paper) 100%);
  display:flex;flex-direction:column;
  user-select:none;
}
.doc-tab{
  flex:1;
  display:flex;align-items:center;justify-content:flex-start;
  padding:0 0 0 12px;
  font-family:monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(28,24,16,.28);background:none;border:none;cursor:pointer;
  border-bottom:1px solid var(--rule);
  border-left:3px solid transparent;
  transition:color .2s,border-left-color .2s,background .2s;
  text-align:left;line-height:1.3;
  position:relative;
}
.doc-tab:last-child{border-bottom:none;}
.doc-tab:hover{color:rgba(28,24,16,.55);background:rgba(28,24,16,.03);}
.doc-tab.active{
  color:#1C3A38;
  border-left-color:#1C3A38;
  background:var(--paper);
}
/* Shelf-edge notch on active tab */
.doc-tab.active::after{
  content:'';
  position:absolute;right:-1px;top:25%;bottom:25%;
  width:2px;
  background:var(--paper);
  border-top:1px solid var(--rule);
  border-bottom:1px solid var(--rule);
}
#doc-bar{display:none;}
#doc-slider-track{display:none;}
#doc-slider-pill{display:none;}
#doc-slider-labels{display:contents;}/* labels are the tabs themselves */

/* Content viewport */
#doc-viewport{flex:1;min-height:0;overflow:hidden;position:relative;height:clamp(280px,52vh,520px);}
#doc-track{display:flex;flex-direction:column;width:100%;transition:transform .55s var(--ease);will-change:transform;}
.doc-pane{flex-shrink:0;width:100%;overflow-y:auto;padding:10px 14px 16px;-webkit-overflow-scrolling:touch;}
.doc-pane::-webkit-scrollbar{width:2px;}
.doc-pane::-webkit-scrollbar-thumb{background:var(--rule);}
.doc-empty{font-family:monospace;font-size:11px;letter-spacing:.14em;color:var(--ink-f);opacity:.5;text-align:center;padding:32px 0;font-style:italic;}

/* CONTENT */
.inotice{font-family:monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-f);opacity:.5;display:block;margin-bottom:12px;}
.narrator{font-family:monospace;font-size:11px;color:var(--ink-f);line-height:2;margin:8px 0;font-style:italic;}
.prompt{font-family:monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-f);opacity:.5;margin-bottom:7px;}
.choices{display:flex;flex-direction:column;}
.choice{background:transparent;border:none;border-top:1px solid var(--rule);color:var(--ink);font-family:'EB Garamond',Georgia,serif;font-size:clamp(16px,1.7vw,18px);padding:clamp(10px,1.3vh,13px) 0;text-align:left;cursor:pointer;transition:padding-left .22s var(--ease),color .14s;line-height:1.5;display:flex;align-items:baseline;gap:10px;width:100%;}
.choice:last-child{border-bottom:1px solid var(--rule);}
.choice:hover{padding-left:10px;}
.choice::before{content:"□";font-size:11px;color:var(--ink-f);flex-shrink:0;}
.choice:hover::before{content:"▸";color:var(--ink);}
.panel-header{font-family:monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#1C3A38;opacity:.75;padding-bottom:7px;margin-bottom:10px;border-bottom:1px solid rgba(28,58,56,.12);}
.panel-header.ochre{color:#7A5500;border-bottom-color:rgba(122,85,0,.12);}
.rcontent p,.ragvir p{font-size:clamp(16px,1.5vw,17px);line-height:1.9;color:var(--ink-mid);margin-bottom:.85em;}
.rcontent p:last-child,.ragvir p:last-child{margin-bottom:0;}
.ragvir p{font-style:italic;}
.exam-wrap-b{border-top:1px solid rgba(139,26,26,.18);padding-top:2px;}
.exam-header-b{font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#8B1A1A;opacity:.7;padding:9px 0 7px;}
.exam-q-b{font-family:'Courier Prime',monospace;font-size:clamp(16px,1.5vw,17px);line-height:1.8;color:var(--ink);padding:0 0 12px;border-bottom:1px solid var(--rule);}
.exam-opts-b{display:flex;flex-direction:column;}
.exam-opt-b{display:flex;align-items:baseline;gap:10px;padding:clamp(9px,1.2vh,12px) 0;border-bottom:1px solid var(--rule);font-family:'Courier Prime',monospace;font-size:clamp(16px,1.5vw,17px);color:var(--ink);cursor:pointer;transition:padding-left .2s var(--ease);width:100%;background:transparent;border-left:none;border-right:none;}
.exam-opt-b:last-child{border-bottom:none;}
.exam-opt-b:hover{padding-left:8px;}
.opt-label{color:var(--ink-f);flex-shrink:0;min-width:18px;}
.exam-reply-b{font-family:'Courier Prime',monospace;font-size:clamp(14px,1.4vw,16px);line-height:1.8;color:var(--ink-mid);margin:10px 0;padding-left:12px;border-left:2px solid rgba(28,24,16,.18);}
.exam-concluded-b{font-family:'Courier Prime',monospace;font-size:clamp(14px,1.4vw,16px);line-height:1.8;color:var(--ink-mid);margin:10px 0;padding-left:12px;border-left:2px solid var(--gold);}
.exam-skip{font-family:monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-f);opacity:.4;margin:5px 0 0;text-align:right;}
.exam-skip a{text-decoration:none;color:inherit;cursor:pointer;}
.exam-skip a:hover{opacity:1;}
#oh-wrap{display:flex;flex-direction:column;height:220px;}
#oh-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:2px 0;}
.oh-msg{max-width:92%;line-height:1.65;font-size:clamp(16px,1.5vw,17px);font-family:'EB Garamond',Georgia,serif;}
.oh-msg.clerk{align-self:flex-start;color:var(--ink);}
.oh-msg.student{align-self:flex-end;color:var(--ink-mid);font-style:italic;}
.oh-msg.clerk::before{content:'The Clerk — ';font-family:monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-f);display:block;margin-bottom:2px;opacity:.55;}
.oh-msg.student::before{content:'You — ';font-family:monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-f);display:block;margin-bottom:2px;opacity:.55;}
.oh-msg.thinking{color:var(--ink-f);font-style:italic;font-size:clamp(14px,1.4vw,16px);opacity:.55;}
#oh-input-row{display:flex;margin-top:8px;border-top:1px solid var(--rule);padding-top:8px;}
#oh-input{flex:1;background:transparent;border:none;border-bottom:1px solid rgba(28,24,16,.22);color:var(--ink);font-family:'EB Garamond',Georgia,serif;font-size:clamp(16px,1.5vw,17px);padding:4px 0;outline:none;}
#oh-input::placeholder{color:var(--ink-f);opacity:.35;font-style:italic;}
#oh-input:focus{border-bottom-color:var(--ink);}
#oh-send{background:transparent;border:none;border-bottom:1px solid var(--ink-f);color:var(--ink-f);font-family:monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:4px 0 4px 12px;cursor:pointer;transition:all .14s;}
#oh-send:hover{color:var(--ink);border-bottom-color:var(--ink);}
.letter-wrap{position:relative;margin:4px 0;}
.letter-shadow{position:absolute;bottom:-3px;left:3px;right:-3px;top:3px;background:rgba(28,24,16,.1);z-index:0;}
.letter-paper{position:relative;z-index:1;background:var(--paper-2);border-top:2px solid #1C3A38;padding:14px 16px;transform:rotate(-.15deg);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.letter-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid rgba(28,58,56,.15);padding-bottom:6px;margin-bottom:10px;}
.letter-label{font-family:monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-f);opacity:.55;}
.letter-body{font-size:clamp(14px,1.5vw,16px);line-height:1.9;color:var(--ink-mid);}
.letter-body p{margin-bottom:.7em;}
.letter-thinking{font-family:monospace;font-size:11px;letter-spacing:.12em;color:var(--ink-f);opacity:.35;font-style:italic;text-align:center;padding:18px 0;}
.cutscene-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--rule);padding-bottom:5px;margin-bottom:12px;}
.cutscene-label{font-family:monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-f);opacity:.45;}
.cutscene-loc{font-size:clamp(12px,1.3vw,14px);color:var(--ink-f);font-style:italic;opacity:.45;}
.cs-dir{font-size:clamp(14px,1.5vw,16px);line-height:1.85;color:var(--ink-mid);margin-bottom:.7em;}
.cs-speech{font-size:clamp(14px,1.5vw,16px);line-height:1.85;color:var(--ink);margin-bottom:.7em;padding-left:14px;}
.dossier-wrap-s{position:relative;width:180px;margin:10px auto 0;transform:rotate(1.2deg);filter:drop-shadow(2px 4px 12px rgba(0,0,0,.45));}
.dossier-back-s{position:absolute;bottom:-4px;left:3px;right:-3px;top:4px;background:#7A5E10;border:1px solid rgba(0,0,0,.25);}
.dossier-front-s{position:relative;background:linear-gradient(135deg,#B89028 0%,#9A7818 60%,#846010 100%);border:1px solid rgba(0,0,0,.25);z-index:1;}
.dossier-tab-s{height:20px;width:64px;background:linear-gradient(135deg,#9A7818 0%,#846010 100%);border:1px solid rgba(0,0,0,.2);border-bottom:none;margin-left:12px;position:relative;top:1px;display:flex;align-items:center;justify-content:center;}
.dossier-tab-s span{font-family:monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(28,24,16,.5);}
.dossier-lbl-s{background:var(--paper);margin:8px 8px 0;padding:7px 10px;border:1px solid rgba(0,0,0,.1);position:relative;}
.dossier-lbl-s::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(to bottom,transparent,transparent 20px,rgba(28,24,16,.05) 20px,rgba(28,24,16,.05) 21px);background-position:0 16px;pointer-events:none;}
.dlbl-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;position:relative;z-index:1;}
.dlbl-key{font-family:monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(28,24,16,.4);}
.dlbl-val{font-family:monospace;font-size:11px;color:var(--ink);letter-spacing:.03em;}
.dossier-int-s{margin:6px 8px 8px;background:var(--paper-2);border:1px solid rgba(0,0,0,.07);padding:8px;min-height:52px;display:flex;flex-direction:column;gap:5px;position:relative;}
.d-empty-line{width:100%;height:1px;background:rgba(28,24,16,.09);}
.d-empty-stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-12deg);border:2px solid rgba(139,26,26,.22);padding:2px 8px;font-family:monospace;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:rgba(139,26,26,.2);white-space:nowrap;}
.dossier-ref-s{font-family:monospace;font-size:11px;letter-spacing:.1em;color:rgba(28,24,16,.25);text-align:right;padding:0 8px 7px;}
.dossier-shadow-s{width:188px;height:5px;background:radial-gradient(ellipse,rgba(0,0,0,.2) 0%,rgba(0,0,0,0) 100%);border-radius:50%;margin:2px auto 0;}
.drow{display:flex;align-items:center;padding:4px 0;border-bottom:1px solid rgba(28,24,16,.06);}
.drow:last-child{border-bottom:none;}
@keyframes pulse-ring{0%{transform:scale(1);opacity:1}100%{transform:scale(3);opacity:0}}
@keyframes glow-breathe{0%,100%{filter:drop-shadow(0 0 0px #C8A020);opacity:.4}50%{filter:drop-shadow(0 0 10px #C8A020);opacity:1}}
.map-btn-glow{animation:glow-breathe 1.8s ease-in-out 5;}
@media(max-width:600px){
  #board-content{padding-left:clamp(62px,9.5vw,104px);padding-right:clamp(88px,13vw,148px);padding-top:22px;}
  #chalk{font-size:14px;}.bc{font-size:16px;}
  .room-btn{width:clamp(28px,8.5vw,36px);height:clamp(28px,5vh,34px);font-size:11px;padding-bottom:4px;}
  .room-btn::before{display:none;}
}
</style>

function board(lines, choices, extra) {
  var chalkEl=$id('chalk'), choicesEl=$id('choices');
  if(!chalkEl||!choicesEl) return;
  chalkEl.innerHTML=''; choicesEl.innerHTML=''; closePopup();
  _chalkSnapshot = null; // reset on every board call

  if(lines && lines.length){
    var els=lines.map(function(txt){
      var p=document.createElement('p');
      p.innerHTML=txt; p.style.cssText='opacity:0;transition:opacity .5s ease';
      chalkEl.appendChild(p); return p;
    });
    var done=false, timers=[];
    function skipAll(){ timers.forEach(clearTimeout); timers=[]; els.forEach(function(el){ el.style.transition='none'; el.style.opacity='1'; }); done=true; var bb=$id('bb'); if(bb){ bb.onclick=null; bb.style.cursor=''; } }
    var bb=$id('bb');
    if(bb){ bb.onclick=skipAll; bb.style.cursor='pointer'; }
    var delay=280;
    els.forEach(function(el,i){
      var t=setTimeout(function(){
        requestAnimationFrame(function(){ requestAnimationFrame(function(){ el.style.opacity='1'; }); });
        if(i===els.length-1){
          var sq=document.createElement('span');
          sq.style.cssText='margin-left:5px;opacity:0;transition:opacity .45s;font-size:.75em;color:rgba(238,232,192,.3)';
          sq.textContent='\u25a1'; el.appendChild(sq);
          setTimeout(function(){ sq.style.opacity='1'; },350);
          done=true; if(bb){ bb.onclick=null; bb.style.cursor=''; }
          setTimeout(updateBoardMore,50);
        }
      },delay);
      timers.push(t);
      var len=el.textContent.replace(/\s+/g,' ').trim().length;
      delay+=len<20?850:len<50?1200:len<80?1600:1900;
    });
  }
  if(extra){ var ex=document.createElement('div'); ex.style.width='100%'; ex.innerHTML=extra; choicesEl.appendChild(ex); }
  if(choices && choices.length){
    choices.forEach(function(c){
      var btn=document.createElement('button');
      btn.className='bc'; btn.innerHTML=c.l; btn.onclick=c.f;
      choicesEl.appendChild(btn);
    });
  }
  setTimeout(updateStripMore,50);
}

var _docIdx=0;
function docInitSlider(){
  var vp=$id('doc-viewport'), track=$id('doc-track'); if(!vp||!track) return;
  var h=vp.offsetHeight||parseInt(getComputedStyle(vp).height)||320;
  document.querySelectorAll('.doc-pane').forEach(function(p){ p.style.height=h+'px'; });
  // Pane order in DOM: dp2(Upper)=0, dp1(Middle)=h, dp0(Lower)=2h
  // idx 0=Lower → translate -2h (shift up to reveal bottom pane)
  // idx 1=Middle → translate -h
  // idx 2=Upper → translate 0
  var offsets=[2,1,0];
  track.style.transform='translateY(-'+(offsets[_docIdx]*h)+'px)';
}
function docSwitchTab(idx){
  _docIdx=idx;
  // DOM tabs are reversed: DOM[0]=Upper(2), DOM[1]=Middle(1), DOM[2]=Lower(0)
  var rev=[2,1,0];
  document.querySelectorAll('#doc-slider .doc-tab').forEach(function(t,i){ t.classList.toggle('active', rev[i]===idx); });

  var pane=$id('dp'+idx); if(pane) pane.scrollTop=0;
}

function buildClerkOpening(){
  var assessed=C.filter(function(c){ return S.rooms[c.id].assessed; }).length;

var _AC=null,_mg=null,_padI=0,_audioOn=false;
var _CHORDS=[[196,246.9,329.6],[164.8,220,293.7],[185,246.9,311.1],[196,261.6,329.6]];
function initAudio(){
  if(_AC) return;
  try{
    _AC=new(window.AudioContext||window.webkitAudioContext)();
    var co=_AC.createDynamicsCompressor(); co.threshold.value=-20; co.ratio.value=4; co.connect(_AC.destination);
    _mg=_AC.createGain(); _mg.gain.value=0; _mg.connect(co);
    _schedulePad(); _scheduleMel(); _scheduleTick();
  }catch(e){}
}
function _tone(f,t,dur,v){ var o=_AC.createOscillator(),g=_AC.createGain(); o.type='sine'; o.frequency.value=f; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v,t+.35); g.gain.linearRampToValueAtTime(v*.8,t+dur-.6); g.gain.linearRampToValueAtTime(0,t+dur); o.connect(g); g.connect(_mg); o.start(t); o.stop(t+dur+.1); }
function _schedulePad(){ if(!_AC) return; if(_audioOn) _CHORDS[_padI%4].forEach(function(f){ _tone(f,_AC.currentTime,12,.018); }); _padI++; setTimeout(_schedulePad,10400); }
function _scheduleMel(){ if(!_AC) return; if(_audioOn){ var M=[[{f:659,d:1.4},{f:587,d:.9},{f:523,d:2}],[{f:784,d:1.6},{f:698,d:2.1}],[{f:523,d:.9},{f:587,d:1},{f:659,d:1.8}]]; var fr=M[Math.floor(Math.random()*3)]; var t=_AC.currentTime+.2; fr.forEach(function(n){ var o=_AC.createOscillator(),g=_AC.createGain(); o.type='sine'; o.frequency.value=n.f; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.008,t+.1); g.gain.exponentialRampToValueAtTime(.0001,t+n.d); o.connect(g); g.connect(_mg); o.start(t); o.stop(t+n.d+.1); t+=n.d+.08; }); } setTimeout(_scheduleMel,(15+Math.random()*14)*1000); }
function _scheduleTick(){ if(!_AC){ setTimeout(_scheduleTick,1620+Math.random()*180); return; } if(_audioOn){ [[880,.002],[698,.0015]].forEach(function(p,i){ var d=i*.9,o=_AC.createOscillator(),g=_AC.createGain(); o.type='sine'; o.frequency.value=p[0]; g.gain.setValueAtTime(p[1],_AC.currentTime+d); g.gain.exponentialRampToValueAtTime(.0001,_AC.currentTime+d+.09); o.connect(g); g.connect(_mg); o.start(_AC.currentTime+d); o.stop(_AC.currentTime+d+.12); }); } setTimeout(_scheduleTick,1620+Math.random()*180); }
function toggleSound(){
  initAudio(); if(!_AC) return;
  _audioOn=!_audioOn;
  var sl=$id('sound-label');
  if(_audioOn){
    if(_AC.state==='suspended') _AC.resume();
    _mg.gain.setTargetAtTime(0.24,_AC.currentTime,.3);
    _CHORDS[_padI%4].forEach(function(f){ _tone(f,_AC.currentTime+0.1,12,.018); }); _padI++;
    sl.querySelectorAll('line').forEach(function(l){ l.style.display=''; }); sl.style.opacity='0.9';
  }else{
    _mg.gain.setTargetAtTime(0,_AC.currentTime,.3);
    sl.querySelectorAll('line').forEach(function(l){ l.style.display='none'; }); sl.style.opacity='0.4';
  }
}

// ── RAIN ──
(function(){
  var cv=$id('rain-canvas'); if(!cv) return;
  var ctx=cv.getContext('2d');
  function resize(){ cv.width=cv.offsetWidth||cv.parentElement.offsetWidth||200; cv.height=cv.offsetHeight||cv.parentElement.offsetHeight||80; initDrops(); }
  var drops=[],N=60;
  function initDrops(){ drops=[]; for(var i=0;i<N;i++) drops.push(newDrop(true)); }
  function newDrop(rand){ var w=cv.width,h=cv.height; return {x:Math.random()*w,y:rand?Math.random()*h:-Math.random()*h*.4,len:4+Math.random()*14,speed:.4+Math.random()*.9,op:.04+Math.random()*.10,dx:(Math.random()-.5)*.15}; }
  function draw(){
    var w=cv.width,h=cv.height; ctx.clearRect(0,0,w,h);
    for(var i=0;i<drops.length;i++){
      var d=drops[i]; ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x+d.dx*d.len,d.y+d.len);
      ctx.strokeStyle='rgba(200,220,255,'+d.op+')'; ctx.lineWidth=0.8; ctx.stroke();
      d.y+=d.speed; d.x+=d.dx;
      if(d.y-d.len>h||d.x<0||d.x>w) drops[i]=newDrop(false);
    }
    requestAnimationFrame(draw);
  }
  setTimeout(function(){ resize(); window.addEventListener('resize',resize); draw(); },400);
})();

  if(!vp||!track) return;
  var w = vp.offsetWidth;
  track.querySelectorAll('.drawer-pane').forEach(function(p){ p.style.width=w+'px'; });
  // keep current position
  var cur = parseInt(track.dataset.idx||'0');
  track.style.transform='translateX(-'+(cur*w)+'px)';
}

function switchDrawer(btn, idx){
  var track = $id('drawer-track');
  var vp = document.querySelector('.drawer-viewport');
  if(!track||!vp) return;
  var w = vp.offsetWidth;
  track.querySelectorAll('.drawer-pane').forEach(function(p){ p.style.width=w+'px'; });
  track.style.transform='translateX(-'+(idx*w)+'px)';
  track.dataset.idx=idx;
  btn.parentElement.querySelectorAll('.drawer-tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
}

// ── EXCERPTS — narrative lamp system ──
// Each excerpt: { id, ref, title, body[] } where body is array of paragraph strings (LaTeX-ready)
// Award excerpts by calling awardExcerpt(id) at narrative moments.
// The lamp pulses when _excerptUnread > 0; turns off when user exits the menu.

var EXCERPTS = [
  {
    id: 'cleaner_scene',
    ref: 'AS/001/F0 — Stairwell',
    title: 'The Cleaner',
    body: [
      'The Cleaner passed through the first floor corridor with a mop. She did not look up.',
      '“I am uncertain about —” said Aubrey.',
      'She stopped. Still did not look up.',
      '“About what?” said the Cleaner.',
      '“That,” said Aubrey, “is rather the question.”',
      '“And how uncertain are you?”',
      'He had not thought about it in those terms. He looked at the empty dossier in his hand.',
      '“I don’t know.”',
      'The Cleaner resumed moving.',
      '“Then you have two problems. Not one.”',
    ]
  },
];

var _excerptRead = {};   // id → true if read this session
var _excerptAwarded = []; // ids awarded in order

function awardExcerpt(id) {
  // Only award once
  if (_excerptAwarded.indexOf(id) !== -1) return;
  _excerptAwarded.push(id);
  updateLampState();
}

function _unreadCount() {
  return _excerptAwarded.filter(function(id){ return !_excerptRead[id]; }).length;
}

function updateLampState() {
  var lamp = $id('desk-lamp-stand');
  if (!lamp) return;
  if (_unreadCount() > 0) {
    lamp.classList.add('has-unread');
  } else {
    lamp.classList.remove('has-unread');
  }
}

var _prevLocation = null;

function toggleDeskLamp() {
  // If lamp is on — close and return
  if (_deskLamp) {
    lampOff();
    closePopup();
    if (_prevLocation) _prevLocation();
    return;
  }
  // Lamp is off — open menu if excerpts available, otherwise just light up
  if (_excerptAwarded.length > 0) {
    _prevLocation = _inRoom >= 0
      ? (function(i){ return function(){ enterRoom(i); }; })(_inRoom)
      : (localStorage.getItem('ql_floor1_visited') ? corridor : s0);
    openExcerptMenu();
  }
  _deskLamp = true;
  document.body.classList.add('desk-lamp-on');
  var bulb=$id('wl-bulb-shape'),halo=$id('wl-halo'),rim=$id('wl-rim-glow');
  if(bulb) bulb.style.opacity='1';
  if(halo) halo.style.opacity='1';
  if(rim)  rim.setAttribute('fill','rgba(255,190,50,.12)');
}

function openExcerptMenu() {
  var ordered = _excerptAwarded.slice().reverse();
  var choices = ordered.map(function(id) {
    var ex = EXCERPTS.find(function(e){ return e.id === id; });
    if (!ex) return null;
    var unread = !_excerptRead[id];
    return {
      l: (unread ? '\u25cf\u2002' : '') + ex.title,
      f: (function(eid){ return function(){ openExcerpt(eid); }; })(id)
    };
  }).filter(Boolean);
  board(['Under the lamp.', 'Several pages. Left there by someone.'], choices);
}

function openExcerpt(id) {
  var ex = EXCERPTS.find(function(e){ return e.id === id; });
  if (!ex) return;
  _excerptRead[id] = true;
  updateLampState();
  var bodyHtml = '<div class="excerpt-page">' +
    '<div class="excerpt-head">' +
      '<span class="excerpt-label">The Institute \u25a1</span>' +
      '<span class="excerpt-ref">' + ex.ref + '</span>' +
    '</div>' +
    '<div class="excerpt-body">' +
      ex.body.map(function(p){ return '<p>' + p + '</p>'; }).join('') +
    '</div>' +
  '</div>' +
  '<div class="excerpt-shadow"></div>';
  popup(ex.title, bodyHtml,
    [{ l: '\u2190\u2002Back to reading list', f: function(){ closePopup(); openExcerptMenu(); } }]
  );
}

function lampOff() {
  _deskLamp = false;
  document.body.classList.remove('desk-lamp-on');
  var bulb=$id('wl-bulb-shape'),halo=$id('wl-halo'),rim=$id('wl-rim-glow');
  if(bulb) bulb.style.opacity='0';
  if(halo) halo.style.opacity='0';
  if(rim)  rim.setAttribute('fill','rgba(255,190,50,.0)');
}

// ── GO ──
s0();
</script>
