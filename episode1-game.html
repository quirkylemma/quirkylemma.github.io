<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>The Institute — First Floor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400&family=EB+Garamond:ital,wght@0,400;1,400&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --chalk:#EEE8C4; --gold:#C8A020;
  --wall:#252D1C; --wall-hi:#303D22; --wall-lo:#181E10;
  --board-bg:#0A1108;
  --paper:#F4F0DC; --paper-2:#EDE8CC;
  --ink:#1C1810; --ink-mid:#3C3020; --ink-f:#8A7A58;
  --red:#8B1A1A;
  --rule:rgba(28,24,16,.12);
  --bar-h:58px;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{min-height:100%;overflow-x:hidden;background:#B8B0A0;font-family:'EB Garamond',Georgia,serif;}

/* ── GRAIN ── */
#grain{position:fixed;inset:0;pointer-events:none;z-index:998;opacity:.07;mix-blend-mode:overlay;}

/* ── VIEWPORT ── */
#viewport{max-width:860px;width:100%;margin:0 auto;position:relative;min-height:100vh;background:var(--wall);box-shadow:0 0 0 1px rgba(0,0,0,.18),4px 4px 24px rgba(0,0,0,.22);overflow:hidden;}
#page{position:relative;display:flex;flex-direction:column;z-index:1;min-height:100vh;}

/* ── ROOM ── */
#room{
  position:absolute;inset:0;bottom:var(--bar-h);z-index:0;overflow:hidden;
  background:
    radial-gradient(ellipse at 50% -10%,rgba(255,252,210,.07) 0%,transparent 55%),
    linear-gradient(180deg,transparent 55%,rgba(0,0,0,.55) 85%,rgba(0,0,0,.85) 100%),
    radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(0,0,0,.35) 100%),
    linear-gradient(170deg,var(--wall-hi) 0%,var(--wall) 45%,var(--wall-lo) 100%);
  transition:background .6s ease;
}
#room::before{content:'';position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px,transparent 48px),
    repeating-linear-gradient(90deg,rgba(0,0,0,.04) 0,rgba(0,0,0,.04) 1px,transparent 1px,transparent 80px);}
#room::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
  background:rgba(255,252,210,.22);
  box-shadow:0 0 18px 4px rgba(255,252,210,.12),0 0 60px 16px rgba(255,252,210,.05);}
#room-ceil{position:absolute;top:0;left:20%;right:20%;height:2px;z-index:3;pointer-events:none;
  background:rgba(255,252,210,.22);
  box-shadow:0 0 18px 4px rgba(255,252,210,.12),0 0 60px 16px rgba(255,252,210,.05);}

/* ── AMBIENT ── */
#ambient{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:
    radial-gradient(ellipse at 8%  0%,rgba(255,248,200,.08) 0%,transparent 45%),
    radial-gradient(ellipse at 92% 0%,rgba(255,248,200,.08) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 8%,rgba(255,120,0,.10)  0%,transparent 50%),
    radial-gradient(ellipse at 50% 11%,rgba(220,20,20,.06) 0%,transparent 38%);
  animation:amb-breathe 6s ease-in-out infinite,amb-flicker 8s ease-in-out infinite;
  transition:background 1s ease;
}
@keyframes amb-breathe{0%,100%{opacity:.7;}45%{opacity:1;}46%{opacity:.6;}47%{opacity:.9;}}
@keyframes amb-flicker{0%,91%,100%{opacity:1;}92.5%{opacity:.08;}93%{opacity:1;}95.4%{opacity:.3;}95.8%{opacity:1;}97.3%{opacity:.06;}97.6%{opacity:.85;}97.9%{opacity:.06;}98.2%{opacity:1;}}
body.lamp-left  #ambient{animation:none!important;opacity:1!important;background:radial-gradient(ellipse at 8%  0%,rgba(255,252,215,.40) 0%,transparent 62%),radial-gradient(ellipse at 8%  6%,rgba(255,252,215,.18) 0%,transparent 48%),radial-gradient(ellipse at 50% 50%,rgba(0,0,0,.06) 0%,transparent 100%);}
body.lamp-right #ambient{animation:none!important;opacity:1!important;background:radial-gradient(ellipse at 92% 0%,rgba(255,252,215,.40) 0%,transparent 62%),radial-gradient(ellipse at 92% 6%,rgba(255,252,215,.18) 0%,transparent 48%),radial-gradient(ellipse at 50% 50%,rgba(0,0,0,.06) 0%,transparent 100%);}
body.lamp-left.lamp-right #ambient{animation:none!important;opacity:1!important;background:radial-gradient(ellipse at 8%  0%,rgba(255,252,215,.40) 0%,transparent 58%),radial-gradient(ellipse at 92% 0%,rgba(255,252,215,.40) 0%,transparent 58%),radial-gradient(ellipse at 50% 10%,rgba(255,252,215,.14) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(0,0,0,.06) 0%,transparent 100%);}
body.lamp-left  .sign-group,body.lamp-left  .sign-amb,body.lamp-left  .sign-ruin,
body.lamp-right .sign-group,body.lamp-right .sign-amb,body.lamp-right .sign-ruin{animation-play-state:paused!important;}
@keyframes sign-breathe{0%,100%{opacity:.8;}45%{opacity:1;}46%{opacity:.65;}47%{opacity:.95;}}
@keyframes sign-flicker{0%,91%,100%{opacity:1;}92.5%{opacity:.15;}93%{opacity:1;}95.4%{opacity:.3;}95.8%{opacity:1;}97.3%{opacity:.08;}97.6%{opacity:.9;}97.9%{opacity:.08;}98.2%{opacity:1;}}
@keyframes sign-ruin{0%,59%,100%{opacity:1;}60.6%{opacity:.08;}61.2%{opacity:1;}80.4%{opacity:.35;}80.8%{opacity:1;}}
.sign-group{animation:sign-breathe 6s ease-in-out infinite;}
.sign-amb  {animation:sign-breathe 6s ease-in-out infinite,sign-flicker 8s ease-in-out infinite;}
.sign-ruin {animation:sign-breathe 6s ease-in-out infinite,sign-ruin 11s ease-in-out infinite 1.4s;}

/* ── DESK LAMP ── */
body.desk-lamp-on #toolbar{background:radial-gradient(ellipse at 50% 50%,rgba(220,175,50,.28) 0%,rgba(190,150,35,.14) 45%,transparent 75%),linear-gradient(180deg,#2A1C08 0%,#221408 8%,#1C1006 40%,#181008 85%,#120C04 100%);transition:background .5s ease;}
body.desk-lamp-on #toolbar::before{background:linear-gradient(90deg,#2C1E08 0%,#3A2C0A 15%,#5A4418 35%,#8A7030 50%,#9A8038 55%,#8A7030 60%,#5A4418 75%,#3A2C0A 88%,#2C1E08 100%);}
body.desk-lamp-on #room{background:
  radial-gradient(ellipse at 50% 110%,rgba(220,170,40,.18) 0%,rgba(180,130,20,.08) 30%,transparent 60%),
  radial-gradient(ellipse at 50% -10%,rgba(255,252,210,.07) 0%,transparent 55%),
  linear-gradient(180deg,transparent 55%,rgba(0,0,0,.55) 85%,rgba(0,0,0,.85) 100%),
  radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(0,0,0,.35) 100%),
  linear-gradient(170deg,var(--wall-hi) 0%,var(--wall) 45%,var(--wall-lo) 100%);
  transition:background .6s ease;}

/* ── WALL LAMPS ── */
#wall-lamp-left,#wall-lamp{position:absolute;top:0;width:clamp(18px,2.5vw,30px);z-index:2;display:flex;flex-direction:column;align-items:center;cursor:pointer;overflow:hidden;}
#wall-lamp-left{left:clamp(16px,3vw,40px);}
#wall-lamp{right:clamp(8px,2vw,24px);}
#wall-lamp-left::before,#wall-lamp::before{content:'';width:4px;height:clamp(16px,3vh,28px);background:linear-gradient(90deg,#282A20 0%,#3A3C30 40%,#2A2C22 100%);border-left:1px solid rgba(0,0,0,.4);border-right:1px solid rgba(255,255,255,.04);flex-shrink:0;display:block;}
.lamp-shade{width:100%;height:clamp(10px,1.8vh,18px);background:linear-gradient(180deg,#3A3828 0%,#2C2A20 60%,#1E1C16 100%);clip-path:polygon(10% 0%,90% 0%,100% 100%,0% 100%);box-shadow:0 2px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);}
.lamp-bulb{width:clamp(5px,.7vw,7px);height:clamp(5px,.7vw,7px);border-radius:50%;background:rgba(40,36,24,.8);margin-top:-1px;transition:background .6s ease,box-shadow .6s ease;}
body.lamp-left  #wall-lamp-left .lamp-bulb,
body.lamp-right #wall-lamp      .lamp-bulb{background:rgba(255,252,200,1);box-shadow:0 0 4px rgba(255,248,200,.9),0 0 8px rgba(255,248,200,.4);animation:bulb-flicker 8s ease-in-out infinite;}
@keyframes bulb-flicker{0%,88%,100%{opacity:1;}90%{opacity:.65;}92%{opacity:1;}94%{opacity:.5;}96%{opacity:1;}}
.lamp-cone{position:absolute;top:100%;left:50%;transform:translateX(-50%);width:clamp(80px,14vw,160px);height:clamp(60px,12vh,120px);background:radial-gradient(ellipse at 50% 0%,rgba(255,248,200,.06) 0%,transparent 70%);pointer-events:none;overflow:hidden;}

/* ── ROOM TINTS ── */
body.room-0 #room{background:linear-gradient(170deg,#2A2510 0%,#1E1A0C 45%,#141008 100%);}
body.room-1 #room{background:linear-gradient(170deg,#1E2520 0%,#161C18 45%,#0C1210 100%);}
body.room-2 #room{background:linear-gradient(170deg,#181E2C 0%,#101420 45%,#080C18 100%);}
body.room-3 #room{background:linear-gradient(170deg,#221A14 0%,#181210 45%,#100C0A 100%);}
body.room-4 #room{background:linear-gradient(170deg,#241818 0%,#1A1010 45%,#120808 100%);}
body.room-5 #room{background:linear-gradient(170deg,#181E24 0%,#10141A 45%,#080C12 100%);}
body.room-6 #room{background:linear-gradient(170deg,#201808 0%,#181006 45%,#100A04 100%);}
body.room-7 #room{background:linear-gradient(170deg,#141E18 0%,#0C1610 45%,#060E08 100%);}
body.room-8 #room{background:linear-gradient(170deg,#181A20 0%,#10121A 45%,#080A12 100%);}
body.room-9 #room{background:linear-gradient(170deg,#0E0E10 0%,#0A0A0C 45%,#060608 100%);}

/* ── BOARD CONTENT ── */
#board-content{flex:1;min-height:0;position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:clamp(16px,3vh,32px) clamp(16px,3vw,32px) clamp(8px,1.5vh,16px);pointer-events:none;}
#board-content>*{pointer-events:auto;}

/* ── WINDOW ── */
#window-wide{width:min(387px,60%);flex-shrink:0;margin-bottom:clamp(18px,3vh,32px);}
.winw-frame{background:#1A1C14;padding:5px 5px 0;box-shadow:0 6px 28px rgba(0,0,0,.75),inset 0 0 0 1px rgba(255,255,255,.055),inset 2px 2px 4px rgba(0,0,0,.4);}
.winw-glass{height:clamp(90px,16vh,150px);position:relative;overflow:hidden;background:#04050C;}
.winw-rain{position:absolute;inset:0;z-index:4;pointer-events:none;}
.winw-bar-v{position:absolute;top:0;bottom:0;width:5px;background:linear-gradient(90deg,#181A12 0%,#222418 50%,#181A12 100%);border-left:1px solid rgba(0,0,0,.4);border-right:1px solid rgba(255,255,255,.04);z-index:5;margin-left:-2.5px;}
.winw-bar-h{position:absolute;top:50%;left:0;right:0;height:5px;background:linear-gradient(180deg,#222418 0%,#1A1C12 100%);border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(0,0,0,.4);z-index:5;margin-top:-2.5px;}
.winw-glare{position:absolute;top:3%;left:2%;width:30%;height:46%;background:linear-gradient(135deg,rgba(255,255,255,.022) 0%,transparent 60%);z-index:6;pointer-events:none;}
.winw-sill{height:6px;background:linear-gradient(180deg,#222418 0%,#181A10 100%);border-top:1px solid rgba(0,0,0,.5);box-shadow:0 2px 8px rgba(0,0,0,.45);}
#window-lampfog{position:absolute;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at 40% 60%,rgba(255,220,140,.07) 0%,transparent 65%);opacity:0;transition:opacity 1.2s ease;}
body.desk-lamp-on #window-lampfog{opacity:1;}
#window-condensation{position:absolute;inset:0;z-index:5;pointer-events:none;}

/* ── BLACKBOARD ── */
#blackboard-zone{position:relative;z-index:10;width:min(640px,92%);flex-shrink:0;}
#bb-frame{
  position:relative;overflow:hidden;
  background:linear-gradient(150deg,#2C1E0A 0%,#1E1206 30%,#281A08 70%,#2C1E0A 100%);
  box-shadow:0 6px 0 rgba(0,0,0,.55),0 8px 18px rgba(0,0,0,.65),0 14px 40px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.05),inset 0 0 0 1px rgba(0,0,0,.6),
    inset 0 0 80px rgba(0,0,0,.6),inset 60px 0 80px rgba(0,0,0,.25),inset -60px 0 80px rgba(0,0,0,.25);
  transition:opacity .4s ease;
}
#bb-frame::before{content:'';position:absolute;inset:-3px;pointer-events:none;z-index:10;box-shadow:inset 0 3px 6px rgba(0,0,0,.4),inset 3px 0 6px rgba(0,0,0,.25),inset -3px 0 6px rgba(0,0,0,.25);}
#bb-frame.transitioning{opacity:.45;}
#bb{
  background-color:var(--board-bg);
  padding:clamp(14px,2.5vh,28px) clamp(18px,3vw,40px);
  height:clamp(180px,calc(66vh - var(--bar-h) - clamp(90px,16vh,150px) - clamp(18px,3vh,32px)),480px);
  position:relative;display:flex;align-items:flex-start;
  overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;
  -webkit-mask-image:linear-gradient(180deg,transparent 0px,black 18px,black calc(100% - 18px),transparent 100%);
  mask-image:linear-gradient(180deg,transparent 0px,black 18px,black calc(100% - 18px),transparent 100%);
}
#bb::-webkit-scrollbar{width:0;}
#chalk{font-family:monospace;font-size:clamp(15px,2.1vw,22px);line-height:1.95;color:var(--chalk);position:relative;z-index:1;width:100%;word-wrap:break-word;overflow-wrap:break-word;text-shadow:0 0 16px rgba(238,232,192,.15),0 0 4px rgba(238,232,192,.08);}
#chalk p{margin-bottom:.4em;}
#chalk p:last-child{margin-bottom:0;}
#bb-tray{height:clamp(6px,.9vw,9px);background:linear-gradient(180deg,#1C1408 0%,#120E04 100%);border-top:1px solid rgba(0,0,0,.6);display:flex;align-items:center;padding:0 clamp(10px,1.5vw,18px);gap:7px;position:relative;overflow:visible;}
.cp{height:3px;border-radius:2px;background:linear-gradient(90deg,rgba(238,232,192,.22),rgba(238,232,192,.46),rgba(238,232,192,.22));}

/* ── BLACKBOARD ERASE ── */
#bb-erase{position:absolute;inset:0;z-index:5;pointer-events:none;background:rgba(238,232,192,.06);opacity:0;transform:translateX(-100%);}
#bb-erase.wiping{animation:bb-wipe .55s var(--ease) forwards;}
@keyframes bb-wipe{0%{opacity:.7;transform:translateX(-100%);}60%{opacity:.5;}100%{opacity:0;transform:translateX(100%);}}

/* ── SCROLL CHEVRONS ── */
#bb-more,#bb-less,#strip-more,#strip-less{position:absolute;right:6px;display:flex;flex-direction:column;align-items:center;gap:3px;opacity:0;transition:opacity .4s ease;pointer-events:auto;cursor:pointer;z-index:15;}
#bb-more{top:50%;transform:translateY(20px);}
#bb-less{top:50%;transform:translateY(-36px);}
#strip-more{bottom:4px;}
#strip-less{top:4px;}
#bb-more.visible,#bb-less.visible,#strip-more.visible,#strip-less.visible{opacity:1;}
#bb-more span,#bb-less span,#strip-more span,#strip-less span{display:block;width:7px;height:7px;border-right:2px solid var(--gold);border-bottom:2px solid var(--gold);animation:chev .9s ease-in-out infinite;}
#bb-more span,#strip-more span{transform:rotate(45deg);}
#bb-less span,#strip-less span{transform:rotate(-135deg);animation-name:chev-up;}
#bb-more span:nth-child(2),#bb-less span:nth-child(2),#strip-more span:nth-child(2),#strip-less span:nth-child(2){animation-delay:.2s;opacity:.55;}
@keyframes chev{0%,100%{transform:rotate(45deg) translate(0,0);opacity:.9;}50%{transform:rotate(45deg) translate(2px,2px);opacity:.4;}}
@keyframes chev-up{0%,100%{transform:rotate(-135deg) translate(0,0);opacity:.9;}50%{transform:rotate(-135deg) translate(2px,2px);opacity:.4;}}

/* ── BOARD STRIP ── */
#board-strip{width:min(640px,92%);position:relative;z-index:10;margin-top:clamp(22px,3.5vh,38px);max-height:clamp(140px,28vh,260px);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:clamp(4px,.7vh,8px);}
#board-strip::-webkit-scrollbar{width:0;}
#loc{font-family:monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:rgba(238,232,192,.5);cursor:pointer;transition:color .2s;display:inline-block;}
#loc:hover{color:rgba(238,232,192,.85);}
@keyframes loc-arrive{0%{opacity:0;transform:translateX(-22px);}60%{opacity:1;transform:translateX(3px);}100%{opacity:1;transform:translateX(0);}}
#loc.arriving{animation:loc-arrive .55s var(--ease) forwards;}
#choices{display:flex;flex-direction:column;align-items:flex-start;gap:clamp(6px,1vh,11px);}
.bc{font-family:'Cormorant SC',Georgia,serif;font-size:clamp(17px,2vw,24px);font-weight:300;color:rgba(200,160,32,.55);background:none;border:none;border-bottom:1px solid rgba(200,160,32,.16);padding-bottom:2px;cursor:pointer;letter-spacing:.02em;line-height:1;text-align:left;transition:color .3s var(--ease),border-color .3s var(--ease),padding-left .22s var(--ease);}
.bc:hover{color:var(--gold);border-bottom-color:rgba(200,160,32,.55);padding-left:9px;}
@keyframes bc-rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.bc.rising{animation:bc-rise .4s var(--ease) forwards;}

/* ── CORRIDOR ── */
.corridor-progress{font-family:monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(238,232,192,.38);margin-bottom:clamp(6px,1vh,10px);}
.corridor-action{background:transparent;border:none;padding:clamp(7px,.9vh,10px) 0;cursor:pointer;transition:padding-left .2s var(--ease);display:flex;align-items:center;gap:11px;width:auto;}
.corridor-action:hover{padding-left:6px;}
.ca-title{font-family:'Cormorant SC',Georgia,serif;font-size:clamp(15px,1.8vw,20px);font-weight:300;color:rgba(200,160,32,.55);line-height:1.2;border-bottom:1px solid rgba(200,160,32,.16);padding-bottom:2px;transition:color .3s var(--ease),border-color .3s var(--ease);}
.corridor-action:hover .ca-title{color:var(--gold);border-bottom-color:rgba(200,160,32,.55);}

/* ── TOOLBAR ── */
#toolbar{
  flex-shrink:0;height:var(--bar-h);position:sticky;bottom:0;
  background:linear-gradient(180deg,#2A1C08 0%,#221408 8%,#1C1006 40%,#181008 85%,#120C04 100%);
  border-top:3px solid #4A3412;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.09),inset 0 2px 0 rgba(255,255,255,.04),0 -8px 32px rgba(0,0,0,.7),0 -2px 8px rgba(0,0,0,.5);
  display:flex;align-items:center;padding:0 clamp(8px,2vw,20px);z-index:20;overflow:visible;position:relative;
}
#toolbar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#2C1E08 0%,#5A4018 15%,#7A5C28 35%,#6A4E20 50%,#7A5C28 65%,#5A4018 85%,#2C1E08 100%);}
.ti{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0 clamp(7px,1.1vw,14px);height:100%;background:none;border:none;cursor:pointer;border-radius:0;border-right:1px solid rgba(255,255,255,.04);transition:opacity .15s;flex-shrink:0;text-decoration:none;position:relative;}
.ti:first-child{border-left:1px solid rgba(255,255,255,.04);}
.ti:hover::after{content:'';position:absolute;top:4px;left:4px;right:4px;bottom:4px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);}
.ti svg{display:block;flex-shrink:0;opacity:.55;transition:opacity .15s;}
.ti:hover svg{opacity:.9;}
.ti-lbl{font-family:monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(238,232,192,.32);white-space:nowrap;transition:color .15s;}
.ti:hover .ti-lbl{color:rgba(238,232,192,.75);}
.ti-sep{flex:1;border:none;border-left:1px solid rgba(255,255,255,.04);margin:0 clamp(4px,.6vw,8px);height:60%;align-self:center;}

/* ── ROOM PLAQUE ── */
#room-plaque{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:15;display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#room-plaque.visible{display:flex;}
.plaque-body{
  background:linear-gradient(160deg,#C8A030 0%,#A07820 60%,#886010 100%);
  border:1px solid rgba(0,0,0,.35);
  box-shadow:0 2px 6px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,220,80,.3),inset 0 -1px 0 rgba(0,0,0,.2);
  padding:6px 10px 7px;
  min-width:clamp(60px,10vw,100px);
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
}
.plaque-body::before{content:'';position:absolute;inset:2px;border:1px solid rgba(0,0,0,.2);pointer-events:none;}
.plaque-num{font-family:monospace;font-size:9px;letter-spacing:.22em;padding-left:.22em;text-transform:uppercase;color:rgba(28,18,4,.55);display:block;width:100%;text-align:center;line-height:1.4;}
@keyframes plaque-drop{0%{transform:translateY(-12px);opacity:0;}60%{transform:translateY(3px);opacity:1;}80%{transform:translateY(-1px);}100%{transform:translateY(0);opacity:1;}}
#room-plaque.dropping .plaque-body{animation:plaque-drop .45s var(--ease) forwards;}

/* ── STUDY FLYUP ── */
#ti-study-wrap{position:relative;}
#ti-study-flyup{position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);background:linear-gradient(180deg,#221408 0%,#1A1006 100%);border:1px solid rgba(238,232,192,.12);border-bottom:2px solid #4A3412;min-width:130px;z-index:200;display:none;flex-direction:column;box-shadow:0 -8px 24px rgba(0,0,0,.6);}
#ti-study-flyup.open{display:flex;}
.flyup-item{background:none;border:none;padding:10px 16px;font-family:monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(238,232,192,.45);cursor:pointer;text-align:left;border-bottom:1px solid rgba(255,255,255,.04);transition:color .14s,background .14s;white-space:nowrap;}
.flyup-item:last-child{border-bottom:none;}
.flyup-item:hover{color:var(--gold);background:rgba(238,232,192,.04);}
.flyup-item.exam-item{color:rgba(200,80,80,.75);}
.flyup-item.exam-item:hover{color:rgba(184,80,80,.9);}
.flyup-item.exam-item.done{color:rgba(200,160,32,.55);}
.flyup-item.exam-item.done:hover{color:var(--gold);}

/* ── LAMP PULSE ── */
@keyframes lamp-pulse{0%,100%{filter:drop-shadow(0 0 0px rgba(220,175,50,0));}50%{filter:drop-shadow(0 0 10px rgba(220,175,50,.85)) drop-shadow(0 0 20px rgba(220,175,50,.35));}}
#desk-lamp-stand.has-unread{animation:lamp-pulse 2s ease-in-out infinite;}

/* ── HINT PULSE ── */
@keyframes hint-pulse{0%,100%{box-shadow:none;color:rgba(238,232,192,.32);}50%{box-shadow:0 0 10px rgba(238,232,192,.25),0 0 22px rgba(200,160,32,.2);color:rgba(238,232,192,.9);}}
#ti-map.map-hint-active,#ti-study-wrap.map-hint-active{animation:hint-pulse 1s ease-in-out infinite;}


/* ── POPUP ── */
#popup-overlay{position:fixed;inset:0;background:rgba(4,6,3,.86);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);opacity:0;transition:opacity .28s ease;pointer-events:none;}
#popup-overlay.open{opacity:1;pointer-events:auto;}
#popup-panel{position:relative;max-height:88vh;display:flex;flex-direction:column;transform:translateY(12px);transition:transform .32s var(--ease);overflow:hidden;}
#popup-overlay.open #popup-panel{transform:translateY(0);}
#popup-panel.parchment{background:var(--paper);width:min(620px,94vw);border-top:2px solid #1C3A38;box-shadow:0 24px 72px rgba(0,0,0,.7),0 0 0 1px rgba(0,0,0,.3);color:var(--ink);}
#popup-panel.dark{background:#1C2018;width:min(580px,94vw);border:1px solid rgba(238,232,192,.08);border-top:2px solid rgba(238,232,192,.18);box-shadow:0 24px 72px rgba(0,0,0,.75);color:var(--chalk);}
.pp-head{flex-shrink:0;padding:12px 20px 10px;display:flex;justify-content:space-between;align-items:center;}
.parchment .pp-head{border-bottom:1px solid var(--rule);}
.dark .pp-head{border-bottom:1px solid rgba(238,232,192,.07);}
.pp-title{font-family:monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;}
.parchment .pp-title{color:var(--ink-f);}
.dark .pp-title{color:rgba(238,232,192,.45);}
.pp-close{background:none;cursor:pointer;font-family:monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:4px 9px;border:1px solid;white-space:nowrap;flex-shrink:0;transition:background .14s,color .14s,border-color .14s;}
.parchment .pp-close{color:rgba(28,24,16,.38);border-color:rgba(28,24,16,.18);}
.parchment .pp-close:hover{color:rgba(28,24,16,.78);border-color:rgba(28,24,16,.45);background:rgba(28,24,16,.04);}
.dark .pp-close{color:rgba(238,232,192,.38);border-color:rgba(238,232,192,.18);}
.dark .pp-close:hover{color:rgba(238,232,192,.82);border-color:rgba(238,232,192,.5);}
.pp-body{flex:1;min-height:0;overflow-y:auto;padding:16px 22px 20px;-webkit-overflow-scrolling:touch;}
.pp-body::-webkit-scrollbar{width:2px;}
.pp-body::-webkit-scrollbar-thumb{background:rgba(28,24,16,.15);}
.pp-foot{flex-shrink:0;padding:0 22px 16px;}
.parchment .pp-foot{background:var(--paper);}
.dark .pp-foot{background:#1C2018;}

/* ── BOOKCASE ── */
#pp-doc-inner{display:flex;flex-direction:row;flex:1;min-height:0;}
#doc-slider{flex-shrink:0;width:clamp(100px,18vw,140px);border-right:1px solid var(--rule);background:linear-gradient(90deg,var(--paper-2) 0%,var(--paper) 100%);display:flex;flex-direction:column;user-select:none;}
.doc-tab{flex:1;display:flex;align-items:center;justify-content:flex-start;padding:0 0 0 16px;font-family:monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(28,24,16,.28);background:none;border:none;cursor:pointer;border-bottom:1px solid var(--rule);border-left:3px solid transparent;transition:color .2s,border-left-color .2s,background .2s;text-align:left;line-height:1.4;position:relative;min-height:60px;}
.doc-tab:last-child{border-bottom:none;}
.doc-tab:hover{color:rgba(28,24,16,.55);background:rgba(28,24,16,.03);}
.doc-tab.active{color:#1C3A38;border-left-color:#1C3A38;background:var(--paper);}
.doc-tab.active::after{content:'';position:absolute;right:-1px;top:25%;bottom:25%;width:2px;background:var(--paper);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);}
@keyframes tab-flash{0%{background:var(--paper);border-left-color:#1C3A38;}25%{background:rgba(28,58,56,.12);border-left-color:#2A6A60;}100%{background:var(--paper);border-left-color:#1C3A38;}}
.doc-tab.active.flashing{animation:tab-flash .4s ease forwards;}
#doc-viewport{flex:1;min-height:0;overflow:hidden;position:relative;height:clamp(280px,52vh,520px);}
#doc-track{display:flex;flex-direction:row;height:100%;transition:transform .55s var(--ease);will-change:transform;}
.doc-pane{flex-shrink:0;height:100%;overflow-y:auto;padding:10px 14px 16px;-webkit-overflow-scrolling:touch;}
.doc-pane::-webkit-scrollbar{width:2px;}
.doc-pane::-webkit-scrollbar-thumb{background:var(--rule);}
.doc-empty{font-family:monospace;font-size:11px;letter-spacing:.14em;color:var(--ink-f);opacity:.5;text-align:center;padding:32px 0;font-style:italic;}

/* ── BUREAU ── */
.table-drawers{display:flex;flex-direction:column;height:clamp(280px,52vh,500px);}
.drawer-tabs{display:flex;flex-shrink:0;border-bottom:1px solid var(--rule);background:var(--paper);}
.drawer-tab{flex:1;padding:9px 0;font-family:monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(28,24,16,.28);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;margin-bottom:-1px;}
.drawer-tab.active{color:#7A5500;border-bottom-color:#7A5500;}
.drawer-tab:first-child.active{color:#1C3A38;border-bottom-color:#1C3A38;}
.drawer-viewport{flex:1;overflow:hidden;position:relative;}
.drawer-track{display:flex;height:100%;transition:transform .38s var(--ease);will-change:transform;}
.drawer-pane{flex-shrink:0;height:100%;overflow-y:auto;padding:10px 14px 16px;-webkit-overflow-scrolling:touch;}
.drawer-pane::-webkit-scrollbar{width:2px;}
.drawer-pane::-webkit-scrollbar-thumb{background:var(--rule);}

/* ── 3D DOC OBJECT ── */
.doc-obj-wrap{position:relative;margin:6px 2px 14px;}
.doc-obj-back{position:absolute;bottom:-5px;left:6px;right:-6px;top:5px;background:var(--paper-2);border:1px solid rgba(26,22,16,.07);}
.doc-obj{position:relative;z-index:1;background:linear-gradient(160deg,#FAFAF7 0%,#F5F2EC 100%);border:1px solid rgba(26,22,16,.08);padding:22px 26px 20px;transform:rotate(-.4deg);box-shadow:0 1px 3px rgba(0,0,0,.07),2px 4px 16px rgba(0,0,0,.1),4px 8px 28px rgba(0,0,0,.07);}
.doc-obj-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1.5px solid #1C3A38;padding-bottom:8px;margin-bottom:18px;}
.doc-obj-label{font-family:monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8A8070;}
.doc-obj-foot{width:75%;height:8px;background:radial-gradient(ellipse,rgba(0,0,0,.12) 0%,transparent 70%);border-radius:50%;margin:3px auto 0;}
.doc-obj p{font-size:clamp(16px,1.8vw,19px);line-height:1.9;color:#3D3828;margin-bottom:.85em;}
.doc-obj p:last-child{margin-bottom:0;}

/* ── MANILA ENVELOPE ── */
.manila-wrap{position:relative;margin:8px 4px 14px;}
.manila-back{position:absolute;bottom:-5px;left:5px;right:-5px;top:5px;background:linear-gradient(135deg,#B8920A 0%,#9A780C 100%);border:1px solid rgba(0,0,0,.2);}
.manila{position:relative;z-index:1;background:linear-gradient(160deg,#D4A830 0%,#C49020 60%,#B07C10 100%);border:1px solid rgba(0,0,0,.22);padding:38px 16px 14px;transform:rotate(-.3deg);box-shadow:0 2px 8px rgba(0,0,0,.18),2px 4px 18px rgba(0,0,0,.14);overflow:visible;}
.manila::before{content:'';position:absolute;top:0;left:0;right:0;height:38px;background:linear-gradient(170deg,#C89018 0%,#B07808 100%);clip-path:polygon(0 0,100% 0,100% 55%,50% 100%,0 55%);border-bottom:1px solid rgba(0,0,0,.15);}
.manila-clasp{position:absolute;top:32px;left:50%;transform:translateX(-50%);width:14px;height:8px;background:radial-gradient(ellipse at 50% 30%,#E8C84A,#B8920A);border-radius:50%;border:1px solid rgba(0,0,0,.3);box-shadow:0 1px 3px rgba(0,0,0,.4);z-index:2;}
.manila-inner{background:linear-gradient(160deg,#FAF6E8 0%,#F0E8D0 100%);padding:14px 16px;border:1px solid rgba(0,0,0,.08);position:relative;}
.manila-inner::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(to bottom,transparent,transparent 22px,rgba(26,22,16,.045) 22px,rgba(26,22,16,.045) 23px);background-position:0 18px;pointer-events:none;}
.manila-foot{width:80%;height:6px;background:radial-gradient(ellipse,rgba(0,0,0,.16) 0%,transparent 70%);border-radius:50%;margin:3px auto 0;}
.drow-m{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(26,22,16,.07);position:relative;z-index:1;}
.drow-m:last-child{border-bottom:none;}

/* ── POPUP CONTENT ── */
.choices{display:flex;flex-direction:column;}
.choice{background:transparent;border:none;border-top:1px solid var(--rule);color:var(--ink);font-family:'EB Garamond',Georgia,serif;font-size:clamp(16px,1.7vw,18px);padding:clamp(10px,1.3vh,13px) 0;text-align:left;cursor:pointer;transition:padding-left .22s var(--ease),color .14s;line-height:1.5;display:flex;align-items:baseline;gap:10px;width:100%;}
.choice:last-child{border-bottom:1px solid var(--rule);}
.choice:hover{padding-left:10px;}
.choice::before{content:"□";font-size:11px;color:var(--ink-f);flex-shrink:0;}
.choice:hover::before{content:"▸";color:var(--ink);}

/* ── EXAM ── */
.exam-wrap-b{border-top:1px solid rgba(139,26,26,.18);padding-top:2px;}
.exam-header-b{font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#8B1A1A;opacity:.7;padding:9px 0 7px;}
.exam-q-b{font-family:'Courier Prime',monospace;font-size:clamp(17px,1.7vw,19px);line-height:1.8;color:var(--ink);padding:0 0 12px;border-bottom:1px solid var(--rule);}
.exam-opts-b{display:flex;flex-direction:column;}
.exam-opt-b{display:flex;align-items:baseline;gap:10px;padding:clamp(9px,1.2vh,12px) 0;border-bottom:1px solid var(--rule);font-family:'Courier Prime',monospace;font-size:clamp(17px,1.7vw,19px);color:var(--ink);cursor:pointer;transition:padding-left .2s var(--ease);width:100%;background:transparent;border-left:none;border-right:none;}
.exam-opt-b:last-child{border-bottom:none;}
.exam-opt-b:hover{padding-left:8px;}
.opt-label{color:var(--ink-f);flex-shrink:0;min-width:18px;}
.exam-reply-b{font-family:'Courier Prime',monospace;font-size:clamp(16px,1.6vw,18px);line-height:1.8;color:var(--ink-mid);margin:10px 0;padding-left:12px;border-left:2px solid rgba(28,24,16,.18);}
.exam-concluded-b{font-family:'Courier Prime',monospace;font-size:clamp(16px,1.6vw,18px);line-height:1.8;color:var(--ink-mid);margin:10px 0;padding-left:12px;border-left:2px solid var(--gold);}
.exam-skip{font-family:monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-f);opacity:.4;margin:5px 0 0;text-align:right;}
.exam-skip a{text-decoration:none;color:inherit;cursor:pointer;}
.exam-skip a:hover{opacity:1;}

/* ── CLERK ── */
#oh-wrap{display:flex;flex-direction:column;height:220px;}
#oh-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:2px 0;}
.oh-msg{max-width:92%;line-height:1.65;font-size:clamp(16px,1.5vw,17px);font-family:'EB Garamond',Georgia,serif;}
.oh-msg.clerk{align-self:flex-start;color:var(--ink);}
.oh-msg.student{align-self:flex-end;color:var(--ink-mid);font-style:italic;}
.oh-msg.clerk::before{content:'The Clerk — ';font-family:monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-f);display:block;margin-bottom:2px;opacity:.55;}
.oh-msg.student::before{content:'You — ';font-family:monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-f);display:block;margin-bottom:2px;opacity:.55;}
.oh-msg.thinking{color:var(--ink-f);font-style:italic;font-size:clamp(14px,1.4vw,16px);opacity:.55;}
#oh-input-row{display:flex;margin-top:8px;border-top:1px solid var(--rule);padding-top:8px;}
#oh-input{flex:1;background:transparent;border:none;border-bottom:1px solid rgba(28,24,16,.22);color:var(--ink);font-family:'EB Garamond',Georgia,serif;font-size:clamp(16px,1.5vw,17px);padding:4px 0;outline:none;}
#oh-input::placeholder{color:var(--ink-f);opacity:.35;font-style:italic;}
#oh-input:focus{border-bottom-color:var(--ink);}
#oh-send{background:transparent;border:none;border-bottom:1px solid var(--ink-f);color:var(--ink-f);font-family:monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:4px 0 4px 12px;cursor:pointer;transition:all .14s;}
#oh-send:hover{color:var(--ink);border-bottom-color:var(--ink);}

/* ── LETTER ── */
.letter-wrap{position:relative;margin:4px 0;}
.letter-shadow{position:absolute;bottom:-3px;left:3px;right:-3px;top:3px;background:rgba(28,24,16,.1);z-index:0;}
.letter-paper{position:relative;z-index:1;background:var(--paper-2);border-top:2px solid #1C3A38;padding:14px 16px;transform:rotate(-.15deg);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.letter-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid rgba(28,58,56,.15);padding-bottom:6px;margin-bottom:10px;}
.letter-label{font-family:monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-f);opacity:.55;}
.letter-body{font-size:clamp(14px,1.5vw,16px);line-height:1.9;color:var(--ink-mid);}
.letter-body p{margin-bottom:.7em;}
.letter-thinking{font-family:monospace;font-size:11px;letter-spacing:.12em;color:var(--ink-f);opacity:.35;font-style:italic;text-align:center;padding:18px 0;}

/* ── EXCERPT ── */
.excerpt-page{background:linear-gradient(160deg,#FAFAF7 0%,#F5F2EC 100%);padding:28px 32px 24px;position:relative;transform:rotate(-.4deg);box-shadow:0 1px 3px rgba(0,0,0,.07),2px 4px 16px rgba(0,0,0,.1),4px 8px 28px rgba(0,0,0,.07);border:1px solid rgba(26,22,16,.08);}
.excerpt-shadow{height:8px;background:radial-gradient(ellipse,rgba(0,0,0,.14) 0%,rgba(0,0,0,0) 70%);border-radius:50%;margin:0 20px;}
.excerpt-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1.5px solid #1C3A38;padding-bottom:8px;margin-bottom:18px;}
.excerpt-label{font-family:monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8A8070;}
.excerpt-ref{font-size:12px;color:#8A8070;font-style:italic;}
.excerpt-body p{font-size:16px;line-height:1.9;color:#3D3828;margin-bottom:.85em;}
.excerpt-body p:last-child{margin-bottom:0;}
.cs-dir{font-size:clamp(14px,1.5vw,16px);line-height:1.85;color:var(--ink-mid);margin-bottom:.7em;}
.cs-speech{font-size:clamp(14px,1.5vw,16px);line-height:1.85;color:var(--ink);margin-bottom:.7em;padding-left:14px;}

/* ── RESET MODAL ── */
#reset-overlay{display:none;position:fixed;inset:0;background:rgba(4,6,3,.88);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.reset-doc-outer{position:relative;width:min(420px,92vw);}
.reset-doc-shadow{position:absolute;bottom:-5px;left:6px;right:-6px;top:5px;background:var(--paper-2);border:1px solid rgba(26,22,16,.06);}
.reset-doc{position:relative;z-index:1;background:linear-gradient(160deg,#FAFAF7 0%,#F5F2EC 100%);border:1px solid rgba(26,22,16,.08);padding:clamp(20px,3vh,28px) clamp(22px,3.5vw,32px);transform:rotate(-.3deg);box-shadow:0 2px 4px rgba(0,0,0,.1),3px 6px 20px rgba(0,0,0,.18),6px 12px 40px rgba(0,0,0,.12);}
.reset-doc-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1.5px solid var(--red);padding-bottom:8px;margin-bottom:16px;}
.reset-doc-label{font-family:'Special Elite',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#8A8070;}
.reset-doc-ref{font-size:11px;color:#8A8070;font-style:italic;}
.reset-doc-body{font-family:'EB Garamond',Georgia,serif;font-size:clamp(15px,1.7vw,17px);line-height:1.85;color:#3D3828;margin-bottom:18px;}
.reset-doc-body strong{font-family:'Special Elite',monospace;font-size:11px;letter-spacing:.1em;color:var(--red);font-style:normal;font-weight:normal;}
.reset-input{width:100%;background:rgba(26,22,16,.04);border:none;border-bottom:1.5px solid rgba(139,26,26,.3);font-family:'Special Elite',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);padding:8px 0;outline:none;margin-bottom:18px;transition:border-color .15s;}
.reset-input::placeholder{color:rgba(26,22,16,.3);text-transform:none;letter-spacing:.04em;}
.reset-input:focus{border-color:rgba(139,26,26,.6);}
.reset-input.matched{border-color:var(--red);}
.reset-buttons{display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--rule);padding-top:14px;}
.reset-cancel{background:none;border:1px solid rgba(26,22,16,.15);color:rgba(26,22,16,.4);font-family:'Special Elite',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:7px 16px;cursor:pointer;transition:border-color .14s,color .14s;}
.reset-cancel:hover{border-color:rgba(26,22,16,.4);color:rgba(26,22,16,.7);}
.reset-confirm{background:rgba(139,26,26,.06);border:1px solid rgba(139,26,26,.25);color:rgba(139,26,26,.35);font-family:'Special Elite',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:7px 16px;cursor:pointer;transition:all .18s;}
.reset-confirm:not([disabled]):hover{background:rgba(139,26,26,.12);border-color:rgba(139,26,26,.6);color:rgba(139,26,26,.9);}
.reset-confirm[disabled]{cursor:default;}
.reset-confirm.armed{background:rgba(139,26,26,.14);border-color:rgba(139,26,26,.7);color:rgba(160,30,30,.95);}
.reset-doc-foot{width:60%;height:7px;background:radial-gradient(ellipse,rgba(0,0,0,.08) 0%,transparent 70%);border-radius:50%;margin:3px auto 0;}

/* ── MAP ── */
#map-overlay{display:none;position:fixed;inset:0;background:rgba(0,6,20,.92);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}

/* ── STAMP ANIMATION ── */
@keyframes stamp-drop{0%{opacity:0;transform:rotate(-3deg) scale(1.4);}55%{opacity:1;transform:rotate(1deg) scale(0.94);}75%{transform:rotate(-.5deg) scale(1.02);}100%{transform:rotate(0deg) scale(1);opacity:1;}}
.stamp-assessed-new{animation:stamp-drop .45s var(--ease) forwards;}



/* ── MOBILE ── */

    ],
    post:[
      'In 1768, the <em>Opera Omnia</em> of Gottfried Wilhelm Leibniz was published posthumously. Leibniz co-invented calculus, developed binary arithmetic, and made foundational contributions to logic and philosophy. He was one of the most formidable mathematical minds in history. That is what makes this example so interesting.',
      'The question was simple: when rolling two dice, what is the probability of getting a total of 11, versus a total of 12? Leibniz listed combinations without regard to order — 21 possibilities in total. In his space, the combination "one five and one six" appears once, and so does "two sixes". He concluded both were equally probable. But if you take order into account, there are 36 equally likely outcomes — permutations, not combinations. The combination "one five and one six" can appear two ways: $(5,6)$ and $(6,5)$. The combination "two sixes" can only appear one way: $(6,6)$. The probabilities are not equal.',
      'The error was in listing the set of all possible outcomes. Without a formal framework, there was no principle available to identify where the reasoning had failed. After Kolmogorov, first year BSc students get a better answer than Leibniz did. The right one.'
    ],
    aubrey_enter:'In October I told people I was one thousand percent certain I would win a fortune.\nI have since been informed that this is not a probability.\nIs there a correct way to put a number on uncertainty?',
    aubrey_desk:'I read what was on the lower shelf. I understood it and stood up to leave. I hit my head on the upper shelf.\nI am not sure whether it is my head that hurts more or my brain.',
    aubrey_archive:'People have been uncertain about outcomes for some time. They have found it useful to put a number on it. I have also been putting a number on it. Mine was wrong. Apparently there is a method.',
    aubrey_window:'I have looked at the window from several angles now. It looks the same from all of them.',
    aubrey_post_correct:'Yes. That is the one. I knew that one.',
    aubrey_post_wrong:['I was fairly sure about that. I have updated the file.','That is not the right answer. I have written it down anyway. For reference.','I see. Right. Yes.'] },
  { id:'experiment', title:'Experiment', section:'Experiments', anteroom:[],members:[],counting:[],r197a:[],post:[],
    aubrey_enter:'There is a correct way. Uncertainty is measured over the outcomes of an experiment.\nIn October I conducted one. I went to the casino.\nI was asked to leave before the experiment was complete.\nThe outcome was not in the set I had defined, which I now understand was the problem.\nAn experiment requires a well-defined set of outcomes before you conduct it, not after.\nWhat counts as well-defined?',
    aubrey_desk:'Repeatability. Well-defined set of outcomes. Not necessarily something you do in a lab with a white coat.',
    aubrey_archive:'Where do we find these experiments? The casino. The weather. A tin of mixed nuts. I have encountered several without knowing it.',
    aubrey_window:'',
    aubrey_post_correct:'That is correct. I have been right before. Not recently, but before.',
    aubrey_post_wrong:['That is not correct. I was confident. This is a pattern I am beginning to recognise.','Incorrect. I have written it down. It joins the others.','I see. That one was not it either.'] },
  { id:'sample_space', title:'Sample Space', section:'The Sample Space', anteroom:[],members:[],counting:[],r197a:[],post:[],
    aubrey_enter:'An experiment has outcomes. All possible outcomes collected together form the sample space $\\Omega$.\nMy sample space in October was $\\Omega = \\{\\text{Win}\\}$.\nI had constructed it with considerable care and, I felt, admirable economy.\nIt transpires that a sample space must be exhaustive — every outcome that could occur must appear in it.\nIts elements must also be distinct and non-overlapping — only one can occur at a time.\nLose was not in my sample space. I have since added it.\nThe space feels different with it in there. Larger.\nWhat must $\\Omega$ contain to be valid?',
    aubrey_desk:'The desk concerns exhaustiveness. Every possible outcome must be on the list. I had one outcome on my list. It was not exhaustive.',
    aubrey_archive:'I have encountered several sample spaces without knowing it. A tin of mixed nuts. The casino. October.',
    aubrey_window:'My sample space had one element. This is called a certainty. I was certain about the wrong thing.',
    aubrey_post_correct:'Yes. All outcomes accounted for.',
    aubrey_post_wrong:['That sample space is not exhaustive. Something is missing.','Incorrect. The outcomes are not mutually exclusive.','I see. I left something off the list again.'] },
  { id:'events', title:'Event', section:'Events', anteroom:[],members:[],counting:[],r197a:[],post:[],
    aubrey_enter:'$\\Omega = \\{\\text{Win}, \\text{Lose}\\}$.\nThere may be further outcomes but those are the subject of a separate enquiry, currently unresolved.\nNow that I have a valid sample space I find I can ask questions about it.\nDid I win? Did I lose? Did I win and lose simultaneously, which would explain a great deal?\nThese questions correspond to subsets of $\\Omega$ and are called events.\nThe empty set is also an event. I have considerable experience of the empty set.\nCan I assign a probability to any subset I like, or are there constraints?',
    aubrey_desk:'An event can be empty. I have some experience of this.',
    aubrey_archive:'Will it rain. Will the patient recover. Will I be admitted. All events. Some have known probabilities. Mine does not yet.',
    aubrey_window:'I identified the event I am interested in. It is in the sample space. This is progress.',
    aubrey_post_correct:'Correct. That is a valid event.',
    aubrey_post_wrong:['That subset is not well defined.','Incorrect. That is not a subset of this space.','I see. Not every collection of outcomes qualifies.'] },
  { id:'sigma_algebra', title:'The Sigma-Algebra', section:'The Sigma-Algebra', anteroom:[],members:[],counting:[],r197a:[],post:[],
    aubrey_enter:'There are constraints.\nThe collection of valid events must contain $\\Omega$ itself, be closed under complementation, and be closed under countable unions.\nThis collection is called a sigma-algebra, denoted $\\mathcal{F}$.\n$\\Omega$ is the set of outcomes. $\\mathcal{F}$ is the set of questions I am permitted to ask about those outcomes.\nI had been asking questions without checking whether they were on the permitted list.\nThe Institute has a permitted list for everything. I have now seen the list. It is laminated.\nWhich questions does $\\mathcal{F}$ allow?',
    aubrey_desk:'There are rules about which collections are permissible. Not everything qualifies. I am beginning to notice a theme.',
    aubrey_archive:'Some questions cannot be asked. I have asked several of those.',
    aubrey_window:'I stood at the window. I was thinking about permissible questions. The window did not help.',
    aubrey_post_correct:'Correct. That collection satisfies the conditions.',
    aubrey_post_wrong:['Not closed under the required operations. Common error apparently.','Incorrect. The complement was not included.','I see. Not every collection qualifies. Mine did not.'] },
  { id:'mutual_exclusivity', title:'Mutual Exclusivity', section:'Mutual Exclusivity', anteroom:[],members:[],counting:[],r197a:[],post:[],
    aubrey_enter:'When I constructed $\\Omega$ I noted that its elements must be distinct and non-overlapping. This property has a name.\nTwo events are mutually exclusive if they cannot both occur — their intersection is empty.\nWin and Lose are mutually exclusive.\nI cannot simultaneously win and lose, although in October I achieved a financial result that a reasonable person might describe as both.\nMutual exclusivity is a property of events generally, not just of outcomes in $\\Omega$. It extends into $\\mathcal{F}$ and has consequences for how probabilities combine.\nWhat are those consequences?',
    aubrey_desk:'Their intersection is empty. I have been living in an empty intersection since October.',
    aubrey_archive:'Either I get in or I don\'t. I have been treating this as negotiable. It is not negotiable.',
    aubrey_window:'I stood at the window. Win and Lose. Mutually exclusive. I had not listed Lose. This is on file.',
    aubrey_post_correct:'Correct. They cannot both occur.',
    aubrey_post_wrong:['Those events can occur simultaneously. Not mutually exclusive.','Incorrect. The intersection was not empty.','I see. I confused this with something else. It is on file.'] },
  { id:'probability_measure', title:'Probability Measure', section:'Probability Defined', anteroom:[],members:[],counting:[],r197a:[],post:[],
    aubrey_enter:'A probability measure is a function $P$ that assigns numbers to events in $\\mathcal{F}$.\nNot any numbers.\nI had been assigning numbers to events since October under the impression that any number would do.\n$-0.3$ featured prominently. So did $1.7$, briefly, during a period I prefer not to discuss.\nA probability measure is a function of a very particular kind, with three conditions. They are called axioms.\nThe Institute is very fond of axioms.\nWhat must $P$ satisfy?',
    aubrey_desk:'The desk concerns what makes a probability measure legitimate. There are three conditions. I did not know about the three conditions. I have been violating them. Not all three. But some.',
    aubrey_archive:'A valid probability measure is the foundation of everything that follows. I have been building on an invalid one. This explains several things.',
    aubrey_window:'I stood at the window. I was thinking about the conditions. The view did not suggest any of them.',
    aubrey_post_correct:'Correct. That satisfies the conditions for a valid measure.',
    aubrey_post_wrong:['That does not satisfy the conditions. I am familiar with this situation.','Incorrect. The function is not well-defined on this space.','I see. Not every assignment of numbers qualifies. I knew that. I did not always act on it.'] },
  { id:'axiom1', title:'Axiom 1 \u2014 Non-negativity', section:'Axiom 1', anteroom:[],members:[],counting:[],r197a:[],post:[],
    aubrey_enter:'The first axiom: $P(A) \\geq 0$ for all events $A$. No probability can be negative.\nI assigned $-0.3$ to the event Lose. I checked it twice. It was wrong twice.\nI have since checked it a third time as a precaution. It remains wrong.\nLikelihood has a floor and the floor is zero.\nI went below the floor with some confidence and considerable arithmetic and found nothing useful down there.\nWhy exactly is a negative probability impossible and not merely a bold creative choice?',
    aubrey_desk:'The desk concerns why probabilities cannot be negative. A probability measures how unlikely something is. Likelihood has a floor. The floor is zero. I went below the floor. This is on file.',
    aubrey_archive:'In practice a negative probability has no interpretation. It cannot be observed. It cannot be measured. It cannot be correct. Mine was \u22120.3. I was fairly confident about it at the time.',
    aubrey_window:'I stood at the window. Zero is the floor. I went below it. The correction is on file. It does not change what happened.',
    aubrey_post_correct:'Correct. Non-negative. That is the condition. I understand why now.',
    aubrey_post_wrong:['That value is negative. It violates Axiom 1. I have some experience of this.','Incorrect. A probability cannot be negative. I have noted this before. I am noting it again.','I see. Below zero. I know what that looks like. It is on file.'] },
  { id:'axiom2', title:'Axiom 2 \u2014 Normalisation', section:'Axiom 2', anteroom:[],members:[],counting:[],r197a:[],post:[],
    aubrey_enter:'Probabilities cannot be negative.\nThe second axiom: $P(\\Omega) = 1$. Something must happen.\nThe total probability across all outcomes must equal exactly one. Mine summed to $0.94$.\nI had mislaid six percent of reality. I searched for it in my original workings.\nIt was Lose. It had been there the whole time, unassigned, waiting with the patience of something that knows it will eventually be found.\nA correction is on file.\nWhat goes wrong, precisely, when the probabilities do not sum to one?',
    aubrey_desk:'Everything must be accounted for. All outcomes. All of them. I left some out. Six percent of them. I did not notice at the time.',
    aubrey_archive:'In practice probabilities that do not sum to 1 indicate a missing outcome. Something has been left off the list. I left something off the list. I have been thinking about what it was.',
    aubrey_window:'I stood at the window. I was thinking about the missing six percent. It was an outcome I had not considered. I have considered it now. The list is more accurate. It is not more comfortable.',
    aubrey_post_correct:'Correct. The total is 1. Everything is accounted for.',

function board(lines, choices, extra, _noErase) {
  var chalkEl=$id('chalk'), choicesEl=$id('choices');

  // Erase animation only for navigation, not lamp overlay
  if(!_noErase){
    var hasContent = chalkEl.textContent.trim().length > 0;
    if(hasContent){
      var er=$id('bb-erase'); if(er){ er.classList.remove('wiping'); void er.offsetWidth; er.classList.add('wiping'); }
    }
  }
  chalkEl.innerHTML=''; choicesEl.innerHTML=''; closePopup();
  _chalkSnapshot = null;
  var bc=$id('board-content'); if(bc) bc.scrollTop=0;
  var bbEl=$id('bb'); if(bbEl) bbEl.scrollTop=0;

  if(lines && lines.length){
    var els=lines.map(function(txt){
      var p=document.createElement('p');
      p.innerHTML=txt; p.style.cssText='opacity:0;transition:opacity .5s ease';
      chalkEl.appendChild(p); return p;
    });
    var timers=[];
    function skipAll(){ timers.forEach(clearTimeout); timers=[]; els.forEach(function(el){ el.style.transition='none'; el.style.opacity='1'; }); var bb=$id('bb'); if(bb){ bb.onclick=null; bb.style.cursor=''; } }
    var bb=$id('bb');
    if(bb){ bb.onclick=skipAll; bb.style.cursor='pointer'; }
    var delay=280;
    els.forEach(function(el,i){
      var t=setTimeout(function(){
        requestAnimationFrame(function(){ requestAnimationFrame(function(){ el.style.opacity='1'; }); });
        if(i===els.length-1){
          var sq=document.createElement('span');
          sq.style.cssText='margin-left:5px;opacity:0;transition:opacity .45s;font-size:.75em;color:rgba(238,232,192,.3)';
          sq.textContent='\u25a1'; el.appendChild(sq);
          setTimeout(function(){ sq.style.opacity='1'; },350);
          if(bb){ bb.onclick=null; bb.style.cursor=''; }
          setTimeout(updateBoardMore,50);
        }
      },delay);
      timers.push(t);
      var len=el.textContent.replace(/\s+/g,' ').trim().length;
      delay+=len<20?850:len<50?1200:len<80?1600:1900;
    });
  }
  if(choices && choices.length){

      var btn=document.createElement('button');

}

var _ohThinking=false, _ohHistory=[], _clerkInitialised=false;
function fullClerk(){
  var ds=buildFullDossierSummary(), opening=buildClerkOpening();

    [{l:'Return to corridor',f:function(){ closePopup(); corridor(); }}]);
  setTimeout(function(){
    var inp=$id('oh-input'); if(inp) inp.addEventListener('keydown',function(e){ if(e.key==='Enter') clerkSend(); });

  },200);

function ohAddMessage(role,text){
  var msgs=$id('oh-messages'); if(!msgs) return;
  var el=document.createElement('div'); el.className='oh-msg '+role; el.innerHTML=text;
  if(window.renderMathInElement) renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});
  msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight;
}
async function clerkSend(){
  if(_ohThinking) return;
  var input=$id('oh-input'); if(!input||!input.value.trim()) return;
  var text=input.value.trim(); input.value='';
  ohAddMessage('student',text); _ohHistory.push({role:'user',content:text}); _ohThinking=true;
  var msgs=$id('oh-messages'), thinkEl=document.createElement('div');
  thinkEl.className='oh-msg clerk thinking'; thinkEl.textContent='\u2026';
  if(msgs){ msgs.appendChild(thinkEl); msgs.scrollTop=msgs.scrollHeight; }
  var messages=[{role:'user',content:'Begin.'},{role:'assistant',content:_ohHistory[0].content}].concat(_ohHistory.slice(1));
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:window._clerkSystemPrompt,messages:messages})});
    var data=await res.json();
    var reply=(data.content&&data.content[0]&&data.content[0].text)||'The Clerk considers the file.';
    thinkEl.remove(); ohAddMessage('clerk',reply); _ohHistory.push({role:'assistant',content:reply});
  }catch(e){ thinkEl.remove(); ohAddMessage('clerk','The connection has lapsed. <a onclick="clerkSend()" style="cursor:pointer;text-decoration:underline">Try again</a>.'); }
  _ohThinking=false;
}
function buildFullDossierSummary(){
  return C.map(function(c){
    var r=S.rooms[c.id], v=[];
    if(r.desk) v.push('Desk'); if(r.archive) v.push('Archive'); if(r.window) v.push('Window');
    return c.title+': '+(v.length?'visited '+v.join(', ')+'. ':'no panels. ')+(r.assessed?'Exam completed (quality:'+(r.quality||'assessed')+').':'Exam not attempted.')+(r.gaps&&r.gaps.length?' Gaps: '+r.gaps.join('; '):'')+'.';
  }).join(' | ');
}
function buildClerkOpening(){
  var assessed=C.filter(function(c){ return S.rooms[c.id].assessed; }).length;
  var withGaps=C.filter(function(c){ return S.rooms[c.id].gaps&&S.rooms[c.id].gaps.length; }).length;
  if(assessed===0) return 'The dossier is empty. You have not yet attempted any examination. That is one way to begin.';
  if(assessed===C.length&&withGaps===0) return 'All ten examinations are on file. The dossier is complete. I have one question.';
  if(withGaps>0) return 'The dossier is on the desk. I have noted '+withGaps+' gap'+(withGaps>1?'s':'')+' across the examinations. We will begin there.';
  return 'The dossier shows '+assessed+' of ten examinations completed. I have read it. I have questions.';
}

function openExcerpt(id){

function tablePopup(title, leftHtml, rightHtml){

  var leftContent = leftIsAnim ? leftHtml.substring(9) : leftHtml;
  function wrapDoc(html,loc){
    var inner=html||'<p style="font-family:monospace;font-size:11px;letter-spacing:.14em;color:#8A7A58;opacity:.5;text-align:center;padding:24px 0;font-style:italic">Content to be added.</p>';
    return '<div class="doc-obj-wrap"><div class="doc-obj-back"></div><div class="doc-obj"><div class="doc-obj-head"><span class="doc-obj-label">'+loc+'</span></div>'+inner+'</div></div><div class="doc-obj-foot"></div>';
  }
  var leftPane = leftIsAnim ? '<div id="ql-anim-host"></div>' : wrapDoc(leftContent,'Monte Carlo');
  var body='<div class="table-drawers"><div class="drawer-tabs"><button class="drawer-tab active" onclick="switchDrawer(this,0)">Monte Carlo</button><button class="drawer-tab" onclick="switchDrawer(this,1)">Real World</button></div><div class="drawer-viewport"><div class="drawer-track" id="drawer-track"><div class="drawer-pane">'+leftPane+'</div><div class="drawer-pane">'+wrapDoc(rightHtml,'Real World')+'</div></div></div></div>';
  popup(title, body, null, 'parchment');
  setTimeout(function(){
    var pp=$id('pp-body'); if(pp&&window.renderMathInElement) renderMathInElement(pp,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});
    initDrawerTrack();
    if(leftIsAnim){
      var host=$id('ql-anim-host');
      if(host){
        var tmp=document.createElement('div');
        tmp.innerHTML=leftContent;
        Array.from(tmp.childNodes).forEach(function(n){
          if(n.nodeName!=='SCRIPT') host.appendChild(n.cloneNode(true));
        });
        tmp.querySelectorAll('script').forEach(function(s){
          var sc=document.createElement('script');
          if(s.src) sc.src=s.src;
          else sc.textContent=s.textContent;
          host.appendChild(sc);
        });
      }

}
function initDrawerTrack(){

var _clockOn = false;
function toggleClock(){
  _clockOn=!_clockOn;
  var lcd=$id('lcd-time'); if(!lcd) return;
  lcd.style.visibility=_clockOn?'visible':'hidden';
}
(function(){
  function tick(){
    if(!_clockOn) return;
    var now=new Date(); var s=now.getSeconds(), h=now.getHours(), m=now.getMinutes();
    var lcd=$id('lcd-time'); if(!lcd) return;
    var hh=(h<10?'0':'')+h, mm=(m<10?'0':'')+m;

// ── AUDIO ──
var _AC=null,_mg=null,_padI=0,_audioOn=false;
var _CHORDS=[[196,246.9,329.6],[164.8,220,293.7],[185,246.9,311.1],[196,261.6,329.6]];
function initAudio(){
  if(_AC) return;
  try{
    _AC=new(window.AudioContext||window.webkitAudioContext)();
    var co=_AC.createDynamicsCompressor(); co.threshold.value=-20; co.ratio.value=4; co.connect(_AC.destination);
    _mg=_AC.createGain(); _mg.gain.value=0; _mg.connect(co);
    _schedulePad(); _scheduleMel(); _scheduleTick();
  }catch(e){}
}
function _tone(f,t,dur,v){ var o=_AC.createOscillator(),g=_AC.createGain(); o.type='sine'; o.frequency.value=f; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v,t+.35); g.gain.linearRampToValueAtTime(v*.8,t+dur-.6); g.gain.linearRampToValueAtTime(0,t+dur); o.connect(g); g.connect(_mg); o.start(t); o.stop(t+dur+.1); }
function _schedulePad(){ if(!_AC) return; if(_audioOn) _CHORDS[_padI%4].forEach(function(f){ _tone(f,_AC.currentTime,12,.018); }); _padI++; setTimeout(_schedulePad,10400); }
function _scheduleMel(){ if(!_AC) return; if(_audioOn){ var M=[[{f:659,d:1.4},{f:587,d:.9},{f:523,d:2}],[{f:784,d:1.6},{f:698,d:2.1}],[{f:523,d:.9},{f:587,d:1},{f:659,d:1.8}]]; var fr=M[Math.floor(Math.random()*3)]; var t=_AC.currentTime+.2; fr.forEach(function(n){ var o=_AC.createOscillator(),g=_AC.createGain(); o.type='sine'; o.frequency.value=n.f; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.008,t+.1); g.gain.exponentialRampToValueAtTime(.0001,t+n.d); o.connect(g); g.connect(_mg); o.start(t); o.stop(t+n.d+.1); t+=n.d+.08; }); } setTimeout(_scheduleMel,(15+Math.random()*14)*1000); }
function _scheduleTick(){ if(!_AC){ setTimeout(_scheduleTick,1620+Math.random()*180); return; } if(_audioOn){ [[880,.002],[698,.0015]].forEach(function(p,i){ var d=i*.9,o=_AC.createOscillator(),g=_AC.createGain(); o.type='sine'; o.frequency.value=p[0]; g.gain.setValueAtTime(p[1],_AC.currentTime+d); g.gain.exponentialRampToValueAtTime(.0001,_AC.currentTime+d+.09); o.connect(g); g.connect(_mg); o.start(_AC.currentTime+d); o.stop(_AC.currentTime+d+.12); }); } setTimeout(_scheduleTick,1620+Math.random()*180); }
function toggleSound(){
  initAudio(); if(!_AC) return;
  _audioOn=!_audioOn;
  var sl=$id('sound-label'),lbl=$id('sound-lbl');
  if(_audioOn){
    if(_AC.state==='suspended') _AC.resume();
    _mg.gain.setTargetAtTime(0.24,_AC.currentTime,.3);
    _CHORDS[_padI%4].forEach(function(f){ _tone(f,_AC.currentTime+0.1,12,.018); }); _padI++;
    sl.querySelectorAll('line').forEach(function(l){ l.style.display=''; }); sl.style.opacity='0.9';
  }else{
    _mg.gain.setTargetAtTime(0,_AC.currentTime,.3);
    sl.querySelectorAll('line').forEach(function(l){ l.style.display='none'; }); sl.style.opacity='0.4';
  }
}

// ── GRAIN ──
(function(){
  var cv=$id('grain'); if(!cv) return;
  var gx=cv.getContext('2d');
  function rsz(){ cv.width=innerWidth; cv.height=innerHeight; }
  rsz(); window.addEventListener('resize',rsz);
  (function gr(){ var w=cv.width,h=cv.height,id=gx.createImageData(w,h),d=id.data; for(var i=0;i<d.length;i+=4){ var v=Math.random()*18; d[i]=d[i+1]=d[i+2]=v; d[i+3]=Math.random()*10; } gx.putImageData(id,0,0); requestAnimationFrame(gr); })();
})();

// ── RAIN ──
(function(){
  var cv=$id('rain-canvas'); if(!cv) return;
  var ctx=cv.getContext('2d'), drops=[], N=60;
  function resize(){ cv.width=cv.offsetWidth||200; cv.height=cv.offsetHeight||80; initDrops(); }
  function initDrops(){ drops=[]; for(var i=0;i<N;i++) drops.push(newDrop(true)); }
  function newDrop(rand){ var w=cv.width,h=cv.height; return {x:Math.random()*w,y:rand?Math.random()*h:-Math.random()*h*.4,len:4+Math.random()*14,speed:.4+Math.random()*.9,op:.04+Math.random()*.10,dx:(Math.random()-.5)*.15}; }
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    drops.forEach(function(d,i){
      ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x+d.dx*d.len,d.y+d.len);
      ctx.strokeStyle='rgba(200,220,255,'+d.op+')'; ctx.lineWidth=0.8; ctx.stroke();
      d.y+=d.speed; d.x+=d.dx;
      if(d.y-d.len>cv.height||d.x<0||d.x>cv.width) drops[i]=newDrop(false);
    });
    requestAnimationFrame(draw);
  }
  setTimeout(function(){ resize(); window.addEventListener('resize',resize); draw(); },400);
})();

// ── WEATHER ──
(function(){
  var states=['clear','overcast','rain','storm'];
  var durations={clear:[8,15],overcast:[5,10],rain:[6,12],storm:[3,6]};
  var _state='clear', _intensity=0, _current=0, _wind=0;
  var _nextChange=Date.now()+(3+Math.random()*5)*60000;

  function randBetween(a,b){ return a+(b-a)*Math.random(); }
  function lerp(a,b,t){ return a+(b-a)*Math.min(1,Math.max(0,t)); }

  function nextState(){
    var transitions={clear:['clear','overcast'],overcast:['clear','overcast','rain'],rain:['overcast','rain','storm'],storm:['rain','overcast']};
    var opts=transitions[_state]; _state=opts[Math.floor(Math.random()*opts.length)];
    var d=durations[_state]; _nextChange=Date.now()+randBetween(d[0],d[1])*60000;
    _intensity=_state==='rain'?0.6:_state==='storm'?1:_state==='overcast'?0.2:0;
    _wind=_state==='storm'?randBetween(0.3,0.8):_state==='rain'?randBetween(0.1,0.4):0;
  }

  setInterval(function(){
    if(Date.now()>_nextChange) nextState();
    _current=lerp(_current,_intensity,0.02);
    updateRain(_current,_wind);
    updateLeaves(_current,_wind);
    updateCondensation(_current);
    if(_state==='storm' && Math.random()<0.002) doLightning();
  },100);

  // Rain
  var rainDrops=[], RAIN_N=80;
  var rainCv=$id('rain-canvas');
  var rainCtx=rainCv?rainCv.getContext('2d'):null;
  function newRainDrop(rand,wind){
    var w=(rainCv?rainCv.offsetWidth:200)||200, h=(rainCv?rainCv.offsetHeight:80)||80;
    return {x:Math.random()*w,y:rand?Math.random()*h:-10,len:4+Math.random()*14,speed:.4+Math.random()*.9,op:.04+Math.random()*.10,dx:wind*(Math.random()-.3)*.3};
  }
  if(rainCv){ for(var i=0;i<RAIN_N;i++) rainDrops.push(newRainDrop(true,0)); }
  function updateRain(intensity,wind){
    if(!rainCtx||!rainCv) return;
    rainCtx.clearRect(0,0,rainCv.width,rainCv.height);
    if(intensity<0.05) return;
    var count=Math.floor(intensity*RAIN_N);
    for(var i=0;i<count;i++){
      var d=rainDrops[i]; if(!d) continue;
      rainCtx.beginPath(); rainCtx.moveTo(d.x,d.y); rainCtx.lineTo(d.x+d.dx*d.len,d.y+d.len);
      rainCtx.strokeStyle='rgba(200,220,255,'+(d.op*intensity)+')'; rainCtx.lineWidth=0.8; rainCtx.stroke();
      d.y+=d.speed*(0.5+intensity); d.x+=d.dx+wind*0.5;
      if(d.y-d.len>rainCv.height||d.x<0||d.x>rainCv.width) rainDrops[i]=newRainDrop(false,wind);
    }
  }

  // Leaves
  var leafCv=$id('window-leaves');
  var leafCtx=leafCv?leafCv.getContext('2d'):null;
  var leaves=[];
  function newLeaf(){ return {x:-20,y:Math.random()*((leafCv?leafCv.height:80)||80),vx:1+Math.random()*2,vy:(Math.random()-.5)*.5,r:2+Math.random()*3,life:1}; }
  function updateLeaves(intensity,wind){
    if(!leafCtx||!leafCv) return;
    leafCtx.clearRect(0,0,leafCv.width,leafCv.height);
    if(wind>0.2 && Math.random()<wind*0.02) leaves.push(newLeaf());
    for(var i=leaves.length-1;i>=0;i--){
      var l=leaves[i]; l.x+=l.vx*(1+wind*3); l.y+=l.vy+Math.sin(l.x*.05)*.5; l.life-=.005;
      if(l.life<=0||l.x>leafCv.width){ leaves.splice(i,1); continue; }
      leafCtx.beginPath(); leafCtx.ellipse(l.x,l.y,l.r,l.r*.6,l.x*.02,0,Math.PI*2);
      leafCtx.fillStyle='rgba(60,90,30,'+l.life*.4+')'; leafCtx.fill();
    }
  }

  // Condensation
  var condEl=$id('window-condensation');
  var condCv=null, condCtx=null, condBlobs=[];
  function initCond(){
    if(!condEl||condCv) return;
    condCv=document.createElement('canvas');
    condCv.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;';
    condEl.appendChild(condCv);
    condCtx=condCv.getContext('2d');
    condCv.width=condEl.offsetWidth||200; condCv.height=condEl.offsetHeight||80;
    for(var i=0;i<30;i++) condBlobs.push({x:Math.random()*condCv.width,y:Math.random()*condCv.height,r:1+Math.random()*4,opacity:0});
  }
  function updateCondensation(intensity){
    if(!condCv){ initCond(); return; }
    if(!condCtx) return;
    condCtx.clearRect(0,0,condCv.width,condCv.height);
    if(intensity<0.3) return;
    var fog=(intensity-0.3)/0.7;
    condBlobs.forEach(function(b){
      b.opacity=Math.min(b.opacity+fog*.001, fog*.3);
      condCtx.beginPath(); condCtx.arc(b.x,b.y,b.r,0,Math.PI*2);
      condCtx.fillStyle='rgba(200,220,240,'+b.opacity+')'; condCtx.fill();
    });
  }

  // Lightning
  function doLightning(){
    var glass=document.querySelector('.winw-glass'); if(!glass) return;
    glass.style.transition='background .05s'; glass.style.background='rgba(220,230,255,.15)';
    setTimeout(function(){ glass.style.background=''; glass.style.transition='background .3s'; },80);
  }
})();

// ── DAY/NIGHT CYCLE ──
(function(){
  var CYCLE_MS=18*60*1000, start=Date.now()-Math.random()*CYCLE_MS;
  var skyStops=[
    {t:0.00,sky:'#03040A',horizon:'#06070F',glow:1.0},
    {t:0.15,sky:'#06080F',horizon:'#090A16',glow:0.85},
    {t:0.28,sky:'#0E1428',horizon:'#141830',glow:0.55},
    {t:0.38,sky:'#1A1830',horizon:'#201C38',glow:0.35},
    {t:0.48,sky:'#0E1830',horizon:'#121C38',glow:0.30},
    {t:0.58,sky:'#1A1428',horizon:'#1C1630',glow:0.45},
    {t:0.70,sky:'#120C1A',horizon:'#160E20',glow:0.65},
    {t:0.82,sky:'#080810',horizon:'#0C0A18',glow:0.85},
    {t:1.00,sky:'#03040A',horizon:'#06070F',glow:1.0},
  ];
  function lerpCol(a,b,t){
    function hex(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
    var ca=hex(a),cb=hex(b);
    return 'rgb('+Math.round(ca[0]+(cb[0]-ca[0])*t)+','+Math.round(ca[1]+(cb[1]-ca[1])*t)+','+Math.round(ca[2]+(cb[2]-ca[2])*t)+')';
  }
  function getPhase(){ var raw=((Date.now()-start)%CYCLE_MS)/CYCLE_MS; return Math.min(raw<0.5?raw*0.7:0.35+(raw-0.5)*1.3,1.0); }
  function interpolate(phase){
    for(var i=0;i<skyStops.length-1;i++){
      if(phase>=skyStops[i].t&&phase<=skyStops[i+1].t){
        var local=(phase-skyStops[i].t)/(skyStops[i+1].t-skyStops[i].t);
        return {sky:lerpCol(skyStops[i].sky,skyStops[i+1].sky,local),horizon:lerpCol(skyStops[i].horizon,skyStops[i+1].horizon,local),glow:skyStops[i].glow+(skyStops[i+1].glow-skyStops[i].glow)*local};
      }
    }
    return skyStops[0];
  }
  function getLampFactor(){
    var l=document.body.classList.contains('lamp-left'),r=document.body.classList.contains('lamp-right'),d=document.body.classList.contains('desk-lamp-on');
    return {wash:(l&&r)?0.22:(l||r)?0.12:0,amber:d?0.08:0};
  }
  function applyLampWash(base,wash,amber){
    if(!wash&&!amber) return base;
    var m=base.match(/\d+/g); if(!m) return base;
    var r=+m[0],g=+m[1],b=+m[2];
    r=Math.round(r*(1-wash)+42*wash); g=Math.round(g*(1-wash)+32*wash); b=Math.round(b*(1-wash)+16*wash);
    r=Math.min(255,Math.round(r*(1-amber)+80*amber)); g=Math.round(g*(1-amber)+50*amber); b=Math.round(b*(1-amber)+10*amber);
    return 'rgb('+r+','+g+','+b+')';
  }
  var skyGrad=document.getElementById('ww-sky'), stGrad=document.getElementById('ww-st'), signGrp=document.querySelector('.sign-group'), bldgRect=null;
  function tick(){
    var phase=getPhase(),col=interpolate(phase),lamps=getLampFactor();
    var sky=applyLampWash(col.sky,lamps.wash,lamps.amber), hor=applyLampWash(col.horizon,lamps.wash,lamps.amber);
    if(skyGrad){ var s=skyGrad.querySelectorAll('stop'); if(s[0]) s[0].setAttribute('stop-color',sky); if(s[1]) s[1].setAttribute('stop-color',hor); }
    if(stGrad){ var s=stGrad.querySelectorAll('stop'); if(s[0]) s[0].setAttribute('stop-color',hor); if(s[1]) s[1].setAttribute('stop-color',hor); }
    if(signGrp) signGrp.style.opacity=col.glow*(1-lamps.wash*0.6);
    if(!bldgRect) bldgRect=document.querySelector('#pw-mid rect');
    if(bldgRect){ var dv=Math.round(20+(1-col.glow)*18),dv2=Math.round(22+(1-col.glow)*20); bldgRect.setAttribute('fill','rgb('+dv+','+dv2+','+Math.round(dv*1.6)+')'); }
    requestAnimationFrame(tick);
  }
  tick();
})();

// ── WINDOW PARALLAX ──
(function(){
  var win=document.getElementById('window-wide'); if(!win) return;
  var layers=[{id:'pw-bg',x:0.6,y:0.25},{id:'pw-mid',x:1.4,y:0.5},{id:'pw-fg',x:2.2,y:0.8}];
  var cur={x:0,y:0},tgt={x:0,y:0},raf=null;
  function lerp(a,b,t){ return a+(b-a)*t; }
  function tick(){
    cur.x=lerp(cur.x,tgt.x,0.08); cur.y=lerp(cur.y,tgt.y,0.08);
    layers.forEach(function(l){ var el=document.getElementById(l.id); if(!el) return; el.setAttribute('transform','translate('+(cur.x*l.x)+','+(cur.y*l.y)+')'); });
    if(Math.abs(cur.x-tgt.x)>0.01||Math.abs(cur.y-tgt.y)>0.01){ raf=requestAnimationFrame(tick); }else{ raf=null; }
  }
  function startTick(){ if(!raf) raf=requestAnimationFrame(tick); }
  function setTgt(nx,ny){ tgt.x=-nx*3.5; tgt.y=-ny*1.2; startTick(); }
  win.addEventListener('mousemove',function(e){ var r=win.getBoundingClientRect(); setTgt(((e.clientX-r.left)/r.width-0.5)*2,((e.clientY-r.top)/r.height-0.5)*2); });
  win.addEventListener('mouseleave',function(){ tgt.x=0;tgt.y=0;startTick(); });
  win.addEventListener('touchmove',function(e){ var r=win.getBoundingClientRect(),t=e.touches[0]; setTgt(((t.clientX-r.left)/r.width-0.5)*2,((t.clientY-r.top)/r.height-0.5)*2); e.preventDefault(); },{passive:false});
  win.addEventListener('touchend',function(){ tgt.x=0;tgt.y=0;startTick(); });
})();
