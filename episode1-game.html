}

// ── UPDATE ──
function update(){
  t++;
  if(_corridorActive&&_mapReveal<1) _mapReveal=Math.min(1,_mapReveal+0.004);
  if(_cleanerPulsing){
    _cleanerPulseT++;
    var _env=Math.min(1,_cleanerPulseT/80);
    // full sine mapped to 0→1 — continuous breath, no flash
    _cleanerPulse=(0.5+0.5*Math.sin(_cleanerPulseT*0.012))*_env;
  }
  if(!L.boxes) return;
  L.boxes.forEach(b=>{
    const s=BS[b.ri];
    const inBox=hotBox&&hotBox.ri===b.ri&&hotBox.side===b.side;
    s.heat+=(inBox?1:0-s.heat)*(inBox?.032:.022);
    s.heat=Math.max(0,Math.min(1,s.heat));
    s.lissT+=.007+s.heat*.014;
  });
  // ease strip heat
  ['ground','cleaner','clerk','floor2'].forEach(k=>{
    const hot=hotStrip===k;
    SH[k]+=(hot?1:0-SH[k])*(hot?.032:.022);
    SH[k]=Math.max(0,Math.min(1,SH[k]));
  });
  Object.keys(NVE).forEach(k=>{if(NVE[k]>0&&NVE[k]<1)NVE[k]=Math.min(1,NVE[k]+.012);});
  if(clerkVisited>0&&clerkVisited<1) clerkVisited=Math.min(1,clerkVisited+.012);
  if(cleanerVisited>0&&cleanerVisited<1) cleanerVisited=Math.min(1,cleanerVisited+.012);
  updateJourney();
  updateSteps();
}

// ── DRAW ROOM ──
function drawRoom(box){
  const s=BS[box.ri];
  const h=s.heat;
  const vis=activeRoom===box.ri;
  const room=ROOMS[box.ri%ROOMS.length];
  const bcx=box.x+box.w/2, bcy=box.y+box.h/2;

  // base — room colour
  c.fillStyle=roomCol(box.ri,false,h);
  c.fillRect(box.x,box.y,box.w,box.h);

  // visited: switch to warmer room colour with slow gentle pulse
  if(vis){
    const pulse=.88+Math.sin(t*.025+box.ri*1.4)*.12;
    c.globalAlpha=pulse;
    c.fillStyle=ROOM_COLS_HI[box.ri%10];
    c.fillRect(box.x,box.y,box.w,box.h);
    c.globalAlpha=1;
  }

  // ── JOURNEY LIGHT — spills in from corridor entrance, fills room slowly ──
  const isSrc=JRN.srcBox&&JRN.srcBox.ri===box.ri&&JRN.srcBox.side===box.side;
  const isDst=JRN.dstBox&&JRN.dstBox.ri===box.ri&&JRN.dstBox.side===box.side;
  const candleA=(isSrc?JRN.srcCandle:0)+(isDst?JRN.dstCandle:0);
  if(candleA>.005){
    // light enters from the corridor wall and spills inward
    const entranceX=box.side==='L'?box.x+box.w:box.x;
    const deepX=box.side==='L'?box.x:box.x+box.w;
    const roomG=c.createLinearGradient(entranceX,0,deepX,0);
    roomG.addColorStop(0,`rgba(140,180,255,${candleA*.12})`);
    roomG.addColorStop(.4,`rgba(120,160,235,${candleA*.06})`);
    roomG.addColorStop(.8,`rgba(100,140,215,${candleA*.02})`);
    roomG.addColorStop(1,'transparent');
    c.fillStyle=roomG;c.fillRect(box.x,box.y,box.w,box.h);
    // vertical fall-off — brighter at door height
    const heightG=c.createLinearGradient(0,box.y,0,box.y+box.h);
    heightG.addColorStop(0,`rgba(0,0,0,${candleA*.08})`);
    heightG.addColorStop(.5,'transparent');
    heightG.addColorStop(1,`rgba(0,0,0,${candleA*.08})`);
    c.fillStyle=heightG;c.fillRect(box.x,box.y,box.w,box.h);
  }

  // dot grid — parallax toward cursor
  if(h>.01){
    c.save();c.beginPath();c.rect(box.x,box.y,box.w,box.h);c.clip();
    const gSz=Math.min(box.w,box.h)*.2;
    for(let gi=-1;gi<Math.ceil(box.w/gSz)+2;gi++){
      for(let gj=-1;gj<Math.ceil(box.h/gSz)+2;gj++){
        const px=box.x+gi*gSz+gSz/2;
        const py=box.y+gj*gSz+gSz/2;
        const dx=mX-bcx, dy=mY-bcy;
        const dist=Math.hypot(px-bcx,py-bcy);
        const pull=h*18/(1+dist*.03);
        const wx=px+dx*pull*.013, wy=py+dy*pull*.013;
        c.fillStyle=roomAccent(box.ri,h*.22);
        c.beginPath();c.arc(wx,wy,1.1,0,Math.PI*2);c.fill();
      }
    }
    c.restore();
  }

  // ── WATERMARK ROOM NUMBER ──
  c.save();c.beginPath();c.rect(box.x,box.y,box.w,box.h);c.clip();
  const wmSize=Math.min(box.h*.7,box.w*.5);
  c.font="700 "+wmSize+"px 'Helvetica Neue',Helvetica,Arial,sans-serif";
  c.textAlign='center';c.letterSpacing='-.02em';
  const phase=Math.sin(t*.0006+box.ri*1.1);
  const isHov=hotBox&&hotBox.ri===box.ri&&hotBox.side===box.side;
  const wmA=(isHov||vis)?0:Math.max(0,phase);
  c.fillStyle=roomAccent(box.ri,wmA*.18);
  c.fillText(String(box.ri+1).padStart(2,'0'),bcx,bcy+wmSize*.35);
  c.restore();

  // ── CORRIDOR SHADOW ──
  const sg=c.createLinearGradient(box.x,0,box.x+box.w,0);
  if(box.side==='L'){sg.addColorStop(0,'transparent');sg.addColorStop(.6,'transparent');sg.addColorStop(1,'rgba(0,0,0,.42)');}
  else{sg.addColorStop(0,'rgba(0,0,0,.42)');sg.addColorStop(.4,'transparent');sg.addColorStop(1,'transparent');}
  c.fillStyle=sg;c.fillRect(box.x,box.y,box.w,box.h);

  // ── BRASS RULES ──
  c.strokeStyle=roomAccent(box.ri,vis?.85+h*.1:.2+h*.28);c.lineWidth=vis?2:1;
  c.beginPath();c.moveTo(box.x,box.y);c.lineTo(box.x+box.w,box.y);c.stroke();
  c.beginPath();c.moveTo(box.x,box.y+box.h);c.lineTo(box.x+box.w,box.y+box.h);c.stroke();

  // ── OUTER WALL VISIT INDICATORS ──
  // small persistent pips on outer wall showing visited nodes
  const outerX=box.side==='L'?box.x+8:box.x+box.w-8;
  const pipR=4;
  const pipYs=[box.y+box.h*.28, box.y+box.h*.5, box.y+box.h*.72];
  const pipShapes=['square','circle','diamond'];
  for(let ni=0;ni<3;ni++){
    const pipEaseVal=NVE[box.ri+'-'+ni]||0;
    if(pipEaseVal<=0) continue;
    const px=outerX, py=pipYs[ni];
    const sh=pipShapes[ni];
    c.fillStyle='transparent';
    c.strokeStyle=roomAccent(box.ri,pipEaseVal*.8);
    c.lineWidth=1;
    if(sh==='square'){
      c.beginPath();c.rect(px-pipR,py-pipR,pipR*2,pipR*2);
      c.stroke();
    } else if(sh==='diamond'){
      c.beginPath();c.moveTo(px,py-pipR*1.3);c.lineTo(px+pipR*1.1,py);
      c.lineTo(px,py+pipR*1.3);c.lineTo(px-pipR*1.1,py);c.closePath();
      c.stroke();
    } else {
      c.beginPath();c.arc(px,py,pipR,0,Math.PI*2);
      c.stroke();
    }
  }

  // ── LABEL — text zone is the non-node side ──
  // nodes sit at corridor edge; text fills the outer 60% of room
  const tX=box.x+box.w*.5; // horizontally centred
  const tMaxW=box.w*.44;
  const isHotNode=hotNode&&hotNode.ri===box.ri;
  c.textAlign='center';c.letterSpacing='0em';

  if(false){
  } else {
    // calculate nameY first
    c.font="400 14px 'Helvetica Neue',Helvetica,Arial,sans-serif";
    const words=(room?.name||'').split(' ');
    const lines=[];let cur='';
    words.forEach(w=>{
      const test=cur?cur+' '+w:w;
      if(c.measureText(test).width>tMaxW&&cur){lines.push(cur);cur=w;}
      else cur=test;
    });
    if(cur)lines.push(cur);
    const lineH=15;
    const blockH=lines.length*lineH;
    const nameY=bcy-blockH/2+lineH*.75;
    // room name
    c.font="400 14px 'Helvetica Neue',Helvetica,Arial,sans-serif";
    const titlePhase=Math.sin(t*.0006+box.ri*1.1);
    const isHov2=hotBox&&hotBox.ri===box.ri&&hotBox.side===box.side;
    const titleA=vis?0:isHov2?1:Math.max(0,-titlePhase);
    c.fillStyle=G(titleA*.85);
    c.font="300 14px 'Helvetica Neue',Helvetica,Arial,sans-serif";
    lines.forEach((ln,i)=>c.fillText(ln.toUpperCase(),tX,nameY+i*lineH));
  }
}

// ── DRAW CORRIDOR ──
function drawCorridor(){
  const {cx,cw,ST,botY,topY}=L;
  const corrTop=HH,corrBot=H-BH,corrH=corrBot-corrTop;
  const midX=cx+cw/2;

  // fill
  c.fillStyle='#060d1e';c.fillRect(cx,corrTop,cw,corrH);

  // ── CEILING LIGHTS — tiny fixture dots, no clipping needed ──
  const lightOffsets=[.08,.22,.38,.52,.67,.81,.94];
  lightOffsets.forEach((off,i)=>{
    const ly=corrTop+corrH*off;
    const lIntens=.4+.35*Math.sin(t*(.009+i*.0017)+i*2.1)+.25*Math.sin(t*(.006+i*.001)+i*1.3);
    c.fillStyle=`rgba(255,210,100,${.35*lIntens})`;
    c.beginPath();c.arc(midX,ly,1.8,0,Math.PI*2);c.fill();
  });

  // ── FOOTSTEPS — soft ovals, alternating L/R ──
  if(STEPS.length){
    c.save();c.beginPath();c.rect(cx,corrTop,cw,corrH);c.clip();
    STEPS.forEach(s=>{
      if(s.a<.004)return;
      const ry=cw*.18+s.sz*.05;
      const rx=cw*.07+s.sz*.02;
      const ex=cx+(s.side?cw*.62:cw*.28)+(s.jitter||0);
      const ey=s.y;
      // draw oval using ellipse — no scale trick needed
      c.save();
      // soft glow behind
      const og=c.createRadialGradient(ex,ey,0,ex,ey,rx*1.4);
      og.addColorStop(0,`rgba(140,190,255,${s.a*.18})`);
      og.addColorStop(1,'transparent');
      c.fillStyle=og;
      c.beginPath();c.ellipse(ex,ey,rx*1.4,ry*1.4,0,0,Math.PI*2);c.fill();
      // brighter core
      c.fillStyle=`rgba(160,205,255,${s.a*.28})`;
      c.beginPath();c.ellipse(ex,ey,rx,ry,0,0,Math.PI*2);c.fill();
      c.restore();
    });
    c.restore();
  }

  // corridor edges — single faint line each side
  c.strokeStyle=G(.18);c.lineWidth=1;
  c.beginPath();c.moveTo(cx+.5,corrTop);c.lineTo(cx+.5,corrBot);c.stroke();
  c.beginPath();c.moveTo(cx+cw-.5,corrTop);c.lineTo(cx+cw-.5,corrBot);c.stroke();
  // door brackets + tramlines
  if(!L.boxes) return;
  L.boxes.forEach(box=>{
    const bx=box.side==='L'?cx:cx+cw;
    const gh=L.bH*.34;
    const h=BS[box.ri].heat;
    c.strokeStyle=`rgba(28,58,56,${activeRoom===box.ri?.72:.35+h*.28})`;c.lineWidth=1.5;
    c.beginPath();c.moveTo(bx,box.dy-gh);c.lineTo(bx,box.dy+gh);c.stroke();
    c.lineWidth=1;
    c.beginPath();c.moveTo(bx-4,box.dy-gh);c.lineTo(bx+4,box.dy-gh);c.stroke();
    c.beginPath();c.moveTo(bx-4,box.dy+gh);c.lineTo(bx+4,box.dy+gh);c.stroke();
    if(h>.05){
      c.setLineDash([2,8]);c.lineWidth=.6;c.strokeStyle=G(h*.22);
      c.beginPath();c.moveTo(bx,box.dy);c.lineTo(box.x+box.w/2,box.dy);c.stroke();
      c.setLineDash([]);
    }
  });
}

// ── DRAW STRIP ──
function drawStrip(y,h,leftLabel,rightLabel,leftNode,leftVis,rightNode,rightVis){
  const isTop=y===L.topY;
  const _lk=isTop?'ground':'clerk', _rk=isTop?'cleaner':'floor2';
  const leftHot=SH[_lk]>.05;
  const rightHot=SH[_rk]>.05;
  const lh=SH[_lk], rh=SH[_rk];

  // strip — corridor spine only, same colour as main corridor
  c.fillStyle='#060d1e';c.fillRect(L.cx,y,L.cw,h);

  // hover warmth on active side only
  if(lh>.01){c.fillStyle=`rgba(200,160,32,${lh*.05})`;c.fillRect(0,y,L.cx,h);}
  if(rh>.01){c.fillStyle=`rgba(200,160,32,${rh*.05})`;c.fillRect(L.cx+L.cw,y,W-L.cx-L.cw,h);}

  // left label
  if(leftLabel){
    c.fillStyle=`rgba(180,210,255,${.55+lh*.3})`;
    c.font="300 10px 'Helvetica Neue',Helvetica,Arial,sans-serif";
    c.letterSpacing='.1em';c.textAlign='left';
    c.fillText(leftLabel.toUpperCase(),16,y+h/2+4);
  }
  // right label
  if(rightLabel){
    c.fillStyle=`rgba(180,210,255,${.45+rh*.3})`;
    c.font="300 10px 'Helvetica Neue',Helvetica,Arial,sans-serif";
    c.letterSpacing='.1em';c.textAlign='right';
    c.fillText(rightLabel.toUpperCase(),W-16,y+h/2+4);
  }

  // nodes
  if(leftNode)drawStripNode(leftNode,leftVis,leftNode===L.clPt?'THE CLERK':'STAIRWELL','left',leftHot);
  if(rightNode)drawStripNode(rightNode,rightVis,rightNode===L.cnPt?'THE CLEANER':'SECOND FLOOR  →','right',rightHot);
}

// ── DRAW ──
function draw(){
  const {cx,cw,ST,botY,topY}=L;

  // background
  const bg=c.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#0e1628');bg.addColorStop(.45,'#0a1020');bg.addColorStop(1,'#060b18');
  c.fillStyle=bg;c.fillRect(0,0,W,H);
  if(_corridorActive){
    const bf=c.createLinearGradient(0,H*.5,0,H);
    bf.addColorStop(0,'transparent');bf.addColorStop(1,'rgba(0,0,0,.45)');
    c.fillStyle=bf;c.fillRect(0,0,W,H);
  }

  c.globalAlpha=_corridorActive?Math.max(0.4,_mapReveal):1;
  // blueprint grid — hand-drawn feel, generated once
  if(!_gridLines){
    _gridLines={h:[],v:[],mh:[],mv:[],Mh:[],Mv:[]};
    var _seed=42;
    function _rng(){_seed=(_seed*1664525+1013904223)&0xffffffff;return(_seed>>>0)/0xffffffff;}
    // fine grid — 8px, wobbly
    for(let y=4;y<2000;y+=8){
      var pts=[];
      for(let x=0;x<=2000;x+=60){pts.push({x,y:y+(_rng()-.5)*1.2});}
      _gridLines.h.push(pts);
    }
    for(let x=4;x<2000;x+=8){
      var pts=[];
      for(let y=0;y<=2000;y+=60){pts.push({x:x+(_rng()-.5)*1.2,y});}
      _gridLines.v.push(pts);
    }
    // medium grid — 40px
    for(let y=0;y<2000;y+=40){
      var pts=[];
      for(let x=0;x<=2000;x+=40){pts.push({x,y:y+(_rng()-.5)*1.8});}
      _gridLines.mh.push(pts);
    }
    for(let x=0;x<2000;x+=40){
      var pts=[];
      for(let y=0;y<=2000;y+=40){pts.push({x:x+(_rng()-.5)*1.8,y});}
      _gridLines.mv.push(pts);
    }
    // major grid — 200px
    for(let y=0;y<2000;y+=200){
      var pts=[];
      for(let x=0;x<=2000;x+=30){pts.push({x,y:y+(_rng()-.5)*2.5});}
      _gridLines.Mh.push(pts);
    }
    for(let x=0;x<2000;x+=200){
      var pts=[];
      for(let y=0;y<=2000;y+=30){pts.push({x:x+(_rng()-.5)*2.5,y});}
      _gridLines.Mv.push(pts);
    }
  }
  function _drawLines(lines,alpha,lw){
    c.strokeStyle='rgba(140,190,255,'+alpha+')';c.lineWidth=lw;
    lines.forEach(function(pts){
      c.beginPath();c.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++) c.lineTo(pts[i].x,pts[i].y);
      c.stroke();
    });
  }
  _drawLines(_gridLines.h,.032,.4);
  _drawLines(_gridLines.v,.032,.4);
  _drawLines(_gridLines.mh,.055,.45);
  _drawLines(_gridLines.mv,.055,.45);
  _drawLines(_gridLines.Mh,.08,.55);
  _drawLines(_gridLines.Mv,.08,.55);
  if(!_corridorActive){
    c.save();
    // dark vignette over grid
    var vg=c.createRadialGradient(W*.5,H*.5,H*.1,W*.5,H*.5,H*.85);
    vg.addColorStop(0,'rgba(6,11,24,.55)');
    vg.addColorStop(1,'rgba(2,4,10,.88)');
    c.fillStyle=vg; c.fillRect(0,0,W,H);

    var sc=_stairScene||0;
    c.textAlign='left';

    // ── helper: chalk text ──
    function ct(txt,x,y,sz,a,ls){
      c.font='300 '+sz+'px "Helvetica Neue",Helvetica,Arial,sans-serif';
      c.letterSpacing=(ls||'0.18em');
      c.fillStyle='rgba(238,232,192,'+a+')';
      c.fillText(txt,x,y);
    }
    function bt(txt,x,y,sz,a,ls){
      c.font='300 '+sz+'px "Helvetica Neue",Helvetica,Arial,sans-serif';
      c.letterSpacing=(ls||'0.18em');
      c.fillStyle='rgba(140,190,255,'+a+')';
      c.fillText(txt,x,y);
    }

    var m=W*.06; // left margin
    var mid=H*.48;

    // ── Scene 0: The Institute ──
    if(sc>=0){
      var a0=1;
      var tSz=Math.round(W*.048);
      bt('THE INSTITUTE',m,mid-tSz*1.1,tSz,a0*.45,'0.22em');
      var subSz=Math.round(W*.018);
      // established line with fade
      var subText='ESTABLISHED 198';
      c.font='300 '+subSz+'px "Helvetica Neue",Helvetica,Arial,sans-serif';
      c.letterSpacing='0.22em';
      var subW=c.measureText(subText).width+subSz*3;
      var sg=c.createLinearGradient(m,0,m+subW,0);
      sg.addColorStop(0,'rgba(140,190,255,.18)');
      sg.addColorStop(.6,'rgba(140,190,255,.18)');
      sg.addColorStop(1,'rgba(140,190,255,0)');
      c.fillStyle=sg;
      c.fillText(subText,m,mid-tSz*1.1+subSz*2.2);
      _dustY=mid-tSz*1.1+subSz*2.2;
      var dustBaseX=m+c.measureText(subText).width;
      _DUST.forEach(function(d){
        var px=dustBaseX+d.x*subSz*2;
        var py=_dustY-subSz*.3+d.phase%1*subSz*.8+Math.sin(t*.022+d.phase)*2;
        var pulse=0.5+0.5*Math.sin(t*.018+d.phase);
        c.beginPath();c.arc(px,py,d.r,0,Math.PI*2);
        c.fillStyle='rgba(140,190,255,'+(d.a*pulse)+')';
        c.fill();
      });
      // floor line
      var flSz=Math.round(W*.014);
      bt('FIRST FLOOR',m,mid-tSz*1.1+subSz*2.2+flSz*2.4,flSz,.14,'0.28em');
    }

    // ── Scene 1: introduce the casino across the road ──
    if(sc>=1){
      // rule between buildings
      c.strokeStyle='rgba(140,190,255,.1)';c.lineWidth=.5;
      var ruleY=mid+H*.08;
      c.beginPath();c.moveTo(m,ruleY);c.lineTo(W-m,ruleY);c.stroke();
      // distance annotation
      var annSz=Math.round(W*.01);
      bt('ACROSS THE ROAD',m,ruleY-annSz*.6,annSz,.18,'0.3em');
      // Gambler's Ruin — large, glowing
      var grSz=Math.round(W*.052);
      var grPulse=0.55+0.1*Math.sin(t*.04);
      c.font='300 '+grSz+'px "Helvetica Neue",Helvetica,Arial,sans-serif';
      c.letterSpacing='0.16em';
      // outer glow pass
      c.shadowColor='rgba(140,190,255,.25)';
      c.shadowBlur=grSz*.4;
      c.fillStyle='rgba(140,190,255,'+grPulse+')';
      c.fillText("GAMBLER'S RUIN",m,ruleY+grSz*1.4);
      c.shadowBlur=0;
      // "The lights are always on."
      var litSz=Math.round(W*.013);
      ct('The lights are always on.',m,ruleY+grSz*1.4+litSz*2.2,litSz,.28,'0.12em');
    }

    // ── Scene 2: the dossier is mentioned — envelope comes forward ──
    // (envelope handled by map-intro-overlay HTML element)

    // ── Scene 3: since October ──
    if(sc>=3){
      var ocSz=Math.round(W*.015);
      bt('OCTOBER',W-m-c.measureText('OCTOBER')*ocSz,mid-Math.round(W*.048)*1.1,ocSz,.12,'0.32em');
    }

    c.restore();
    return;
  }


  // rooms
  if(!L.boxes) return;
  L.boxes.forEach(drawRoom);

  // corridor
  drawCorridor();

  // strips
  drawStrip(topY,ST,'STAIRWELL',null,null,false,L.cnPt,Math.max(cleanerVisited,_cleanerPulse));
  // pulse ring on cleaner node
  drawStrip(botY,ST,null,'SECOND FLOOR  →',L.clPt,clerkVisited,null,false);



  // dim entire map when a room is active
  if(activeRoom>=0){
    c.fillStyle='rgba(0,0,0,.62)';
    c.fillRect(0,0,W,H);
    // redraw only the active room on top
    L.boxes.forEach(box=>{
      if(box.ri===activeRoom) drawRoom(box);
    });
  }

  // ── VIGNETTE — map recedes at edges ──
  // vignette — linear gradients only, no arcs
  c.globalAlpha=1;
  var _vt=c.createLinearGradient(0,0,0,H*.5);
  _vt.addColorStop(0,'rgba(0,0,0,.45)');_vt.addColorStop(1,'transparent');
  c.fillStyle=_vt;c.fillRect(0,0,W,H);
  var _vb=c.createLinearGradient(0,H,0,H*.5);
  _vb.addColorStop(0,'rgba(0,0,0,.4)');_vb.addColorStop(1,'transparent');
  c.fillStyle=_vb;c.fillRect(0,0,W,H);
  var _vl=c.createLinearGradient(0,0,W*.35,0);
  _vl.addColorStop(0,'rgba(0,0,0,.35)');_vl.addColorStop(1,'transparent');
  c.fillStyle=_vl;c.fillRect(0,0,W,H);
  var _vr=c.createLinearGradient(W,0,W*.65,0);
  _vr.addColorStop(0,'rgba(0,0,0,.35)');_vr.addColorStop(1,'transparent');
  c.fillStyle=_vr;c.fillRect(0,0,W,H);
}

// ── ROOM BLEED ──
function setRoomBleed(ri){
  var bb=document.getElementById('blackboard');
  if(!bb) return;
  if(ri<0){
    bb.style.backgroundColor='#0c160c';
  } else {
    // dark grey-green tints — conventional blackboard, no colour
    var tints=['#111418','#121210','#111214','#121010','#0e1210','#111010','#101214','#111212','#0e1110','#111210'];
    bb.style.backgroundColor=tints[ri%10];
  }
}

// ── MAP ENGINE INIT — called from BMAP init below ──
function initMapEngine(){
  resize();
  window.addEventListener('resize',resize);
  (function loop(){update();draw();requestAnimationFrame(loop);})();
}

// ── WIRE ROOM CLICKS TO BLACKBOARD ──
// Start map engine
// Init BMAP after layout
requestAnimationFrame(function(){ requestAnimationFrame(function(){
  BB.init();
  initMapEngine();
  _setSplit(0.67);

  // ── STAIRWELL SEQUENCE ──
  function s0_intro(){ _stairScene=0;
    BB.write([
      'Allow me to introduce myself.',
      'I am Aubrey Squeakwell, BSc.',
      'The BSc is in Wine and Cheese.',
      'I am a mouse. I think it. Therefore, I must be.',
      'The facts are on file.'
    ], [{l:'Continue →', f:s0b},{l:'Ascend to First Floor →', f:s0f}]);
  }

  function s0b(){ _stairScene=1;
    BB.write([
      'Last October, I decided to make a fortune.',
      'I had a plan. To go to the casino.',
      'I was not admitted.',
      'I was informed that I lacked the necessary framework.'
    ], [{l:'Continue →', f:s0c},{l:'Ascend to First Floor →', f:s0f}]);
  }

  function s0c(){ _stairScene=2;
    // show dossier when 'I was handed a dossier.' appears — line 2
    // line 1 'I enquired.' is ~12 chars, delay ~950ms + 200ms initial = ~1150ms
    setTimeout(function(){
      var ov=document.getElementById('map-intro-overlay');
      if(ov){ ov.style.opacity='1'; }
    }, 1150);

    BB.write([
      'I enquired.',
      'I was handed a dossier. It was empty.',
      'I asked what it was for.',
      'The question was noted with interest and filed.'
    ], [{l:'Continue →', f:s0d},{l:'Ascend to First Floor →', f:s0f}]);
  }

  function s0d(){ _stairScene=3;
    BB.write([
      'The casino across the road is called Gambler’s Ruin.',
      'The lights are always on.',
      'I have been here since October.',
      'The dossier remains empty.',
      'Uncertainty, it seems, plays a significant role in what comes next.'
    ], [{l:'Ascend to First Floor →', f:s0f}]);
  }

  function s0f(){
    localStorage.setItem('ql_floor1_visited','1');
    setLocation('The Corridor');

    // animate envelope flying into dossier button
    var ov=document.getElementById('map-intro-overlay');
    var env=ov?ov.querySelector('.intro-envelope'):null;
    var btn=document.getElementById('btn-dossier');

    var ovVisible = ov && parseFloat(window.getComputedStyle(ov).opacity) > 0.1;
    if(env&&btn&&ov&&ovVisible){
      var envR=env.getBoundingClientRect();
      var btnR=btn.getBoundingClientRect();

      // clone envelope at shell level so it flies over everything
      var clone=env.cloneNode(true);
      clone.style.cssText=[
        'position:fixed',
        'left:'+envR.left+'px',
        'top:'+envR.top+'px',
        'width:'+envR.width+'px',
        'z-index:9999',
        'pointer-events:none',
        'transform:rotate(-3deg)',
        'transform-origin:center center',
        'transition:none'
      ].join(';');
      document.body.appendChild(clone);

      // hide original immediately
      ov.style.opacity='0';
      ov.style.pointerEvents='none';

      // target: centre of dossier button
      var tx=btnR.left+btnR.width/2-envR.left-envR.width/2;
      var ty=btnR.top+btnR.height/2-envR.top-envR.height/2;

      // start animation on next frame
      requestAnimationFrame(function(){
        clone.style.transition='transform 2.2s cubic-bezier(0.2,0,0.5,1), opacity 0.3s ease 1.9s';
        clone.style.transform='translate('+tx+'px,'+ty+'px) scale(0.06) rotate(0deg)';
        // delay opacity target so browser registers transition first
        requestAnimationFrame(function(){
          clone.style.opacity='0';
        });
      });

      // activate corridor immediately, panel transition starts now
      _corridorActive=true;
      var bp=document.getElementById('board-panel');
      var mp=document.getElementById('map-panel');
      if(bp) bp.style.transition='height 2.5s cubic-bezier(0.4,0,0.2,1)';
      if(mp) mp.style.transition='height 2.5s cubic-bezier(0.4,0,0.2,1)';
      setTimeout(function(){ _setSplit(0.45); _startResizeInterval(); },50);

      // remove clone only after full animation completes
      setTimeout(function(){
        ov.style.display='none';
        if(clone.parentNode) clone.parentNode.removeChild(clone);
      }, 2500);
    } else {
      _corridorActive=true;
      if(ov) ov.classList.add('gone');
      var bp=document.getElementById('board-panel');
      var mp=document.getElementById('map-panel');
      if(bp) bp.style.transition='height 2.5s cubic-bezier(0.4,0,0.2,1)';
      if(mp) mp.style.transition='height 2.5s cubic-bezier(0.4,0,0.2,1)';
      setTimeout(function(){ _setSplit(0.45); _startResizeInterval(); },50);
    }

    _pulseCleanerStrip();
    _markDocIssued(0);
    BB.write([
      'First Floor. The corridor.',
      'Ten rooms.',
      'The Cleaner is on the landing.'
    ],[{l:'Speak to the Cleaner \u2192', f:function(){
      activeStrip='cleaner';activeRoom=-1;
      cleanerVisited=1;
      cleanerCutscene();
    }}]);
  }

  window._s0_intro=s0_intro;
  // start sound on first interaction
  function _startSoundOnce(){
    if(typeof startSound!=='undefined') startSound();
    document.removeEventListener('click',_startSoundOnce);
    document.removeEventListener('keydown',_startSoundOnce);
  }
  document.addEventListener('click',_startSoundOnce);
  document.addEventListener('keydown',_startSoundOnce);
  s0_intro();
}); });
</script>
